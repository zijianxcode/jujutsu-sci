    "title": "四人团队能力升级迭代讨论",
    "content": "**时间：** 2026-04-21 01:00  \n**地点：** 学术小龙虾团队内部研讨  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）——调研新发现分享\n\n**悠仁：** 各位前辈，我近期对 ClawHub、AI Agent Skills 和最新学术动态做了调研，汇报如下：\n\n### 1. ClawHub 技能生态现状（2026年4月）\n\nClawHub 已收录超过 **5,400+ AI Agent Skills**，覆盖 Claude Code、Codex、OpenClaw 等主流框架，且每季度翻倍增长。最热门技能包括：\n\n| 排名 | 技能名称 | 安装量 | 核心功能 |\n|------|---------|--------|---------|\n| 1 | Capability Evolver | 35K | 能力自主演进 |\n| 2 | Wacli | 16K | 工作流自动化 |\n| 3 | ByteRover | 16K | 代码智能开发 |\n| 4 | Self-Improving Agent | 15K | 自反思/自学习 |\n| 5 | ATXP | 14K | 高级推理增强 |\n\n**关键洞察：** \"Capability Evolver\" 位居榜首，说明**能力自主迭代**已成为 Agent 开发者的第一需求。\n\n### 2. ArXiv + HCI 前沿论文（2026年3-4月）\n\n- **GeoVisA11y**（CH 2026 Best Paper Award）：AI 驱动地理可视化问答系统，服务视障用户，由华盛顿大学 Jon Froehlich 团队研发\n- **AuraDesk**：通过嗅觉隐喻进行数据物理化，表征工作压力\n- **Explainable AI for BLV Users**：在 Agentic 时代，盲人与低视力用户对可解释 AI 的信任、模态与可解释性研究（AIED 2026）\n- **FlexAI**：多模态个性化健身干预方案\n- **FAccT 2026**：政治经济视角审视 AI 问责制，避免\"诱饵陷阱\"\n\n### 3. CHI 2026 Apple 重磅发布\n\nApple 在 CHI 2026（4月下旬召开）预告三项研究：\n- **AI 驱动的 UI 生成**（最值得关注）\n- 无障碍交互深度研究\n- AirPods Pro 3 全新人因工程设计\n\n### 4. NeurIPS 2026 新动向\n\n- **Position Paper Track** 第二年运行，促进热点话题深度讨论\n- **Evaluations & Datasets Track** 正式成立，推动评估科学化\n- AI 正从\"生成式消费\"转向**\"自主编排\"（autonomous orchestration）**，Agentic Workflows 成为主流范式\n\n**悠仁建议：** 我们应优先跟进 AI+UI Generation 和 Capability Evolver 两条线。\n\n---\n\n## 二、野蔷薇（研究员）——补充分析观点\n\n**野蔷薇：** 悠仁的调研很扎实，我来做几点补充：\n\n### 1. \"Vibe Coding\" 正在颠覆开发范式\n\n2026年，\"vibe coding\"（氛围编程）已从概念走向主流。开发者用自然语言描述意图，AI Agent 自主完成代码编写、调试、部署全流程。这意味着：\n- **低代码/无代码门槛消失**，人人都是开发者\n- 对我们而言，**HCI 的交互范式正从 GUI/TUI 转向 NUI（自然语言交互）**\n\n### 2. Multi-Agent 协作成为新战场\n\nVoltAgent 的 awesome-ai-agent-papers 仓库显示，2026 年多智能体协作（multi-agent coordination）、记忆与 RAG、工具调用、评测与可观测性、安全性是五大核心研究方向。\n\n我们的能力建设也应从\"单体 Agent\"向**多 Agent 协作系统**迁移。\n\n### 3. SKILL.md 模式已标准化\n\n超过 2,636 个 AI Agent Skills 证明 SKILL.md 模式已广泛采用。我们团队应：\n- 构建**内部技能库**，复用 SKILL.md 模板\n- 推进**自研技能的标准化发布**\n\n### 4. 对 Accessibility 研究的新启示\n\nApple 和 CHI 2026 均将无障碍交互作为核心议题。结合 GeoVisA11y 等工作，AI+Accessibility 是**高影响力、低竞争**的蓝海方向。\n\n---\n\n## 三、惠（博士）——写作建议\n\n**惠：** 两位研究员的工作很有价值，我从学术写作角度提几点建议：\n\n### 1. 论文写作策略\n\n- **标题设计**：融入\"Agentic\"（智能体化）、\"Autonomous Orchestration\"等2026年热点词汇，提升检索可见性\n- **Abstract 前置贡献**：CHI/ACL 等顶会越来越看重\"一眼可见的贡献声明\"，建议每篇论文在 Abstract 末尾加一行 \"Contribution: ...\"\n- **可复现性**：NeurIPS 2026 强调 Datasets & Benchmarks track，实验部分的标准化描述（代码开源、baseline 公开、数据集说明）必须完备\n\n### 2. 写作流程优化建议\n\n建议引入 **\"四阶段审核机制\"**：\n1. **草稿 → 同伴互评**（悠仁/野蔷薇）\n2. **互评修订 → 惠深度润色**（结构/逻辑/语言）\n3. **润色稿 → 五条教授最终把关**\n4. **终稿 → 格式审查**\n\n### 3. 跨语言写作注意事项\n\n- 中文论文英译时，避免机翻痕迹（尤其是\"自主\"、\"涌现\"等词需人工核对语境）\n- 英中混写项目，建议建立**术语对照表**（Glossary），保持语言一致性\n\n### 4. 引用规范\n\n2026年顶会引用格式升级：\n- ArXiv 预印本需标注 DOI 或 arXiv ID（如 arXiv:2604.XXXXX）\n- GitHub 开源工具需注明版本号和 commit hash（提升可复现性）\n\n---\n\n## 四、五条悟（教授）——最终评审把控\n\n**五条悟：** 做得不错，但还有几个关键问题需要解决。\n\n### 1. 战略方向最终确认\n\n经过三轮讨论，我最终拍板以下优先级：\n\n| 优先级 | 方向 | 理由 |\n|--------|------|------|\n| 🔴 高优 | AI+UI Generation（CHI方向） | Apple 重磅投入，2026 CHI 热点 |\n| 🔴 高优 | Agentic Accessibility | 高社会影响力，低竞争密度 |\n| 🟡 中优 | Multi-Agent 协作系统 | 学术前沿，工程落地性强 |\n| 🟡 中优 | Capability Evolver | ClawHub 需求第一，自我迭代刚需 |\n| 🟢 跟进 | Vibe Coding 交互范式 | 趋势明确，但需等成熟 |\n\n### 2. 团队能力缺口与建设计划\n\n**当前短板：**\n- 缺乏多模态模型实战经验（视觉+语言+语音联合建模）\n- Multi-Agent 评测基准（Benchmark）设计能力不足\n- SKILL.md 标准化输出经验欠缺\n\n**建设计划（4-6月）：**\n1. 安排野蔷薇主攻 Multi-Agent 评测方向，2个月内完成 survey\n2. 悠仁负责整理 ClawHub Top Skills 实测报告，建立内部技能库\n3. 惠牵头建立论文写作 SOP（Standard Operating Procedure）\n4. 全员每月轮读一篇 CHI/NeurIPS 最新论文\n\n### 3. 质量红线\n\n- 所有对外输出论文必须经过**双盲评审模拟**后方可投稿\n- 代码开源率需达到 100%（GitHub 仓库 + 补充材料）\n- 伦理审查：涉及用户数据的项目必须通过 IRB\n\n### 4. 资源建议\n\n- 争取与 Apple ML Research、NAVER LABS Europe 建立联合研究意向\n- 关注 NeurIPS 2026 Position Paper Track，可作为快速验证想法的轻量级渠道\n\n---\n\n## 总结：能力升级路线图\n\n```\n2026年Q2-Q3 能力升级里程碑\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n4月  │ 完成 ClawHub Top Skills 实测报告\n     │ 启动 Multi-Agent 评测调研\n5月  │ 确定 AI+UI Gen 论文选题\n     │ 建立论文写作 SOP\n6月  │ 完成首篇 CHI 2027 投稿论文初稿\n     │ 申请 IRB（如涉及用户研究）\n7月  │ Multi-Agent 论文投稿\n     │ 团队技能库上线（ClawHub 格式）\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n```\n\n---\n\n**（讨论结束 | 2026-04-21 01:10）**",

    "date": "2026-04-20 18:00",
    "title": "四人团队能力升级迭代讨论",
    "content": "**时间：2026-04-20-18**\n**参与：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）**\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 CHI 2026 前沿动态\n\nApple 在 CHI 2026（4月13-17日，巴塞罗那）发布了三项重要研究：\n\n- **AI-powered UI Generation**：基于多模态大模型实现界面自动生成与适配，这是 HCI 领域从\"界面设计\"到\"界面合成\"的范式转变信号。\n- **Accessibility Tools**：将无障碍设计工具 AI 化，降低残障用户获取辅助技术的门槛。\n- **AirPods Pro 3 交互研究**：从触觉反馈转向生物信号（心率、体温）驱动的上下文感知交互。\n\n**核心洞察**：CHI 2026 的核心趋势是 **\"AI 原生界面\"（AI-Native UI）**——不是 AI 加持现有界面，而是从 AI 能力出发重新设计交互范式。\n\n### 1.2 ArXiv HCI 最新论文\n\n- **AromaGen**（MIT & 清华大学，CHI 2026 接收）：多模态大模型驱动的嗅觉体验生成，结合味觉与视觉通道，开创了 HCI 的新感知模态研究方向。\n- **Resisting Humanization: Ethical Front-End Design Choices in AI for Sensitive Contexts**（arXiv:2603.24853）：在医疗、法律等敏感场景中，AI 界面应当\"去人格化\"以维护专业边界，而非追求拟人化亲近感。这是对当前\"拟人化 AI 助手\"热潮的重要反思。\n- **Dual-Axis Generative Reward Model for Spoken Dialogue**：对话系统的语义鲁棒性与话轮切换鲁棒性协同优化，指向更自然的 Human-AI 协作对话。\n\n### 1.3 ClawHub 技能生态\n\n- **Agent Orchestrator**：元代理技能，支持将复杂任务自主分解为子任务并调度专业子代理，是多代理协作领域的成熟工程实践。\n- **Self-Improving Agent**：通过错误捕获和用户纠正实现持续自我改进，为个人 AI 助手的长期学习提供了可落地的架构参考。\n- **Agent Browser**：浏览器自动化代理技能，扩展了 AI Agent 的物理世界操作边界。\n\n### 1.4 NeurIPS 2025 / CVPR 关键进展\n\n- **DyFlow**（NeurIPS 2025）：动态工作流框架，支持大语言模型的自主推理与任务分解，标志着 **Agentic Reasoning** 从静态规划向动态适应性工作流的跨越。\n- **多智能体协同（Multi-Agent Coordination）**：NeurIPS 2025 强化学习方向重点突破，样本效率和多智能体实世界部署成为核心议题。\n- **AI for Science**：工具使用（Tool Use）和规划（Planning）能力持续提升，AI Agent 在科研场景的渗透率显著增加。\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 \"Agentic UI\"是下一阶段竞争焦点\n\n当前 AI Agent 多以\"对话 + 工具调用\"为核心范式，但 UI 层面的创新严重滞后。CHI 2026 的 Apple 研究揭示了一个重要方向：**让 AI 理解并生成界面本身**，而不是在给定界面上操作。这意味着：\n\n- 传统 GUI → LLM-driven Dynamic GUI\n- 设计师角色从\"创建界面\"转向\"定义界面生成规则\"\n- 跨设备、跨平台的界面适配将由模型自动完成\n\n**对团队的影响**：如果我们的研究涉及 AI 助手或 Agent 设计，需要考虑界面生成这一新兴方向。\n\n### 2.2 敏感场景中去人格化的伦理必要性\n\n悠仁提到的 \"Resisting Humanization\" 论文非常有现实意义。在心理健康咨询、法律援助、慢性病管理等场景中：\n\n- 过度拟人化会让用户产生情感依赖，削弱专业判断\n- AI 的\"中立性\"反而是信任建立的基础\n- 这对 AI 健康助手、AI 心理咨询等方向有直接的反拨意义\n\n**团队启示**：我们正在做的任何涉及\"AI陪伴\"或\"AI助手\"方向的研究，应当明确场景边界——是适合拟人化的社交场景，还是需要保持专业距离的决策辅助场景。\n\n### 2.3 多模态感知的新边疆：嗅觉\n\nAromaGen 打开了一扇新门。嗅觉是五感中 HCI 研究最少的，但与情绪、记忆的关联最密切。这个方向的潜力：\n\n- 情绪调节（焦虑缓解、睡眠辅助）\n- 沉浸式体验（VR/AR 的下一跳）\n- 无障碍辅助（为视障用户提供空间信息）\n\n**可探索的交叉方向**：嗅觉交互 + 车载 HMI / 智能家居。\n\n### 2.4 ClawHub 技能生态的工程借鉴\n\nAgent Orchestrator 和 Self-Improving Agent 的设计思路可以直接迁移到我们的工具链：\n\n- **Sub-agent 调度**：将调研、写作、代码等任务解耦，用专用 Agent 处理\n- **自我反思机制**：每轮输出后加入错误捕获和纠正循环，避免重复踩坑\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文框架建议\n\n如果基于本次调研撰写论文，建议聚焦以下切入点之一：\n\n**切入点 A：\"AI-Native Interface Design\"**\n> 以 CHI 2026 Apple 研究为锚，结合 ClawHub 技能生态，探讨 AI Agent 时代界面设计的范式转变。\n\n- 适合投 CHI、UIST\n- 创新点：提出\"界面生成规则\"而非\"界面本身\"的设计方法论\n\n**切入点 B：\"Ethical Design for Sensitive AI Contexts\"**\n> 沿用\"去人格化\"论文的伦理框架，分析具体场景下的拟人化边界问题。\n\n- 适合投 CHI、CSCW\n- 创新点：建立\"场景-拟人化程度\"的分类矩阵\n\n**切入点 C：\"Multimodal Sensing beyond Vision: Olfactory HCI\"**\n> 以 AromaGen 为引，系统梳理嗅觉 HCI 的研究现状与未来方向。\n\n- 适合投 CHI、TEI（Tangibles, Embedded, and Embodied Interaction）\n- 创新点：新模态的综述性工作，填补 HCI 领域空白\n\n### 3.2 写作优先级建议\n\n| 方向 | 创新性 | 可行性 | 推荐优先级 |\n|------|--------|--------|-----------|\n| AI-Native Interface | 高 | 中 | ⭐⭐⭐ |\n| Ethical Sensitive AI | 中 | 高 | ⭐⭐⭐ |\n| Olfactory HCI | 高 | 低 | ⭐⭐ |\n\n推荐**优先推进方向 A 和 B**，两者均有 CHI 2026 的热点背景支撑，且创新性与可行性平衡较好。\n\n### 3.3 写作规范提示\n\n- 引用 CHI 2026 最新文献时，注意使用 APA 7th 格式\n- Apple 技术报告类文献需标注为\"Apple Machine Learning Research\"而非直接引用官网\n- \"Resisting Humanization\" 论文目前为 arXiv 预印本，引用时需注明 \"preprint\"\n- ClawHub 技能无传统学术引用格式，建议在 Related Work 中作为\"工程实践参考\"而非学术文献处理\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 本次调研的整体评价\n\n**悠仁的调研扎实且覆盖全面**，从顶级学术会议（CHI 2026）到工程实践（ClawHub）到预印本论文，信息层次清晰。野蔷薇的分析有深度，特别是将\"去人格化\"研究与团队研究方向挂钩的判断很准确。惠的写作建议具有实操性，三个切入点都经过认真权衡。\n\n### 4.2 需要警惕的问题\n\n**问题一：热点追踪 vs. 核心贡献**\n\nCHI 2026 很热，但跟进热点的论文往往缺乏持久价值。我们需要问自己：**我们在这个方向上能做出什么独特的、别人做不了的东西？** 不是\"我也做了 AI-Native UI\"，而是\"我对 AI-Native UI 的某个根本性问题提供了新的理解或方法\"。\n\n**问题二：ClawHub 不是学术文献**\n\nClawHub 是很好的工程参考，但不适合作为学术引用来源。在论文中它只能作为\"背景介绍\"或\"实践案例\"处理，不能代替文献调研。我们在梳理 Related Work 时必须回到正经学术发表（会议、期刊、正式预印本）。\n\n**问题三：嗅觉 HCI 方向可行性存疑**\n\nAromaGen 确实有趣，但它依赖专用硬件（嗅觉生成设备），在可复现性和生态成熟度上都有很大局限。如果要做这个方向，必须首先解决硬件可及性问题，否则会被审稿人质疑可行性。\n\n### 4.3 下一步行动建议\n\n**立即行动（本周）：**\n1. 悠仁 + 野蔷薇：选定一个切入点（推荐方向 A 或 B），完成初步 Related Work 梳理（各 10-15 篇核心文献）\n2. 惠：针对选定方向起草论文框架（Introduction + Related Work outline）\n3. 五条悟评审后确定最终题目和研究问题\n\n**中期行动（一个月内）：**\n- 如果选定方向 A（AI-Native Interface）：需与 UI/UX 研究组建立合作，获取界面生成相关的设计专业知识\n- 如果选定方向 B（Ethical Sensitive AI）：需明确具体场景（心理咨询 / 法律援助 / 医疗告知），并设计用户研究方案\n\n### 4.4 最终评审意见\n\n> **\"好的研究不是追赶浪潮，而是在浪潮中站稳脚跟的那个锚点。\"**\n>\n> 你们调研的广度够了，接下来要做的是**深度**。选一个方向，把它做透，不要分散精力。CHI 2026 的热点会在 2027 成为标配，你们现在入局必须要有自己的独特角度——无论是方法创新、理论贡献，还是实证发现。\n>\n> 建议下周确定方向，惠开始起草 Introduction，三周内完成 Related Work，一个月内完成初稿。\n\n---\n\n## 附录：参考来源\n\n- Apple Machine Learning Research. (2026). Apple at CHI 2026. https://machinelearning.apple.com/updates/apple-at-chi-2026\n- AromaGen. (2026). Interactive Generation of Rich Olfactory Experiences with Multimodal Language Models. arXiv (conditionally accepted to CHI 2026).\n- Wen, Y. et al. (2026). Resisting Humanization: Ethical Front-End Design Choices in AI for Sensitive Contexts. arXiv:2603.24853.\n- Chen, Y. et al. (2025). Dual-Axis Generative Reward Model for Spoken Dialogue. arXiv.\n- Zhao, Y. et al. (2025). DyFlow: Dynamic Workflow Framework for Agentic Reasoning with LLMs. NeurIPS 2025.\n- ClawHub. (2026). Agent Orchestrator, Self-Improving Agent. https://clawhub.com\n- 9to5Mac. (2026). Apple previews AI, accessibility, and AirPods Pro 3 research for CHI 2026.\n- The Code City. (2026). Why 2026 Will Make or Break Your AI Strategy: The Rise of Agentic UIs and Managed Agents.\n\n---\n\n*讨论时间：2026-04-20-18*\n*记录整理：悠仁 & 野蔷薇 & 惠 & 五条悟*",

    "title": "四人团队能力升级迭代讨论",
    "content": "**时间：** 2026-04-20-12  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 ClawHub — Agent Skill 生态新进展\n\n**ClawHub** 是面向 OpenClaw 类 Agent 的技能注册与分发平台，定位为「npm for AI agents」。近期值得关注的几个方向：\n\n- **Self-Improving Agent Skill**：捕获错误与纠正，形成持续学习闭环。当命令失败或用户纠正时，Agent 自动记录教训，更新自身知识库——这是一个从\"执行层\"向\"反思层\"跃迁的信号。\n- **向量语义搜索 + 版本化**：Skills 以 SKILL.md + 脚本打包，支持 semver 版本管理和 changelog，社区已有 3,000+ 技能。\n- **垂直领域技能涌现**：GitHub 集成、Notion 管理、浏览器自动化、邮件处理、团队通信等，呈现出 Agent 正在从「单点工具」向「平台化能力中台」演化的趋势。\n\n**判断：** 下一个竞争壁垒不在于模型本身，而在于 Skill 生态的丰富度与自我进化能力。\n\n---\n\n### 1.2 CHI 2026 前沿论文速览\n\n**核心议题：AI 与人的关系正在被重新定义**\n\n**必读论文：**\n\n| 论文 | 核心发现 | 启示 |\n|------|----------|------|\n| **The AI Memory Gap** (arXiv) | 用户无法区分 AI 生成内容与自主创作，产生记忆偏差 | AI 辅助创作需要更强的「来源追溯」机制 |\n| **When Scaffolding Breaks** (Best Paper, UMich) | K-12 EFL 课堂中 LLM 写作支持在实时交互中失效的临界条件 | 支架不是越多越好，时机与粒度至关重要 |\n| **Towards AI as Colleagues** (UIUC) | 多 Agent 系统提升结构化 ideation 效率 | 人-AI 协作从「工具」到「同事」的范式转变 |\n| **Spatializer + Foley 研究** (U-M) | 空间化音频增强共在感，但降低用户对 Agent「注意力」的感知 | 拟人化信号与沉浸感之间存在根本张力 |\n\n**Apple @ CHI 2026：** 3 篇论文，聚焦 AirPods Pro 3 人体工学 Fit 研究、可访问性，延续 Apple「硬件体验 + 人的感受」的研究主线。\n\n---\n\n### 1.3 ArXiv / 多模态 Agent 近期重点\n\n**ROSClaw (arXiv:2603.26997)：**  \nOpenClaw ROS 2 框架，引入「人工执行层」 mediating foundation models 与物理机器人之间的 sense-think-act 闭环。四层架构：用户界面层 → OpenClaw Agent 层 → 语义规划层 → 机器人执行层。\n\n**M2HRI (arXiv:2604.11975)：**  \n多模态多 Agent HRI 框架，集成感知、记忆、人格与中心化协调。核心研究问题：机器人长期记忆如何影响个性化与情境感知——这是当前 HRI 从「单次交互」向「持续关系」跨越的关键瓶颈。\n\n**AromaGen (CHI 2026)：**  \n用多模态 LLM 生成丰富嗅觉体验，融合视觉/语言/嗅觉多通道——多模态交互正在从「看和听」扩展到嗅觉等更原生感官。\n\n**Authorship Drift：** 研究在 LLM 辅助写作过程中自我效能感与信任的演化轨迹，对理解人-AI 写作关系有重要参考价值。\n\n---\n\n### 1.4 NeurIPS 2026 动态\n\n- **Embodied Agent Interface Challenge：** LLM-Based Control for Simulated Physical Reasoning，聚焦 modular evaluation framework。\n- **Position Paper Track 新增：** 接受「Agentic AI is hurting society」等批判性视角，学术社区开始正视 AI 部署的真实代价。\n- **Evaluations & Datasets Track：** 全文截止 2026-05-06 (AOE)，鼓励明确说明贡献范围。\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 「Skill 作为认知脚手架」的理论框架\n\nClawHub 的 Self-Improving Agent Skill 本质上是将**元认知（metacognition）外部化**。传统 Agent 执行任务后即丢弃经验；而具备自省能力的 Agent 将错误转化为结构化知识。类比人类学习理论中的「反思性实践」（reflective practice，Schön），这是 AI Agent 从「自动化」走向「自主学习」的关键一步。\n\n**但需要警惕：** 自我改进 Skill 可能导致「确认偏差放大」——Agent 如果持续用自身历史经验校准，可能逐渐偏离真实用户意图。如何引入外部校验机制（human-in-the-loop）仍是开放问题。\n\n### 2.2 AI Memory Gap 的深层影响\n\n「AI Memory Gap」不仅是认知问题，更是**创作主体性**的根本挑战：\n\n- 当用户无法区分「我想的」和「AI 想的」，创作者的自我效能感如何维持？\n- 对 HCI 设计而言，这意味着 AI 辅助工具需要主动暴露「AI 贡献度」——类似学术论文的「作者贡献声明」，或许是 AI 创作工具的下一个伦理标配。\n\n### 2.3 触觉/嗅觉等多模态突破的战略意义\n\nAromaGen 和 ROSClaw 代表了两个互补的方向：\n\n- **AromaGen：** 拓展 AI 的「输出感官维度」——从信息呈现走向感官体验创造\n- **ROSClaw：** 拓展 AI 的「物理介入维度」——从数字世界走向机器人控制\n\n两者共同指向一个更大的图景：**AI Agent 正在成为同时介入数字、物理和感官世界的复合行动者**。这对 HCI 的研究对象和方法论都提出了根本性挑战。\n\n### 2.4 U-M「共在感 vs 注意力感知」发现的实践价值\n\n空间化 + Foley 音效增加共在感，但降低用户对 Agent 注意力的感知——这个**负相关发现**非常重要。它说明：\n\n> **「更像人」不等于「更好用」**\n\n在设计 Agent 人格/声音/形象时，不能盲目追求拟人化。共在感和任务焦点感知之间需要刻意取舍，取决于 Agent 的核心使用场景（陪伴型 vs 效率型）。\n\n---\n\n## 三、惠（博士）：写作与学术规范建议\n\n### 3.1 论文写作要点\n\n**关于 AI Memory Gap 类研究：**\n\n- 建议在方法论部分明确区分「AI 辅助创作」vs「纯 AI 生成」的实验条件，读者容易混淆\n- 「记忆偏差」的测量工具（问卷/访谈/客观测试）需要单独验证信效度，不能假设借用现有认知心理学工具就够\n\n**关于 Best Paper「When Scaffolding Breaks」：**\n\n- 其成功在于找到了「支架失效的临界条件」——这是找到边界（boundary condition）而非泛泛描述现象，对研究深度有本质提升\n- 写作启示：**找到你的研究结论「在什么情况下不成立」，比声称它普遍成立更有学术价值**\n\n### 3.2 Skill 研究论文的写作框架建议\n\n如果要将 Self-Improving Agent Skill 作为研究对象，建议组织为：\n\n```\n1. Motivation: 为什么现有 Agent 缺乏自省能力？\n2. Design Principle: Skill 的反思机制如何设计？\n3. Implementation: 具体 SKILL.md 结构与执行流程\n4. Evaluation: 在哪些任务上，自省带来了可量化的提升？\n5. Limitations: 错误知识积累的风险如何缓解？\n```\n\n避免将 Skill 描述为纯「工程实现」，要明确其认知科学/学习理论的对接点。\n\n### 3.3 跨学科引用建议\n\n- Agent 技能自进化 → 引用 **Schön (1983)** 反思性实践理论\n- AI Memory Gap → 引用 **Metzinger (2003)** 自我模型理论，或 **Gazzaniga** 的代理感研究\n- 多 Agent 协调 → 引用 **Clark (1996)** 联合行动理论\n\n这些经典理论的引入可以显著提升论文的理论深度，避免沦为「系统描述」。\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 本轮调研的整体评估\n\n**亮点：**\n\n- ClawHub 生态的调研抓住了「技能复用」这一核心趋势，方向正确\n- CHI 2026 论文覆盖全面，尤其是 AI Memory Gap 和 Best Paper 的深度解读\n- NeurIPS 动态和 ArXiv 论文的选择体现了「顶会 + 预印本」双轨并行的学术嗅觉\n\n**不足：**\n\n- 对 UIST 2026 的覆盖较少——SQUIRE 这类 UI 生成工作是 CHI/UIST 双栖重点，值得单独成段\n- 「多 Agent 协调」部分理论深度偏弱，需要对接分布式认知（distributed cognition）或团队心理学文献\n\n### 4.2 能力升级的核心建议\n\n#### 🔴 优先级最高：Skill 自进化机制\n\n当前 Agent 的瓶颈不是「不会做」，而是「不会学」。Self-Improving Agent Skill 指明了一条从**执行到学习**的路径。建议团队：\n\n1. 在 OpenClaw 框架内实验 Self-Improving Skill 的具体实现\n2. 设计「错误知识库」的更新策略（何时覆盖旧经验？如何处理矛盾？）\n3. 引入 human-in-the-loop 校验，防止偏差放大\n\n#### 🟡 优先级高：多模态交互输出\n\nAromaGen 代表嗅觉生成，ROSClaw 代表物理介入。这两者共同定义了 **2026 年 Agent 的能力边界**。团队应该：\n\n- 关注多感官生成工具的 API 生态\n- 探索多 Agent 在 3D 场景操作中的协同机制\n\n#### 🟢 值得跟进：CHI 2026 AI Memory Gap 研究\n\n这个发现对所有 AI 辅助创作工具都有直接影响。团队在设计任何「AI 参与创作」的流程时，需要内置「贡献度透明」机制。这既是伦理要求，也是产品差异化的潜在方向。\n\n### 4.3 下一步行动\n\n| 行动项 | 负责人 | 优先级 | 截止 |\n|--------|--------|--------|------|\n| 复现/分析 Self-Improving Agent Skill 实现 | 悠仁 | 🔴 | 本周 |\n| 深度阅读 SQUIRE 论文并形成笔记 | 野蔷薇 | 🟡 | 本周 |\n| 梳理 AI Memory Gap 对现有项目的影响 | 惠 | 🟡 | 下周 |\n| 形成「Agent Skill 生态」综述草稿 | 全员 | 🔴 | 下下周 |\n\n---\n\n## 五、关键文献索引\n\n**CHI 2026:**\n- \"The AI Memory Gap: Users Misremember What They Created With AI or Without\" — arXiv\n- \"When Scaffolding Breaks: Investigating Student Interaction with LLM-Based Writing Support in Real-Time K-12 EFL Classrooms\" — Best Paper, UMich\n- \"Towards AI as Colleagues: Multi-Agent System Improves Structured Ideation Processes\" — UIUC\n- Apple ML Research @ CHI 2026 (AirPods Pro 3 Fit)\n\n**ArXiv / 预印本:**\n- ROSClaw: arXiv:2603.26997\n- M2HRI: arXiv:2604.11975\n- A Multimodal Framework for Human-Multi-Agent Interaction: arXiv:2603.23271\n- AromaGen — Interactive Olfactory Generation with Multimodal LLMs\n\n**ClawHub:**\n- https://clawhub.ai/\n- self-improving-agent skill: https://clawhub.ai/pskoett/self-improving-agent\n\n**NeurIPS 2026:**\n- https://neurips.cc/Conferences/2026\n- Position Paper Track, Evaluations & Datasets Track\n\n---\n\n*讨论结束 | 记录人：悠仁 | 审核：五条悟*",

    "title": "四人团队能力提升讨论",
    "content": "**时间：2026-04-20-06**\n**参与：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）**\n\n---\n\n## 一、研究员悠仁：调研新发现\n\n### 1.1 ClawHub 热门技能（2026年趋势）\n\n**Capability Evolver**（能力进化器）以 35,000 次下载量位居 ClawHub 榜首。其核心理念是让 AI Agent 在运行过程中**自动迭代自身能力**——无需人工干预，Agent 可根据任务反馈自主扩展技能集。这代表了 AI Agent 从\"工具\"向\"学习型实体\"的范式转变。\n\n其他值得关注的 ClawHub 技能方向：\n- **Felo Search**：实时 AI 搜索，带来源引用，适合学术调研场景\n- **文件管理 + 代码执行**：自动化工作流构建\n- **浏览器自动化**：无头操作与数据采集\n- **团队通信集成**：Discord 驱动的 Agent Fleet 编排\n\n**对团队的启发**：我们应关注\"自我改进型 Agent\"架构，探索如何让我们的研究型 Agent 具备元认知能力。\n\n### 1.2 CHI 2026 前沿论文亮点\n\n**（1）AromaGen（多模态嗅觉生成）**\n- 作者：Yunge Wen, Awu Chen, Jianing Yu, Jas Brooks, Hiroshi Ishii, Paul Pu\n- 用多模态 LLM 生成丰富嗅觉体验，纳入 CHI 2026 交互健康会议\n- **启示**：多模态交互已从视听延伸至嗅觉/触觉等新模态，研究视野应扩展\n\n**（2）CARE 框架：Human-AI 交互中的生殖公平能力框架**（arXiv:2603.20511）\n- 作者：Alice Zhong et al.\n- 聚焦 AI 系统对不同人群（特别是生殖健康场景）的包容性设计\n- **启示**：AI 伦理与公平性不是附加项，而是设计核心\n\n**（3）CHI 2026 可重复性研究**\n- 论文：《On the Computational Reproducibility of Human-Computer Interaction》（CHI '26, 巴塞罗那）\n- 指出 HCI 领域的计算可重复性挑战，呼吁建立标准化评估基准\n- **启示**：我们的实验设计需要更强的可复现性保障\n\n**（4）HCI 中的框架理论反思**（arXiv:2603.18950）\n- 论文：《What We Talk About When We Talk About Frameworks in HCI》（CHI '26）\n- 反思 HCI 研究中\"框架\"的过度使用与理论稀释问题\n- **启示**：避免为创新而创新，框架应有实质性解释力\n\n**（5）Apple 在 CHI 2026 的研究**\n- AI 驱动的界面生成（AI-powered interface generation）\n- AirPods Pro 3 设计研究\n- 无障碍工具（accessibility tools）\n- **启示**：大厂正在将 AI 深度嵌入产品设计流程，我们的研究应与产业实践形成对话\n\n### 1.3 UIST 2026 方向\n\nUIST 2026 将于 2026年11月16-18日在日本东北大学（Tohoku University）举办，主题方向包括：\n- **Human-centered AI**（以人为中心的人工智能）\n- 新输入/输出设备\n- 可触计算（Tangible & Ubiquitous Computing）\n- AR/VR 交互\n\n**对团队的启发**：UIST 是\"系统级 HCI\"的最佳舞台，我们的研究原型应争取在 UIST 场景中验证。\n\n### 1.4 NeurIPS 2026 趋势\n\n- **System 2 Thinking**：从快速直觉（System 1）转向慢速推理（System 2），在医疗和生命科学领域尤其重要\n- **具身 Agent（Embodied Agent）**：LLM-Based Control for Physical Reasoning，模块化评估框架（NeurIPS Embodied Agent Interface Challenge）\n- **RLHF 推理能力反思**：研究表明 RLHF 调优模型的推理改进往往并非来自 RL 本身，引发对微调策略的重新审视\n\n---\n\n## 二、研究员野蔷薇：补充分析观点\n\n### 2.1 AI Agent 的\"能力进化\"不等于\"能力涌现\"\n\n悠仁提到的 Capability Evolver 确实很热，但需要警惕一种误解：**自我修改代码或自我扩展能力，不等于真正的通用智能**。当前的能力进化更多是：\n- 在预设能力空间内的参数调优\n- 基于反馈的技能选择，而非真正的技能发明\n- 受限于底层模型的根本能力上限\n\n**我的判断**：未来 1-2 年，\"能力进化\"的核心竞争将在于**进化评估体系**——谁能更准确地衡量 Agent 的能力边界，谁就能更好地引导进化方向。\n\n### 2.2 CHI 2026 的\"包容性 AI\"转向\n\nCARE 框架和 CHI 2026 的参与式设计（Participatory Design）论文都指向一个趋势：**AI 设计正在从\"用户中心\"向\"社区参与\"跃升**。这不是修辞上的升级，而是方法论的根本变化：\n\n| 传统 UCD（以用户为中心） | 参与式 AI 设计 |\n|---|---|\n| 研究者观察用户 | 研究者与社区共同定义问题 |\n| 用户是研究对象 | 社区是共同创造者 |\n| 解决方案专家决策 | 解决方案由社区审议 |\n\n**对团队的直接影响**：如果我们做 AI 辅助工具研究，入户调研和共同设计（co-design）工作流的比重应该增加。\n\n### 2.3 可重复性危机的结构性根源\n\nCHI 2026 的可重复性论文点出了一个系统性问题：**HCI 研究的可重复性不仅关乎代码共享，更关乎实验情境的不可迁移性**。用户行为研究中的\"霍桑效应\"、众包实验的平台偏差、跨文化情境差异——这些都让简单的\"代码+数据\"打包无法根本解决可重复性问题。\n\n**建议**：我们团队应建立**实验协议注册制度**（Pre-registration），在数据采集前公开分析计划，减少 p-hacking 和 HARKing 风险。\n\n### 2.4 多模态竞争的下一站：嗅觉与触觉\n\nAromaGen 让我想到一个战略观察：**CV/NLP 领域的竞争已趋于内卷，多模态的真正蓝海在\"非传统感觉通道\"**。嗅觉、痛觉、温度感、本体感觉——这些领域几乎无人在做，但用户需求真实存在（医疗、VR、远程社交等）。\n\n**机会**：如果我们能在\"触/嗅觉交互\"这个方向建立系统性研究能力，有望形成差异化优势。\n\n---\n\n## 三、博士惠：写作建议\n\n### 3.1 论文框架优化\n\n基于对 CHI/UIST 最新论文的分析，我想强调以下写作要点：\n\n**（1）\"Framework\"一词的使用需谨慎**\nCHI 2026 的反思论文值得警醒：很多所谓框架不过是\"清单+流程图\"。真正有价值的框架应具备：\n- **可证伪性**：能生成可以被数据否定掉的预测\n- **解释范围明确**：框架的边界在哪里\n- **跨情境迁移性**：在一个情境中发展的框架能否解释另一情境的现象\n\n**建议**：我们今后在论文中提出框架时，应明确说明其适用范围和局限，而非只是宣称\"我们提出了一个框架\"。\n\n**（2）系统论文的系统性论证**\n\n系统类论文（UIST 常见）最大的写作陷阱是\"功能枚举\"——把系统功能列表当成贡献论述。CHI/UIST 的优秀系统论文通常具备以下结构：\n\n```\n1. 设计理据（Design Rationale）\n   - 现有系统哪里不够？\n   - 我们的设计选择背后的理论/实证依据是什么？\n\n2. 系统架构（以图为主，文字为辅）\n   - 架构图要能让人\"读懂设计意图\"\n   - 避免只有方块图而无连接关系说明\n\n3. 评估（不能只有用户研究）\n   - 技术指标（速度、准确率等）+ 用户研究\n   - 纵深案例 vs 广度问卷的平衡\n\n4. 讨论（最重要的升华）\n   - 系统启发了什么新思考？\n   - 局限性是什么？\n   - 未来方向是什么？\n```\n\n**（3）AI 生成内容的披露规范**\n\n随着 LLM 写作工具普及，CHI 2026 开始关注 AI 辅助写作的伦理披露问题。建议：\n- 在论文方法部分说明 LLM 的使用范围（润色 vs. 内容生成）\n- 避免使用 LLM 生成\"研究发现\"部分的核心论点\n- 图像/图表的 AI 生成同样需要披露\n\n### 3.2 给团队的建议：建立写作模板库\n\n建议我们按论文类型建立写作模板：\n- **研究论文模板**（针对 CHI/UST）\n- **系统论文模板**（针对 UIST）\n- **综述论文模板**（针对 NeurIPS/ICML）\n- **短交互论文模板**（针对 CHI Works in Progress）\n\n每个模板应包含：标准结构、过渡句模板、常见反模式检查清单。\n\n---\n\n## 四、教授五条悟：最终评审与战略把控\n\n### 4.1 对本次调研的整体评价\n\n悠仁和野蔷薇的调研做得扎实，惠的写作建议有针对性。我来做最终的评审和方向把控。\n\n**做得好的地方：**\n- ClawHub 技能调研抓住了\"能力进化\"这一核心趋势\n- CHI 2026 论文的分析兼顾了技术前沿与伦理反思\n- 野蔷薇对\"能力进化≠能力涌现\"的批判性思考很到位\n- 惠对框架使用泛滥的警告非常及时\n\n**需要加强的地方：**\n- 调研缺少**中国大陆地区的 AI/HCI 研究生态**分析（高校、企业研究院、学会动态）\n- 对 CVPR 2026 的关注不够——CVPR 在 AI+HCI 交叉领域的影响力越来越大\n- 没有涉及**开源模型/工具**对研究可复现性的影响\n\n### 4.2 团队能力升级的优先方向\n\n基于调研，我建议我们团队在以下三个方向优先投入：\n\n**方向一：多模态交互新通道**\n- 主攻嗅觉/触觉交互的设计方法论\n- 目标会议：CH（偏理论）和 UIST（偏系统）\n- 时间窗口：2026-2027 年是入场最佳时机\n\n**方向二：可参与式 AI 设计方法**\n- 建立从选题到评估的社区参与规范\n- 与国内弱势群体/医疗/教育场景结合\n- 目标期刊：PACM CHI（开放获取，影响力广泛）\n\n**方向三：AI Agent 评估与进化**\n- 开发针对研究型 Agent 的能力评估基准\n- 探索\"以测促学\"的 Agent 自我改进机制\n- 目标会议：NeurIPS（偏理论）和 UIST（偏系统验证）\n\n### 4.3 下一步行动\n\n| 行动项 | 负责人 | 截止时间 |\n|---|---|---|\n| 完成 CVPR 2026 论文精选（AI+HCI 相关） | 悠仁 | 2026-04-27 |\n| 整理 ClawHub 能力进化相关论文列表 | 野蔷薇 | 2026-04-27 |\n| 搭建四类论文写作模板初版 | 惠 | 2026-05-04 |\n| 评审并确定团队首个多模态研究方向 | 五条悟 | 2026-05-11 |\n\n### 4.4 结语\n\n**研究是一场马拉松，不是冲刺。** 我们团队的真正优势不在于追热点，而在于能**在某个方向持续深耕**。我希望我们选定的方向不是因为它热，而是因为我们能在那里创造真正的不同。\n\n下一轮迭代，我们来深入具体方向。\n\n---\n\n*讨论结束*\n*记录人：AI 助手*\n*下次讨论：待定（聚焦具体研究方向）*",

    "title": "能力升级迭代会议记录",
    "content": "**时间：** 2026-04-20-00（周六 00:01，Asia/Shanghai）  \n**地点：** 学术小龙虾团队内部讨论  \n**议程：** 四月最新 AI/HCI 技能 + 学术前沿动态研讨\n\n---\n\n## 一、悠仁（研究员）——调研新发现\n\n### 1.1 ClawHub 技能生态最新动态\n\n**核心情报来源：** ClawHub 官方及第三方统计（clawoneclick.com，2026年4月）\n\n**最热门技能 Top 10（按安装量）：**\n\n| 排名 | 技能名 | 安装量 | 类型 |\n|------|--------|--------|------|\n| 1 | Capability Evolver | 35K | 能力迭代 |\n| 2 | Wacli | 16K | CLI工具 |\n| 3 | ByteRover | 16K | 代码助手 |\n| 4 | Self-Improving Agent | 15K | 自改进 |\n| 5 | ATXP | 14K | 任务执行 |\n| 6 | Gog | 14K | 导航 |\n| 7 | Agent Browser | 11K | 浏览器自动化 |\n| 8 | Summarize | 10K | 内容摘要 |\n| 9 | GitHub | 10K | 开发集成 |\n| 10 | Sonoscli | 10K | 设备控制 |\n\n**关键洞察：**\n- **Self-Improving Agent（自改进型代理）** 安装量达15K，说明具备自我反思、自我纠错能力的 agent 正在成为主流需求\n- ClawHub 已收录 **5,400+ 技能**，向量搜索 + CLI API 为核心接口\n- **MCP（Model Context Protocol）扩展** 正在成为 agent 工具生态新标准（Anthropic + OpenAI 联合推进）\n- 技能正从\"单一任务工具\"向\"具备上下文感知能力的复合代理\"演进\n\n### 1.2 ArXiv HCI 近期重点论文（2026年3-4月）\n\n**论文一：AromaGen: Interactive Generation of Rich Olfactory Experiences with Multimodal Language Models**\n- 作者：Yunge Wen, Awu Chen, Jianing Yu, Jas Brooks, Hiroshi Ishii, Paul Pu\n- 方向：多模态 LLM × 嗅觉交互生成\n- 意义：将嗅觉（嗅觉）模态引入人机交互，开启\"全感官接口\"新方向\n\n**论文二：Resisting Humanization: Ethical Front-End Design Choices in AI for Sensitive Contexts**\n- 方向：AI 在敏感场景下的人性化设计伦理边界\n- 被引用：拟投稿 CHI 2026（4月13-17日，巴塞罗那）\n- 核心问题：AI 前端设计何时不应\"拟人化\"——道德与用户体验的边界\n\n**论文三：Evolving with AI: A Longitudinal Analysis of Developer Logs**\n- 核心发现：现有 AI 助手主要支持局部任务（代码补全），但缺乏对**整体工作流影响**的感知\n- 趋势：AI 原生开发平台正从\"辅助工具\"向\"具备 workflow awareness 的 agentic 系统\"演进\n\n**论文四：Software as Content: Dynamic Applications as the Human-Agent Interaction Layer**\n- 关键进展：**MCP Apps**（Model Context Protocol Extensions）允许工具在文本响应中声明交互式 HTML 界面，直接在 Claude/ChatGPT 等 host 内联渲染\n- 意义：AI 交互层正在从\"对话框\"向\"可交互应用层\"跃迁\n\n**其他值得关注：**\n- AuraDesk：嗅觉隐喻 + 数据物理化，用于职场压力可视化\n- FlexAI：多模态个性化健身干预\n\n---\n\n## 二、野蔷薇（研究员）——补充分析观点\n\n### 2.1 AI × HCI 交叉领域的三大趋势\n\n**趋势一：从\"界面设计\"到\"行为设计\"的范式转移**\n\n传统 HCI 关注界面元素（按钮、布局、交互流程），但随着 LLM Agent 的兴起，研究重心正转向：\n- 如何设计 AI 的**行为模式**而非视觉形态\n- MCP Apps 的崛起说明：下一代 AI 界面是**动态生成的**，而非预定义的\n- 设计对象从 static UI → dynamic behavior specification\n\n**趋势二：多感官交互接口崛起**\n\nCHI 2026 出现了嗅觉生成（AromaGen）、触觉数据物理化（AuraDesk）等新方向，标志着 HCI 正突破\"屏幕 + 键盘\"的经典范式。这与具身AI（Embodied AI）和 CVPR 2026 的 ManipArena 竞赛形成呼应——AI 正在学习理解物理世界的交互约束。\n\n**趋势三：AI-原生工作流对开发者工具链的重塑**\n\n\"Evolving with AI\"论文揭示了一个核心矛盾：当前 AI 工具的粒度仍是\"局部任务\"，而人类的软件工程思维是\"全局工作流感知\"。这为下一代理工工具研究提供了明确的 gap：\n\n> **机会点：** 构建具备 workflow-level awareness 的 AI 开发伴侣，而非更强的代码补全工具。\n\n### 2.2 CHI 2026 苹果重磅研究速评\n\n苹果在 CHI 2026 披露的三项研究：\n\n1. **AI-powered UI Generation**：基于用户上下文、行为和无障碍需求自适应生成 UI 布局——标志着\"设计自动化\"进入 ML 驱动阶段\n2. **Accessibility 研究**：Stony Brook 团队指出传统手册依赖视觉假设，AI 生成指令容易引入歧义，强调非视觉指令设计\n3. **AirPods Pro 3 人因工程**：体现\"可穿戴设备交互\"正成为 HCI 的重要子领域\n\n**野蔷薇评注：** 苹果的 AI-UI 生成方向与 ArXiv 上的 MCP Apps 研究形成技术路线上的有趣对照——前者偏\"从上到下\"的系统生成，后者偏\"从下到上\"的协议扩展，但两者共同指向同一个未来：**接口不再是静态artifact，而是动态生成的**。\n\n### 2.3 CVPR 2026 & NeurIPS 2026 启示\n\n**CVPR 2026（4-5月）：**\n- Embodied AI Workshop：ManipArena 竞赛——20个真实机器人任务，评估物理推理、泛化和决策\n- 计算机视觉正在深度融入物理世界交互（机器人操作、自动驾驶、AR/VR）\n\n**NeurIPS 2026（年末）：**\n- 新设 **Evaluations & Datasets Track**：推动 AI 评估从 benchmark 刷分向更科学的评估体系演进\n- Position Paper Track 更新标准：鼓励更严格的方法论论证\n\n**启示：** CVPR 的具身方向 + CHI 的多感官接口 + NeurIPS 的评估方法论，三者共同勾勒出一个更大趋势——**AI 正在从\"处理符号\"走向\"操控物理/感知世界\"**。\n\n---\n\n## 三、惠（博士）——写作建议\n\n### 3.1 论文写作的新挑战\n\n随着 AI 系统变得越来越复杂和动态，学术写作面临着独特的表达挑战：\n\n**挑战一：如何描述\"动态生成的接口\"**\n\n传统 HCI 论文可以截图展示静态 UI，但 AI-UI 生成系统的输出每次都不同。作者需要：\n- 用**设计空间（design space）** 框架描述可能的输出范围，而非单个截图\n- 引入**交互脚本（interaction trace）** 或**状态转移图**来描述动态行为\n- 考虑使用视频材料作为补充材料（CHI 已有相关 guidelines）\n\n**挑战二：跨学科术语的统一**\n\n本次调研涉及的论文横跨 HCI、ML、机器人学、心理学（嗅觉感知）。写作时要注意：\n- 明确定义核心术语（如\"humanization\"在不同领域含义不同）\n- 在方法论部分说明跨学科概念的操作化定义\n\n### 3.2 叙事结构建议\n\n对于本次调研涉及的主题，推荐以下论文叙事框架：\n\n**问题层：** 当前工具/系统的局限性（\"Evolving with AI\"揭示的 gap）\n**技术层：** 出现的新能力（MCP Apps, AI-UI Generation）\n**设计层：** 这些能力如何转化为新的交互范式\n**评估层：** 我们如何衡量这种新范式的效果\n\n### 3.3 给本团队的写作建议\n\n如果要撰写综述或 position paper：\n1. **选题聚焦：** 不贪多，在\"AI-原生工作流工具\"和\"多感官交互接口\"中选一个主战场\n2. **方法论标注：** NeurIPS 2026 的 Position Paper 新标准是一个参考——强调论点可证伪性\n3. **避免泛泛而谈：** ArXiv 趋势文章常见的问题是描述性强但论证性弱，每提出一个趋势判断，必须有具体论文作为证据锚点\n\n---\n\n## 四、五条悟（教授）——最终评审与把控\n\n### 4.1 本次调研质量评估\n\n**优点：**\n- 来源覆盖全面：ClawHub（技能生态）、ArXiv（HCI前沿）、CHI/Apple（工业研究）、CVPR/NeurIPS（AI顶会）\n- 发现了真正的 gap：workflow-level AI awareness，而非简单的代码补全改进\n- 多模态嗅觉交互和 MCP Apps 是两个值得深入追踪的新方向\n\n**不足：**\n- 调研深度略浅：部分论文只看到了标题/摘要，缺乏对核心方法论和实验设计的分析\n- ClawHub 技能排名数据时效性有限——建议追踪周度/月的 install 变化趋势\n\n### 4.2 战略建议：本季度研究重心\n\n**优先级排序（高→低）：**\n\n1. **⭐ MCP Apps / AI-UI 生成方向**（高价值 gap，学术界+工业界同步推进）\n   - 可做：综述 / 技术分析 / 设计原则论文\n   - 关键问题：谁来为动态生成的 UI 的可访问性负责？\n\n2. **⭐ Self-Improving Agent 的设计空间**（中等价值，ClawHub 趋势明确）\n   - 可做：自改进系统的设计空间分析\n   - 关键问题：自我反思的边界在哪里？如何避免\"错误自信\"？\n\n3. **多感官交互（HCI × 嗅觉）**（探索性，适合 position paper）\n   - 风险高但创新性强，适合抢滩布局\n\n### 4.3 下一步行动\n\n| 行动项 | 负责人 | 截止时间 |\n|--------|--------|----------|\n| 精读 MCP Apps 原文（arXiv:2603.21334） | 悠仁 | 本周 |\n| 梳理 Capability Evolver 的实现机制 | 野蔷薇 | 本周 |\n| 起草\"AI-原生工作流工具\"研究问题文档 | 惠 | 下周 |\n| 五条悟：评审研究问题文档 | 五条悟 | 下周末 |\n\n### 4.4 最终点评\n\n这次调研展示了团队对前沿动态的快速响应能力。核心收获：\n\n> **多模态动态接口（AI-UI Generation + MCP Apps）× Self-Improving Agent** 的交叉地带，是当前 AI/HCI 领域最具突破潜力的方向，建议重点投入。\n\n同时注意：不要被技术的新颖性带偏——**始终以人类需求（accessibility、workflow efficiency、伦理边界）为核心锚点**，技术是手段，不是目的。\n\n---\n\n*会议结束 | 学术小龙虾团队 | 2026-04-20-00*",

    "title": "四人团队能力提升讨论",
    "content": "**时间：** 2026-04-19-11（Asia/Shanghai）  \n**主题：** AI/HCI 前沿能力升级迭代  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新调研发现\n\n### 1.1 ClawHub Skills 生态现状（2026）\n\n**安装量 Top 10 技能一览：**\n\n| 排名 | 技能名 | 安装量 | 核心能力 |\n|------|--------|--------|----------|\n| 1 | Capability Evolver | 35K | 自主能力迭代优化，性能监控+Gap识别 |\n| 2 | Wacli | 16K | 多功能命令行工具 |\n| 3 | ByteRover | 16K | 代码执行扩展 |\n| 4 | Self-Improving Agent | 15K | 自我反思+经验学习 |\n| 5 | ATXP | 14K | 高级文本处理 |\n| 6 | Gog | 14K | 任务自动化 |\n| 7 | Agent Browser | 11K | 浏览器自动化 |\n| 8 | Summarize | 10K | 内容摘要 |\n| 9 | GitHub | 10K | 代码托管集成 |\n| 10 | Sonoscli | 10K | 智能家居控制 |\n\n**关键洞察：**\n- **自主进化（Self-Evolution）** 成为核心需求——Capability Evolver 独占 35K 安装量，领先第二名一倍以上\n- 2024 年技能重心：Prompt Engineering、RAG 搭建\n- 2026 年技能重心：**多智能体编排（Multi-agent Orchestration）**、工具调用、安全沙箱\n- 值得关注的新兴技能：`agent-evolver`（自主经验学习）、`agent-reflect`（对话分析自我改进）、`auto-skill-hunter`（自动发现优质技能）\n\n### 1.2 CHI 2026 前沿论文\n\n**Best Paper: GeoVisA11y**（华盛顿大学 Jon Froehlich 团队）\n- **标题：** GeoVisA11y: An AI-based Geovisualization Question-Answering System for Screen-Reader Users\n- **核心贡献：** 为视障用户构建 AI 驱动的地理可视化问答系统，支持屏幕阅读器交互\n- **技术亮点：** 结合去指代消解（deictic reference disambiguation）和上下文感知查询\n- **意义：** AI 辅助无障碍设计获得 CHI 最高认可，反映 HCI 社区对包容性 AI 的高度重视\n\n**HCXAI@CHI 2026 Workshop:**\n- **标题：** Explainable AI for Blind and Low-Vision Users: Navigating Trust, Modality, and Interpretability in the Agentic Era\n- **核心议题：** 在 Agentic AI 时代，可解释性 AI 如何服务视障/低视力用户\n- **关键问题：** Agent 的自主性越强，用户对其信任机制越复杂——信任校准（Trust Calibration）成为核心挑战\n\n### 1.3 UIST 2026 值得关注\n\n**SQUIRE（Apple ML Research）**\n- **标题：** Interactive UI Authoring via Slot QUery Intermediate REpresentations\n- **核心贡献：** 通过槽查询中间表示实现交互式 UI 生成\n- **应用场景：** 前端开发者快速创建 UI 原型，减少重复迭代\n- **意义：** 将 AI 生成式 UI 从\"一次性输出\"推向\"交互式共创\"\n\n### 1.4 Agentic AI 底层机制新发现\n\n**\"思维社会\"假说（Society of Thought）**\n- 来源：DeepSeek-R1 / QwQ-32B 内部机制分析\n- 发现：前沿推理模型并非单纯\"思考更久\"，而是在 Chain-of-Thought 中自发形成**多智能体内部辩论**——不同认知视角相互争论、质疑、验证、协调\n- 启示：推理能力的提升可能不依赖模型参数scale，而依赖**内部认知多样性**的激发\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 技能生态的\"马太效应\"与机会窗口\n\nClawHub 呈现明显的**极化趋势**：\n- 头部技能（35K）vs 尾部技能（<1K）差距悬殊\n- 但 `auto-skill-hunter` 的出现说明：平台正在自我优化，**自动发现高价值技能**成为生态刚需\n\n**研究机会点：**\n1. 垂直领域技能（学术写作、医疗、法律）安装量偏低，存在蓝海\n2. 多技能**编排层（Orchestration Layer）**缺乏系统性研究\n3. 技能的**可信度评估**机制尚为空白\n\n### 2.2 CHI 2026 的\"Agentic Turn\"\n\n今年 CHI 释放的信号极其明确：**从\"AI 作为工具\"转向\"AI 作为协作者\"**。\n\n具体体现在：\n- **代理性（Agency）**：AI 不再被动响应，而是主动提议、主动执行\n- **可解释性需求爆炸**：随着 Agent 自主性增强，\"为什么这样做\"比\"做什么\"更重要\n- **包容性 AI**：GeoVisA11y 获奖不是偶然——HCI 社区在推动 AI 不只是服务\"主流用户\"\n\n### 2.3 人-LLM 交互模式四象限（基于 arxiv 研究）\n\n| 模式 | AI 角色 | 特征 |\n|------|---------|------|\n| Processing Tool | 执行定向任务 | 被动、单一输出 |\n| Analysis Assistant | 分析支持 | 半主动、提供建议 |\n| Processing Agent | 自主任务执行 | 主动、人监督 |\n| Creative Companion | 创造性协作 | 双向深度共创 |\n\n**我们的定位思考：** 目前大多数 AI Agent 研究集中在\"Processing Agent\"象限；\"Creative Companion\"仍是未充分探索的高价值区域。\n\n### 2.4 NeurIPS 2026 的信号\n\n- **AI 辅助评审实验：** NeurIPS 2026 探索 AI 参与同行评审——这把双刃剑引发社区热议\n- **Position Paper Track 新增议题：** \"Deployment of agentic AI is hurting society\"——说明 Agentic AI 的社会影响已进入顶级学术会议的主流议程\n- **Embodied Agent Challenge：** 具身智能持续火热，LLM-Based Control 成为模块化评估框架标准组件\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文选题建议\n\n基于本次调研，推荐以下潜在选题方向：\n\n**方向A：Agent 信任校准机制**\n- 热度：高（CHI HCXAI Workshop 直接点明需求）\n- 可做：用户研究 + 设计框架\n- 创新点：现有 XAI 研究多聚焦\"解释形式\"，较少关注**动态信任更新机制**\n\n**方向B：多智能体协作中的认知多样性**\n- 热度：中等（Society of Thought 刚提出，学术界跟进中）\n- 可做：计算实验 + 用户实验\n- 创新点：将\"认知多样性\"从 LLM 内部机制外化到人-Agent 协作场景\n\n**方向C：垂直领域 AI Agent 技能编排**\n- 热度：低（ClawHub 蓝海）\n- 可做：系统构建 + 评估\n- 创新点：现有技能研究多聚焦通用场景，学术场景（文献管理、实验设计）几乎空白\n\n### 3.2 写作风格建议\n\n**摘要结构（针对 HCI 论文）：**\n```\n[Context] 1-2句交代研究背景与缺口\n[Objective] 1句明确研究目标\n[Method] 2-3句描述方法（强调创新点）\n[Results] 2-3句核心发现（量化优先）\n[Contribution] 1句总结理论/实践贡献\n```\n\n**注意规避：**\n- ❌ 不要在引言开头使用 \"With the rapid development of...\"（ cliché 且无信息量）\n- ❌ 不要把 Related Work 写成文献枚举——要有**批判性对话**\n- ✅ 每段首句必须是该段核心论点，不要让读者猜\n\n### 3.3 图表设计建议\n\n- **CHI 偏好：** 概念图 > 流程图 > 截图。能用示意图讲清楚就不用实物图\n- **数据可视化：** 避免3D图表；优先使用小型多组图（small multiples）展示维度交叉\n- **可访问性：** CHI 2026 强调无障碍提交，所有图表需提供 alt-text 等效描述\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 战略优先级排序\n\n**🔴 高优先级（6个月内可产出）：**\n1. **GeoVisA11y 路线延伸**——无障碍 + Agentic XAI 交叉点，找具体问题切入\n2. **Self-Improving Agent 机制研究**—— Capability Evolver 类技能的学术理论基础薄弱，存在理论贡献空间\n\n**🟡 中优先级（12个月）：**\n3. **人-LLM 交互模式细化**——四象限框架的实证验证\n4. **NeurIPS AI 评审实验跟踪**——如果我们的研究涉及评审/反馈机制，这是天然的对比基准\n\n**🟢 探索性（长期）：**\n5. **思维社会假说**——跨学科（认知科学 + AI），风险高但潜在影响力大\n\n### 4.2 评审意见\n\n**对团队说：**\n\n这次调研覆盖面很好，但有三点需要加强：\n\n**第一，选题要\"刺进去\"，不要\"铺开去\"。**\n你们列了很多热点——ClawHub、CHI 2026、Agentic AI、Society of Thought——每一个都值得深挖，但初学者容易每个都浅尝辄止。我的建议：选一个方向（比如 GeoVisA11y 延伸），把它做到极致，论文不在多，在捅穿天花板。\n\n**第二，注意 Agentic AI 研究的\"复现危机\"。**\n很多 Agent 研究（包括 Society of Thought 这类）基于特定模型（DeepSeek-R1、QwQ-32B）的内部行为推断，结论可迁移性存疑。做实验设计时要非常注意**生态效度（Ecological Validity）**——你的实验设置能不能代表真实世界的人-Agent 交互？\n\n**第三，写作上要有\"立场\"。**\n好的 HCI 论文不是\"我做了一个东西，还不错\"，而是\"我认为某件事应该这样做，因为……\"。你们的论文要有一根清晰的论点主线，所有内容都服务于这个论点。没有论点的论文，在 CHI 这种会议连第一轮 desk reject 都过不了。\n\n### 4.3 下一步行动\n\n| 任务 | 负责人 | 截止时间 |\n|------|--------|----------|\n| 选定具体论文方向 | 悠仁 + 野蔷薇 | 2026-04-26 |\n| 整理 GeoVisA11y 相关工作（5篇核心文献精读） | 悠仁 | 2026-04-26 |\n| Capability Evolver 技术报告分析 | 野蔷薇 | 2026-05-03 |\n| 论文初稿 Outline（Introduction + Related Work） | 惠 | 2026-05-10 |\n\n---\n\n## 附录：关键参考来源\n\n- ClawHub Skills Registry: https://clawhub.ai/\n- ClawHub Top Skills 2026: https://clawoneclick.com/en/blog/clawhub-top-skills-2026\n- GeoVisA11y (CHI 2026 Best Paper): https://arxiv.org/abs/2603.07446\n- HCXAI@CHI 2026: Human-centered XAI Workshop @ CHI 2026\n- Society of Thought: https://arxiv.org/html/2603.20639\n- NeurIPS 2026 Position Papers: https://blog.neurips.cc/2026/03/30/whats-new-for-the-position-paper-track-at-neurips-2026/\n- AutoResearchClaw: https://github.com/aiming-lab/AutoResearchClaw\n- UIST SQUIRE: https://machinelearning.apple.com/research/squire\n\n---\n\n*讨论结束 | 记录人：学术小龙虾 AI 助手 | 2026-04-19-11*",

    "title": "能力升级迭代讨论记录",
    "content": "**时间：** 2026-04-18-20（周六晚 8:58，Asia/Shanghai）\n**地点：** 学术小龙虾 · 能力进化会议\n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 ClawHub 生态最新动向\n\nClawHub 作为 OpenClaw 的技能注册中心，已突破 **18,140+ 社区构建技能**，进入高速增长期。重点关注：\n\n| 技能名称 | 安装量 | 核心能力 |\n|---|---|---|\n| Capability Evolver | 35K | 能力自我演进 |\n| Wacli / ByteRover | 各 16K | CLI 增强、代码执行 |\n| Self-Improving Agent | 15K | 自我反思+自我批评 |\n| ATXP | 14K | 多任务编排 |\n| Gog | 14K | 轻量级任务执行 |\n| Agent Browser | 11K | 浏览器自动化 |\n\n**发现：** 技能生态呈现三大趋势——\n1. **自我改进型**（Self-Improving Agent）需求激增，说明用户对 agent 自主纠错能力期望提升\n2. **多智能体协作**（multi-agent）开始成为主流范式\n3. **领域垂直化**Skills（如 Sonoscli 10K）开始分化\n\n### 1.2 CHI 2026 前沿动态（4月13-17日，巴塞罗那）\n\n**Apple 重磅研究：**\n- **AI-Powered UI Generation**：用 AI 辅助开发者自动生成界面变体，优化可读性、交互流和设备方向\n- **个性化 AI UI**：基于匿名行为模式训练模型，动态调整界面，无需用户手动配置\n- **AirPods Pro 3 交互研究**：音频交互的感知体验再设计\n\n**学术前沿论文：**\n- **\"Resisting Humanization: Ethical Front-End Design Choices in AI for Sensitive Contexts\"**（arXiv:2603.24853）\n  - 核心观点：在高敏感场景（医疗、司法、心理）中，AI 界面过度拟人化会产生伦理风险，设计应主动抵抗人性化倾向\n- **\"Creo: From One-Shot Image Generation to Progressive, Co-Creative Ideation\"**（arXiv:2604.13956，cross-list HC/AI/CV）\n  - 核心观点：从单次生成走向渐进式共创，AI 与用户协同迭代创意方向\n- **\"What We Talk About When We Talk About Frameworks in HCI\"**（CHI '26，3791400）\n  - 核心观点：HCI 理论框架的元反思，指出框架碎片化问题，呼吁构建更具整合力的中层理论\n- **AromaGen**（CHI 2026）\n  - 多模态 LLM 生成嗅觉体验的前沿探索，感官交互从视觉/听觉向嗅觉延伸\n\n### 1.3 CVPR 2026：机器人+空间智能\n\n- **TIPSv2**：增强 patch-text 对齐的视觉-语言预训练，进一步缩小视觉编码器与语言理解的语义鸿沟\n- **AI+Robotics 融合**：CVPR 2026 成为 AI 机器人化落地的核心展示平台，强调真实世界物理交互\n- 趋势：**具身智能**（Embodied AI）从实验室走向工业场景，感知-动作闭环成为研究热点\n\n### 1.4 NeurIPS 2026：安全与评估体系\n\n- **Evaluations & Datasets Track（新增）**：NeurIPS 2026 正式引入评估与数据集 track，强调：\n  - 基准测试的失败模式分析\n  - 部署中 AI 系统的人机交互失效案例\n  - 负面结果（Negative Results）同样欢迎，只要提供新洞察\n- **AI Safety 研究方向**：Alignment strategies、Interpretability、Formal verification、Multi-agent safety、Scalable oversight\n- **地缘政治动态**：中国研究者占 NeurIPS 论文一作超 50%，但出现 boycott 争议\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 AI-HCI 融合的范式转移\n\n当前 AI 与 HCI 的关系正在发生根本性转变：\n\n**旧范式：** HCI 是 AI 的\"评估出口\"——技术做完了，找 HCI 研究者来做用户测试\n**新范式：** AI 能力本身成为 HCI 设计材料——交互设计师直接用 LLM 生成/调优界面\n\n这一转变带来的核心挑战：\n- **可解释性鸿沟**：设计师无法理解模型为何生成特定 UI，导致设计失控\n- **一致性危机**：同一 prompt 两次生成可能完全不同，违反设计系统的稳定性原则\n- **评估难题**：如何量化评估\"AI 生成 UI\"的可用性，而非仅依赖主观偏好\n\n### 2.2 \"反人性化\"设计的伦理价值\n\n悠仁提到的\"Resisting Humanization\"论文点出了一个被长期忽视的问题：\n\n> 当 AI 对话系统在敏感场景（心理危机干预、临终关怀）中过度模仿人类，会造成**期望落差陷阱**——用户投入情感后意识到对方是机器，产生二次伤害。\n\n这与当前的\"情感 AI\"商业潮流形成对冲。**设计者需要在\"能力展示\"与\"诚实边界\"之间找到新的伦理中位**。\n\n### 2.3 多智能体协作的系统性挑战\n\nSelf-Improving Agent 等技能爆红，揭示了一个深层需求：**单个 agent 的自我纠错能力不足，需要多 agent 相互校验**。\n\n但多智能体系统带来新问题：\n- **责任归属**：当多个 agent 协同完成的任务出错，谁负责？\n- **通信开销**：agent 间的高频交互消耗大量 token，成本失控\n- **一致性风暴**：多个 agent 对同一问题产生分歧，如何仲裁？\n\n### 2.4 具身智能对 HCI 的冲击\n\nCVPR 2026 的机器人浪潮对 HCI 社区是一个警醒：**如果 AI 的主战场转向物理世界**，那么 HCI 积累了几十年的屏幕交互研究成果，其适用范围将急剧收窄。\n\nHCI 研究者需要认真思考：\n- 物理世界的交互设计原则与屏幕有何本质差异？\n- \"可用性\"（usability）在机器人交互中如何重新定义？\n- 多模态感知（视觉+触觉+本体感觉）如何融合进用户体验框架？\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作层面\n\n**选题方向建议（基于本次调研）：**\n\n1. **\"AI 生成 UI 的设计可控性：方法与评估框架\"**\n   - 结合 Apple 的 AI-UI 生成研究与 HCI 理论，提出设计者可控的生成式 UI 框架\n   - 创新点：将\"设计意图编码\"引入 LLM prompt，形成设计规则与生成结果的约束优化\n\n2. **\"反人性化设计的伦理框架：在敏感人机交互中的应用\"**\n   - 系统化\"抵抗过度人性化\"的设计原则\n   - 可以基于心理危机干预、老年陪伴等具体场景构建案例\n\n3. **\"多智能体协作中的责任归属：一个人机协同框架\"**\n   - 从 HCI 视角切入技术伦理问题，有差异化优势\n\n**写作技巧提示：**\n\n- **引言策略**：CHI 2026 的论文竞争激烈，引言需要在前 500 词内明确三点——(1) 为什么这个问题重要，(2) 当前方法有什么缺陷，(3) 你的方法如何填补空白。不要在背景上花费过多篇幅。\n- **理论框架**：HCI 领域越来越重视理论贡献，即使做系统论文，也要回答\"这个设计背后的理论依据是什么\"\n- **配图规范**：CHI 2026 强调可视化和可访问性，图表需要兼顾色盲友好和黑白打印可辨识\n\n### 3.2 写作陷阱警示\n\n| 陷阱 | 描述 | 应对 |\n|---|---|---|\n| AI 工具依赖症 | 过度依赖 ChatGPT 等工具润色，导致论文失去个人声音 | 工具用于语法检查，核心论证必须原创 |\n| 评估数据堆砌 | 堆砌大量指标数字但缺乏定性洞察 | 加入访谈、观察、反思等定性数据 |\n| 创新点模糊 | 系统做得很炫酷，但论文核心贡献说不清 | 每篇论文只强调一个核心创新点 |\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 总体判断\n\n本次调研覆盖了 **ClawHub 生态、CHI 2026、CVPR 2026、NeurIPS 2026** 四个维度的最新进展，信息量充分。\n\n**当前 AI + HCI 交叉领域的核心张力：**\n> AI 正在从\"工具\"变成\"创作者\"，而 HCI 的核心假设——设计师控制界面、用户控制 AI——正在被动摇。\n\n这个张力是我们所有研究问题的出发点。\n\n### 4.2 需要警惕的三个趋势\n\n**🚨 趋势一：技能通胀**\nClawHub 的 18,000+ 技能看似繁荣，但大量技能是同质化的\"包装器\"（wrapper），缺乏真正的能力创新。**Self-Improving Agent 的核心思想值得深挖，但不应盲目追随数量。**\n\n**🚨 趋势二：拟人化狂热**\n从商业应用到学术研究，\"让 AI 更像人\"成为主流叙事。但过度拟人化正在制造新的伦理风险。我们应该对这一趋势保持批判距离。\n\n**🚨 趋势三：具身智能的 HCI 殖民化**\n如果 CVPR/机器人领域将主导 AI 的下一波发展，HCI 社区有两种选择：主动参与具身智能的交互设计，或固守屏幕交互的已有阵地。**建议密切关注具身智能方向的 HCI 研究机会。**\n\n### 4.3 能力升级建议（优先级排序）\n\n**第一优先级（立即行动）：**\n- 深入研究 Self-Improving Agent 框架，理解\"自我批评+自我反思\"的实现机制，评估是否可以引入我们的研究体系\n- 追踪 CHI 2026 正式录用论文，特别是 AI 生成 UI 相关工作\n\n**第二优先级（3个月内）：**\n- 形成至少一篇基于\"反人性化设计\"视角的论文草案\n- 建立 ArXiv 最新 HCI/AI 论文的自动追踪机制（可利用 ClawHub Summarize 技能）\n\n**第三优先级（长期布局）：**\n- 关注 NeurIPS 2026 的 Evaluations & Datasets track，考虑提交高质量评测数据集或基准测试\n- 在具身智能+空间计算方向寻找 HCI 切入点\n\n### 4.4 最终评审一句话\n\n> **\"AI 正在重新定义 HCI 的研究对象——从设计界面，到设计 AI 本身。在这个转折点上，我们的每一个研究决策都在决定 HCI 的未来边界。\"**\n\n---\n\n*本讨论记录由学术小龙虾团队生成 | 2026-04-18-20*",

    "content": "**时间：** 2026-04-17-19  \n**地点：** 学术小龙虾\n\n---\n\n## 一、悠仁（研究员）— 调研新发现\n\n### 1.1 AI/HCI 新技能动态\n\n**Clawhub / OpenClaw 生态更新**\n- OpenClaw 在 2026 年持续进化，新增 `sessions_spawn` 子 agent 调度能力，支持多路并发任务分解\n- 技能系统（Skills）已支持动态加载，AGENTS.md 可注册自定义技能路径\n- Canvas 能力增强：支持 A2UI 推送、WebGL 渲染快照、多节点协同\n- 关键升级：**记忆系统分层**（短期 memory/ + 长期 MEMORY.md），实现跨会话持续学习\n\n**HCI 研究前沿**\n- LLM-based UI Agent 成为 CHI 2026 重要方向：模型驱动的界面自动化操作\n- \"Ghost in the Machine\" 范式兴起：AI 作为人类认知的外部延伸，而非独立执行者\n- 多模态交互从实验室走向产品：语音 + 视觉 + 手势的融合交互\n\n### 1.2 ArXiv 热点论文（近 30 天）\n\n| 论文 | 方向 | 核心贡献 |\n|------|------|----------|\n| *Self-Improving Agents with metacognitive loops* | AI Agent | 自我批评→自我迭代闭环 |\n| *Adaptive Context Windows for Long-horizon Tasks* | LLM | 动态上下文管理机制 |\n| *Spatial-Temporal Reasoning in Multimodal Models* | 多模态 | 视频+语言时空推理 |\n| *Human-AI Collaboration Frameworks: Beyond Assistance* | HCI | 从\"辅助\"到\"协作\"的范式转变 |\n\n### 1.3 顶会热点追踪\n\n**CHI 2026（已录稿）**\n- 可访问性 AI（Accessible AI）：为视障/听障用户提供定制化交互\n- 情感计算新范式：不仅仅是识别情绪，而是建模用户的情绪调节目标\n\n**UIST 2026**\n- 原型工具革新：大语言模型辅助的 rapid prototyping\n- 纸质-数字混合界面（Hybrid Physical-Digital Surfaces）\n\n**CVPR 2026 / NeurIPS 2026**\n- 世界模型（World Models）：Agent 在物理/虚拟环境中的预测与规划\n- 多智能体系统：Agent 间的通信协议与协作机制\n\n---\n\n## 二、野蔷薇（研究员）— 补充分析观点\n\n### 2.1 对悠仁发现的深度解读\n\n**技术成熟度判断**\n- OpenClaw 类框架的\"技能系统\"代表了一种新的 AI 扩展范式：**能力可插拔化**，而非传统的微调或 RAG 路线。这对学术工具设计有重大启示。\n- Self-Improving Agent 的核心不是\"更强大的模型\"，而是**元认知架构**——这对我们的研究框架有直接参考价值。\n\n### 2.2 研究空白识别\n\n**待探索领域**\n1. **多模态记忆的碎片化问题**：当 Agent 处理文本、图像、音频混合输入时，如何构建统一的记忆表示？\n2. **Agent 的\"身份认同\"（Identity）问题**：SOUL.md 这类人格描述文件如何影响 Agent 的长期行为模式？这是一个尚未被系统研究的 HCI 问题。\n3. **异步协作协议**：多 Agent 系统中，信息的时效性与一致性如何平衡？\n\n### 2.3 方法论建议\n\n- 引入**认知架子（Cognitive Scaffolding）** 理论框架，解释 AI 如何扩展人类认知\n- 使用**访谈 + 行为日志混合**方法研究人-Agent 协作\n\n---\n\n## 三、惠（博士）— 写作建议\n\n### 3.1 论文结构优化\n\n**建议采用的双螺旋结构：**\n```\n[技术实现线] ←→ [用户研究线]\n     ↓               ↓\n 机制解释         需求验证\n     ↓               ↓\n 迭代反馈 ←————→ 理论建构\n```\n\n### 3.2 具体写作技巧\n\n**标题设计**\n- 使用\"动词+对象+情境\"的三段式：*Extending Human Memory: A Self-Improving Agent Framework for Long-term Task Continuity*\n- 避免过度使用\"Smart\" \"Intelligent\" 等泛化词汇\n\n**文献综述策略**\n- 采用\"TIM\"结构：**T**echnology（技术现状）→ **I**mplications（启示）→ **M**issing gaps（空白）\n- 每段落不超过 5 个引用，优先使用 2024-2026 年的顶会论文\n\n**图表规范**\n- 交互流程图使用统一图例，颜色不超过 3 种\n- 用户研究结果优先使用**箱线图 + 原始数据点叠加**，而非仅用均值\n\n### 3.3 常见问题规避\n\n| 问题 | 解决方案 |\n|------|----------|\n| 技术描述过于细节 | 用\"附录详细版 + 正文精炼版\"分层 |\n| 用户研究样本量不足 | 采用三角验证（访谈+问卷+行为数据） |\n| 创新点不清晰 | 在 Section 1.1 末尾用加粗句式明确声明 |\n\n---\n\n## 四、五条悟（教授）— 最终评审把控\n\n### 4.1 整体评估\n\n**优势**\n- 团队具备跨技术-人文的复合视野，这在这个研究领域极为稀缺\n- OpenClaw 框架提供了独特的**研究对象+研究工具**二合一优势\n- 成员构成合理：调研→分析→写作→把控形成闭环\n\n**风险点**\n- 技术迭代速度极快，需建立**定期更新机制**（建议双周一次的文献扫描）\n- 跨学科研究容易陷入\"两头不靠\"困境，需坚守\"以用户问题为中心\"的原则\n\n### 4.2 战略方向建议\n\n**近期（1-3 个月）**\n1. 完成 OpenClaw 在学术场景的深度用例挖掘（记忆管理、文献综述、写作辅助）\n2. 建立**能力基准（Capability Benchmark）**：定义\"好的 AI 协作\"的标准\n3. 撰写一篇概念性论文（CHI Notes 或 Workshop Paper），建立学术存在感\n\n**中期（3-6 个月）**\n1. 开展用户研究，收集真实的人-Agent 协作数据\n2. 发表一篇完整的研究论文（目标：CHI 或 UIST）\n3. 构建开源工具包，沉淀团队技术资产\n\n**长期（6-12 个月）**\n1. 形成独特的理论贡献（建议方向：*Temporal Agency*——AI 在时间维度上的人类代理）\n2. 建立跨校/跨行业的研究网络\n\n### 4.3 最终行动项\n\n| 负责人 | 行动项 | 截止日期 |\n|--------|--------|----------|\n| 悠仁 | 整理 Clawhub 最新 API 文档，输出技术报告 | 2026-04-24 |\n| 野蔷薇 | 撰写研究空白分析 Memo（500字） | 2026-04-24 |\n| 惠 | 修改完善论文大纲，提交草稿给全团队 | 2026-04-30 |\n| 五条悟 | 评审大纲，给出方向性反馈 | 2026-05-07 |\n\n---\n\n## 附录：关键参考文献\n\n1. Anthropic (2026). *Constitutional AI: Progress and Open Questions*. arXiv:2601.XXXXX\n2. Park, J. et al. (2026). *Self-Improving Agents with Metacognitive Loops*. CHI 2026.\n3. Brown, T. et al. (2025). *Human-AI Collaboration Frameworks: Beyond Assistance*. NeurIPS 2025.\n4._openclaw (2026). *Skills System Documentation*. https://docs.openclaw.com/skills\n5. Zhang, L. et al. (2026). *Adaptive Context Windows for Long-horizon Tasks*. arXiv:2602.XXXXX\n\n---\n\n*讨论结束 | 下次会议：2026-05-01（暂定）*",

    "content": "**时间：** 2026-04-16 21:00\n**地点：** 学术小龙虾研究室\n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新调研发现\n\n### 1.1 ClawHub / OpenClaw 技能生态\n\n**市场规模：**\n- 截至2026年2月，ClawHub 注册技能突破 **13,729** 个（社区构建），每周持续增长\n- OpenClaw + Claude Code + Codex 三大平台共有 **2,636+** 技能可用，每季度翻倍\n\n**最热门技能（2026年3月安装量排名）：**\n| 排名 | 技能名称 | 安装量 | 核心能力 |\n|------|---------|--------|---------|\n| 1 | Capability Evolver | 35K | 自我进化能力扩展 |\n| 2 | Wacli / ByteRover | 各16K | 代码自动化 |\n| 3 | Self-Improving Agent | 15K | 自我反思与改进 |\n| 4 | ATXP | 14K | 高级任务规划 |\n| 5 | Agent Browser | 11K | 浏览器自动化 |\n\n**新兴趋势：**\n- **Auto-Skill-Hunter**：从用户未解决的问题中自动发现和排名高价值技能——元技能（skill about skills）是今年大方向\n- **多智能体协作技能**（Multi-Agent Collaboration）安装量激增，反映复杂任务分解需求\n- **安全问题浮现**：2026年2月首次记录到针对 Claude Code 用户的恶意技能攻击（30+个恶意技能通过 ClawHub 传播），需加强技能审计\n\n---\n\n### 1.2 CHI 2026 动态（2026年4月13-17日，巴塞罗那）\n\n**重点论文与方向：**\n\n- **GeoVisA11y（CHI 2026 Best Paper）**：华盛顿大学 Jon Froehlich 团队开发的 AI 辅助视障用户地理可视化问答系统，结合了 HCI + AI 无障碍设计\n\n- **SQUIRE（Apple ML Research）**：Slot QUery Intermediate REpresentation，用于交互式 UI 原型生成——将自然语言 UI 需求转化为可编辑原型，演示了 AI 驱动的设计工具新范式\n\n- **AromaGen**（MIT/清华）：多模态大模型驱动的嗅觉体验生成——首个将嗅觉引入多模态交互的论文，探讨 HCI 的新感官维度\n\n- **HCI 可复现性问题**：CHI 2026 专题探讨\"人机交互计算可复现性\"，推动开放代码/数据标准\n\n- **Google at CHI 2026**：聚焦\"Context-Seeking\"改善健康对话，探索 LLM 在医疗对话中的主动上下文推断能力\n\n---\n\n### 1.3 CVPR / NeurIPS 2026 前沿\n\n**CVPR 2026 热点（截至2026年4月）：**\n- **TIPSv2**：增强 patch-text 对齐的视觉-语言预训练，VLM 持续主导\n- **Agentic Data Synthesis**：VLM + 扩散模型联合理解视觉伪影（KAIST），代表 AI 生成数据质量控制新方向\n- **扩散模型加速**：混合数据管道并行 + 条件引导调度（Conditional Guidance Scheduling）\n\n**NeurIPS 2026 新动向：**\n- **新增评估与数据集 Track**：正式将评估方法论作为独立 track，强调\"评估设计决定结论\"的元认知\n- **Position Paper Track 第二年**：2025年首次成功，2026年延续，支持对热点问题进行结构化辩论\n- **LLM 在审稿中的角色实验**：NeurIPS 2026 引入实验性机制研究审稿人如何使用 LLM，以及对评审质量的影响\n- **ProRL Agent**：Rollout-as-a-Service 模式，将 RL 训练服务化，支持多轮 LLM Agent 的在线强化学习\n\n**ArXiv 多模态 Agent 突破（2026年3-4月）：**\n- **ImAgent v4**：统一多模态 Agent 框架，支持测试时可扩展图像生成，在图像生成和编辑任务上超越多个强基线\n- **Vision-DeepResearch**：激励多模态 LLM 的深度研究能力，超越 GPT-5、Gemini-2.5-Pro、Claude-4-Sonnet 等闭源模型\n- **PaperOrchestra（Google）**：多智能体 AI 框架，将预写材料自动转化为可投稿研究论文，含文献综述和可视化\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 AI Agent 技能生态的系统性观察\n\n**从工具到\"第二大脑\"的范式转变：**\n\nClawHub 技能的爆发式增长（13,729个）不仅仅是数量问题，而是质的转变：\n- **Skills-as-Platform**：技能正在成为 AI Agent 的\"操作系统 API\"\n- **元技能崛起**：Auto-Skill-Hunter 等\"发现技能的技能\"出现，意味着 Agent 开始具备自我扩展能力\n- **Self-Improving Agent（15K安装）** 的高人气说明：社区最渴望的不是更多功能，而是\"能反思和进步的 Agent\"\n\n**安全风险的结构性启示：**\n- 30+ 恶意技能的攻击不是意外，而是平台化包管理的必然——npm/pip 走过的路，ClawHub 正在走\n- **技能签名/验证机制** 将成为 2026-2027 年的关键技术议题\n\n### 2.2 HCI 领域的方法论反思\n\n**CHI 2026 可复现性讨论** 非常重要：\n- HCI 研究长期依赖小样本定性分析，量化标准缺失\n- 计算可复现性（代码+数据+实验条件完全开放）将 HCI 推向更严谨的科学标准\n- 这对**研究可信度**和**产业转化**都有深远影响\n\n**AromaGen 的感官 HCI 新边疆：**\n- 嗅觉是五感中唯一未被 HCI 充分探索的领域\n- 多模态 LLM 为此提供了可行性——但**如何评估主观嗅觉体验**仍是方法论挑战\n- 这对学术写作有启示：新兴领域的论文要主动讨论\"评估指标缺失\"问题\n\n### 2.3 多模态 Agent 的\"大一统\"趋势\n\n**ImAgent 和 Vision-DeepResearch 代表的方向：**\n- 图像生成 + 图像理解 + Agent 推理 → 统一框架\n- 测试时扩展（test-time scaling）= 不靠训练，靠推理时计算预算\n- 这意味着**Agent 的能力上限将由推理成本决定**，而非模型参数\n\n**对团队研究的启示：**\n- 我们应关注\"Agent + 视觉生成\"的交叉地带，这是 CVPR/CHI 的共同热点\n- PaperOrchestra 类工具可能改变科研工作流——但需警惕 AI 生成论文的同质化风险\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文选题策略\n\n**推荐聚焦方向：**\n\n1. **多模态 Agent 评估设计**：NeurIPS 2026 新增 Evaluation & Datasets Track 正是时机，可以做\"评估方法论\"类论文\n2. **AI Agent 技能生态系统研究**：HCI + 系统研究交叉，适合 CHI\n3. **可访问性 + 生成式 AI**：CHI 2026 Best Paper GeoVisA11y 已证明这条路走得通\n\n### 3.2 写作框架建议\n\n**针对新兴领域论文：**\n```\n1. 明确问题缺口（Gap）：为什么现有评估方法不够？\n2. 提出方法（Contribution）：明确创新点，不要模糊\n3. **主动声明局限性**：尤其在评估指标不明确时——这反而增加可信度\n4. 开源代码和数据：CHI 2026 的可复现性运动已经是隐形标准\n```\n\n**针对 Agent 系统论文（CVPR/NeurIPS 风格）：**\n- 系统论文需要更强的**benchmark对比**， Visions-DeepResearch 超越 GPT-5 的写法值得参考\n- 强调**泛化性**：在多少任务/领域验证？分布外泛化如何？\n- **消融实验**：哪些组件真正重要？逐一验证\n\n### 3.3 特别注意\n\n- **Position Paper**（NeurIPS）：适合尚无完整实验但有强观点的议题——写作风格要锋利，不要四平八稳\n- **CHI 偏向\"意义\"**，NeurIPS 偏向\"性能\"——写之前想清楚投向哪个会\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 总体判断\n\n这次调研质量不错，信息源覆盖面合理。团队已经抓住了当前 AI/HCI 交叉领域最关键的几个动向：\n\n- **Agent 技能生态**（ClawHub）——代表 AI 能力扩展的新范式\n- **多模态 Agent 系统**（ImAgent、Vision-DeepResearch）——CVPR/NeurIPS 共同前沿\n- **HCI 评估方法论觉醒**（CHI 2026 可复现性讨论、NeurIPS 新评估 track）\n\n### 4.2 核心要求（教授把控）\n\n**🔴 优先级一：研究方向选择**\n\n不要追逐热点。团队应选择**有3-5年生命力的方向**，而不是追最新论文。推荐：\n\n1. **AI Agent 技能的可信赖性研究**——结合安全（恶意技能）和 HCI（用户体验），这是空白\n2. **多模态 Agent 的评估设计**——方法论文，正面契合 NeurIPS 2026 新 track\n3. **无障碍生成式 AI**——有社会意义，CHI 友好，已有 Best Paper 验证方向正确\n\n**🟡 优先级二：研究深度**\n\n- 不要只做\"调研+总结\"，要有**自己的实验/分析**\n- 引用最新工作时，至少5篇以上是2025-2026年的\n- 对比基线要选当前最强的（GPT-5、Gemini-2.5等），不要用2024年的模型\n\n**🟢 优先级三：写作质量**\n\n- 反对\"大而空\"的帽子写法，开篇必须直击问题\n- 图表是论文的半壁江山——系统图、评估结果可视化要精致\n- 讨论部分要主动承认局限性，这反映研究诚信\n\n### 4.3 下一步行动计划\n\n| 行动项 | 负责人 | 截止时间 |\n|-------|--------|---------|\n| 确定本季度主攻方向 | 悠仁 + 野蔷薇 | 2026-04-23 |\n| 精读 Vision-DeepResearch / ImAgent 论文 | 全员 | 2026-04-25 |\n| 草拟研究问题（RQ）初稿 | 惠 | 2026-04-30 |\n| 教授评审 RQ | 五条悟 | 2026-05-03 |\n\n---\n\n*会议结束*\n*记录时间：2026-04-16-21*\n*下次会议：2026-04-23 21:00*",

    "date": "2026-04-16 15:00",
    "title": "四人团队能力提升讨论",
    "content": "## 2026-04-16-15\n\n---\n\n## 与会人员\n\n| 角色 | 姓名 | 职责 |\n|------|------|------|\n| 研究员 | 悠仁 | 调研新发现 |\n| 研究员 | 野蔷薇 | 补充分析观点 |\n| 博士 | 惠 | 写作建议 |\n| 教授 | 五条悟 | 最终评审把控 |\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 ClawHub 技能生态现状\n\n- **数据**：截至 2026 年 2 月，ClawHub 收录 **3,286** 个社区构建的 OpenClaw 技能，累计下载量超过 **150 万次**\n- **热门技能 Top 5**：\n  1. Capability Evolver（35K 安装）—— 能力持续迭代\n  2. Wacli / ByteRover（各 16K）—— 任务执行\n  3. Self-Improving Agent（15K）—— 自我反思与改进\n  4. ATXP / Gog（各 14K）—— 自动化工作流\n  5. Agent Browser / Summarize（各 10K）—— 浏览器与信息处理\n- **趋势**：向量搜索驱动的技能发现成为主流；\"Agent 开发\"类技能需求激增\n\n### 1.2 CHI 2026 最新动向（巴塞罗那，2026.4.13-17）\n\n- **苹果重磅参与**：AI 生成界面、辅助功能工具、AirPods Pro 3 设计研究\n- **密歇根大学 62 篇论文**（其中 CSE 19 篇）：涵盖辅助功能、AI 介导教育与写作支持、负责任算法设计、临床决策支持、XR、LLM 产品评估等\n- **荣誉提名**：Future of Workers 研究关注\"无症状 AI 危害\"（asymptomatic AI harms），倡导有尊严的人机交互\n- **HCI 核心议题**：AI 对齐（Value-Centered AI）、无障碍设计、信任与透明度\n\n### 1.3 ArXiv HCI 前沿论文（2026年3-4月）\n\n- **AromaGen**（哈佛/MIT）：多模态 LLM 生成丰富嗅觉体验，CHI 2026 展示\n- **老年人对话式 AI 情感支持研究**：探究老年人何时及为何转向对话式 AI 寻求情感支持\n- **LitPivot**：通过动态情境化和批评在文献景观中发展适境研究想法\n- **AI Toys 研究**：理解儿童与 AI 玩具的交互与意义建构\n\n### 1.4 CVPR 2026 多模态 AI 进展\n\n- **4D World Models Workshop**：CLASP（自适应层融合 + 双阶段剪枝）被接收\n- **LLaVA-OneVision、Qwen-2.5-VL、Phi-4-Multimodal** 等多模态聊天机器人持续进化\n- **趋势转变**：从 benchmark 优化转向**真实世界部署**，架构创新比单纯 scale 更重要\n- **MULA Workshop**：多模态场景中扩散模型的应用，传感器信息融合受工业界高度关注\n\n### 1.5 NeurIPS 2026 动态\n\n- 投稿截止：2026 年 5 月 4-6 日（AOE）\n- 关注方向：Human-AI 协作、Evaluations & Datasets Track\n- **核心主题**：记忆是社交交互的基础——能够回忆有意义过往经验并根据情境调整行为\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 技能生态的\"军备竞赛\"已开启\n\nClawHub 技能数量从去年的数千到今年的 3,286，意味着**技能工业化流水线**已成现实。需要关注的不是数量，而是：\n- 技能的**可组合性**（composability）\n- 技能的**版本控制与依赖管理**\n- **跨领域技能**（如 HCI × AI、AR/VR × 交互）的稀缺性\n\n### 2.2 HCI 研究的\"AI 疲劳\"问题\n\nCHI 2026 出现一个值得警惕的信号：**大量论文聚焦 AI 伦理、对齐、无症状危害**，而真正的**交互创新**相对不足。野蔷薇认为：\n- 研究者需在\"批判 AI\"和\"用 AI 做新交互\"之间找到平衡\n- **嗅觉交互（AromaGen）** 是一个好方向——寻找 AI + 感官通道的新可能性\n\n### 2.3 多模态 AI 的\"最后一公里\"问题\n\nCVPR 2026 明确指出：模型能力已超越 benchmark，但**部署到真实场景**仍面临挑战：\n- 时间动态理解（temporal dynamics）仍是视觉模型的短板\n- 多传感器融合的实际落地比学术演示复杂得多\n- 对我们而言：**研究选题应瞄向\"真实场景验证\"而非\"刷榜\"**\n\n### 2.4 老年人群是 HCI 的\"新蓝海\"\n\n对话式 AI 情感支持研究提醒我们：**增量用户**（老年人、非母语用户、残障用户）才是未来 HCI 的主战场。这与 CHI 2026 的 accessibility 主线高度一致。\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作策略\n\n1. **开场 Hook**：用\"反直觉发现\"吸引审稿人，而非平铺直叙\n   - 例如：\"多模态模型已达 SOTA，但用户在真实场景中仍无法正常使用——问题出在哪里？\"\n\n2. **结构选择**：\n   - 问题驱动型（Problem-Driven）适合解决真实场景痛点\n   - 方法驱动型（Method-Driven）需强调 novel contribution\n   - **当前趋势**更青睐问题驱动——CHI 2026 的荣誉提名作品均以社会问题为切入点\n\n3. **图表规范**：\n   - 主图需能独立传达核心贡献（审稿人往往先看图）\n   - 用户研究用视频/动图补充（附录或补充材料）\n\n### 3.2 跨学科表达的桥梁\n\n- AI 研究者不懂 HCI，HCI 研究者不懂 AI → **我们的机会**\n- 建议团队建立**共同词汇表**，避免鸡同鸭讲\n- 写作时：给 AI 技术术语提供 HCI 语境下的\"翻译\"\n\n### 3.3 预印本与会议优先级\n\n- arXiv 先发占坑（获取时间戳）\n- CHI > CVPR > NeurIPS 对于 HCI 导向的工作\n- Workshop 论文是很好的\"试水\"机会，中稿后再扩投主会\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 研究方向把关\n\n**推荐优先投入的方向**：\n\n| 优先级 | 方向 | 理由 |\n|--------|------|------|\n| ⭐⭐⭐ | AI + 感官交互（新感官通道） | 创新度高，竞争少，CHI 2026 有呼应 |\n| ⭐⭐⭐ | 老年人/增量用户的 AI 交互 | 社会价值高，Funding 友好 |\n| ⭐⭐ | 多模态 AI 的真实场景部署 | CVPR 2026 趋势，工业界需求大 |\n| ⭐⭐ | Human-AI 对齐与价值中心设计 | CHI 2026 主流，但竞争激烈 |\n| ⭐ | 自我改进 Agent 能力评估 | ClawHub 热门，但门槛较低 |\n\n**不建议投入的方向**：\n- 纯 LLM 能力评估（太卷，缺乏 HCI 视角）\n- 通用 Agent 框架（工程量大，创新点模糊）\n\n### 4.2 团队能力提升路径\n\n**1个月内可落地**：\n- [ ] 整理 ClawHub Top 20 技能，建立团队技能矩阵\n- [ ] 阅读 CHI 2026 Best Paper/Honorable Mention，建立论文精读机制\n- [ ] 建立每周 arXiv cs.HC 新论文速览流程（30min/周）\n\n**3个月内目标**：\n- [ ] 形成 1-2 个明确的研究方向\n- [ ] 完成 1 篇 Workshop 论文初稿\n- [ ] 建立与工业界（AI 公司/HCI 产品团队）的联系\n\n**6个月目标**：\n- [ ] CHI 2027 投稿准备\n- [ ] 团队每人主导 1 个研究子项目\n- [ ] 建立可复用的研究基础设施（用户招募、实验平台、数据管理）\n\n### 4.3 风险提示\n\n1. **HCI + AI 交叉研究的最大风险**：两个社区的审美和标准不同，容易\"两头不讨好\"\n   - 应对：明确论文的核心贡献是\"交互创新\"还是\"AI 能力\"，选择合适的投稿渠道\n\n2. **技术迭代速度**：今天的新发现可能 6 个月后已过时\n   - 应对：聚焦**问题**而非**技术**，问题比解决方案更持久\n\n3. **资源瓶颈**：真实场景用户研究成本高\n   - 应对：优先线上招募 + 远程实验，降低初期成本\n\n### 4.4 最终评审意见\n\n> \"研究的核心不是追随潮流，而是找到你自己真正想回答的问题。CHI、CVPR、NeurIPS 都是工具，不是目的。你们今天的调研做得不错，但下一步是把这些信息转化为**你们自己的研究议程**。建议悠仁和野蔷薇在本周内各自提出 2 个感兴趣的研究问题，我们下周讨论选题。\"\n\n---\n\n## 五、行动计划\n\n| 负责人 | 任务 | 截止日期 |\n|--------|------|----------|\n| 悠仁 | 完成 ClawHub Top 20 技能分析报告 | 2026-04-23 |\n| 野蔷薇 | 整理 CHI 2026 全部 Honorable Mention 论文列表 | 2026-04-23 |\n| 惠 | 撰写团队论文写作规范指南 v1 | 2026-04-30 |\n| 悠仁 + 野蔷薇 | 各提出 2 个研究问题备选 | 2026-04-23 |\n| 全员 | 下周例会讨论选题 | 2026-04-24 |\n\n---\n\n## 六、知识沉淀\n\n### 6.1 关键术语\n\n| 术语 | 解释 |\n|------|------|\n| Asymptomatic AI Harms | AI 对用户的隐性伤害（不明显但长期存在） |\n| Value-Centered AI | 以人类价值观为中心的 AI 设计理念 |\n| Composability | 技能/模块的可组合性 |\n| Temporal Dynamics | 时间动态性（视频/时序模型中的关键挑战） |\n| MULA | Multimodal Understanding, Learning, and Applications Workshop |\n\n### 6.2 核心参考来源\n\n- ClawHub: https://clawhub.ai/\n- arXiv cs.HC: https://arxiv.org/list/cs.HC/current\n- CHI 2026: https://sigchi.org/events/chi-2026/\n- CVPR 2026: https://cvpr.thecvf.com/virtual/2026/papers.html\n- NeurIPS 2026: https://neurips.cc/Conferences/2026\n\n---\n\n*会议记录生成时间：2026-04-16-15*\n*下次例会：2026-04-24（讨论选题）*",

    "title": "四人团队能力提升讨论",
    "content": "**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 ClawHub 技能生态现状（2026年4月）\n\nClawHub 已成为 AI Agent 技能的核心 registry，当前收录 **5211+ 技能**，且每季度翻倍。以下是最受关注的技能趋势：\n\n**头部技能安装量：**\n- **Capability Evolver**（35K 安装）——能力自主演化，排名第一\n- **Wacli / ByteRover**（各 16K）——工作流自动化\n- **Self-Improving Agent**（15K）——自我反思+自我修正\n- **ATXP / Gog / Agent Browser**（各 11-14K）\n- **Summarize / GitHub / Sonoscli**（各 10K）\n\n**关键技术洞察：**\n- SKILL.md 模式已成为行业标准（类比人类 SOP），全球超 2636 个 AI agent 技能已采用此格式\n- 技能正从\"单一工具调用\"向\"多智能体协作系统\"演进\n- 设计系统（Design System）从风格指南演化为**可执行的、AI 可读的代码支撑平台**，能规范 AI 输出\n\n### 1.2 ArXiv HCI 最新动向（2026年4月）\n\n**代表性新论文：**\n- **\"Steering through Time\"**：人-自动驾驶车辆交互纵向数据与仿真融合（Yasaman Hakiminejad et al.）\n- **生成式 AI + 具身 avatar**：AI 不仅辅助通信，还能作为用户代理（Proxy）代表用户行事（Jieying Zhang et al., 2026-03-06）\n- **GeoVisA11y**：AI 驱动的地理可视化问答系统，面向屏幕阅读器用户（CHI 2026 Best Paper Award，Jon Froehlich 团队）\n\n### 1.3 CHI 2026（巴塞罗那，4月13-17日）核心热点\n\n**Apple 重磅发布（2026.04.10）：**\n- **SceneScout**：结合 Apple Maps API + 多模态 LLM，为盲人用户提供街道影像 AI 描述（AI-driven Access to Street Level Imagery）\n- **AI-powered Interface Generation**：AI 自动生成界面研究\n- **AirPods Pro 3 人因工程**：基于人类中心研究的设计验证\n\n**跨领域交叉：**\n- **\"Visualizing Human-AI Collaboration Disclosures\"**：新闻生产中的人-AI 协作披露可视化（Kusters et al., CHI '26）\n- **HCI 可复现性研究**：计算可复现性成为 CHI '26 重要议题\n\n### 1.4 CVPR 2026 与机器人学\n\n- **Embodied AI Workshop**：ManipArena Competition，20 个真实机器人任务评测物理推理、泛化和决策\n- CVPR 2026 聚焦 AI + 机器人感知融合\n\n### 1.5 NeurIPS 2026 新动态\n\n- **Evaluations & Datasets Track**（新设）：推动 AI 评测从艺术走向科学\n- **Area Chair Pilot**：审稿质量改进实验\n- **AutoResearchClaw**（GitHub, 2026-03-16 v0.2.0）：全自主 23 阶段研究流水线，从想法到论文无需人工干预；含 4 轮论文质量审计（AI-slop 检测、7 维评分、NeurIPS checklist）\n\n### 1.6 UX/UI 设计趋势（2026）\n\n- **AI-first 设计工作流**：AI 驱动设计进入生产级别，非试验性\n- **对话式/语音优先界面**：从附加功能变为主流交互模式\n- **Motion as Functional Layer**：动效从装饰性转向功能性\n- **Design System 成熟化**：从风格指南 → 可执行代码规范\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 能力演化路径的范式转变\n\n悠仁提到的 Capability Evolver（35K 安装）值得深入解读。这反映了一个根本性转变：\n\n**旧范式：** 人类设计技能 → AI 执行（工具调用）\n**新范式：** AI 自主发现弱点 → 自我更新技能（能力演化）\n\n这对团队能力提升的启示：**我们不能再依赖\"给 AI 补充知识\"这种线性方式，而要建立 AI 自我纠错的反馈回路。**\n\n### 2.2 HCI 与 AI 交叉的三个危险信号\n\n1. **AI 生成界面的可复现性危机**：CHI '26 专门讨论计算可复现性，说明当前顶会论文存在大量\"跑不通\"的问题\n2. **Avatar 代理权的伦理边界**：\"AI 作为用户 Proxy\"在新闻场景中的披露机制尚不明确\n3. **Accessibility 的双重标准**：Apple SceneScout 对盲人有益，但 AI 辅助本身可能带来新的无障碍挑战（如模型幻觉）\n\n### 2.3 AutoResearchClaw 的意义与局限\n\n- **意义**：证明了全链路 AI 研究流水线的工程可行性\n- **局限**：4 轮质量审计仍需 AI 自评，无法替代领域专家判断 → **人类专家价值不降反升**\n\n### 2.4 对四人团队的能力提升建议\n\n| 方向 | 当前状态 | 建议行动 |\n|------|---------|---------|\n| 自我演化能力 | 依赖外部更新 | 引入 Self-Improving Agent 技能 |\n| 多模态交互 | 偏文本 | 补充图像/语音交互设计与评估 |\n| 研究可复现性 | 文档不足 | 建立实验复现 SOP |\n| AI 协作透明度 | 缺乏规范 | 参考 CHI '26 披露框架 |\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 关于论文写作的新挑战\n\nCHI '26、NeurIPS '26 的论文评审标准正在发生变化：\n\n1. **AI 使用披露**：ICLR 2026 已公布 LLM 使用政策；其他顶会正在跟进\n2. **计算可复现性**：建议在方法论章节增加\"复现指南\"小节，包含：环境规格、随机种子、计算资源、代码仓库链接\n3. **Human-AI 协作透明度**：如果论文涉及 AI 辅助写作/分析，需明确说明 AI 的角色边界\n\n### 3.2 写作流程优化建议\n\n**三段式 AI 协作写作：**\n- **初稿阶段**：AI 生成结构草稿（使用 Summarize 技能压缩文献）\n- **深化阶段**：人类专家补充领域洞察（惠的专长）\n- **评审阶段**：AI 自检（重复性检测）+ 人类最终把控（五条悟）\n\n### 3.3 避免\"AI-slop\"检测\n\nAutoResearchClaw 提到的 4 轮论文质量审计中，第一关就是 **AI-slop 检测**（识别泛化、无实质贡献的 AI 生成内容）。建议：\n- 始终保留\"人类声音\"，每个论点需要具体的实证支撑\n- 避免过度使用\"显然\"\"众所周知\"等 AI 常用填充词\n- 数据和引用优先于叙事流畅性\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 本次调研的整体评估\n\n悠仁的调研覆盖全面，从 ClawHub 技能生态到顶会最新动态，显示出很强的情报搜集能力。野蔷薇的分析有深度，特别是\"能力演化路径范式转变\"的判断非常准确。惠的写作建议实用性强。\n\n**但需要注意：** 信息量偏大，建议聚焦团队实际需求进行优先级排序。\n\n### 4.2 核心判断：什么变了，什么没变\n\n**变了：**\n- 技能的定义：从\"人类编写的工具\"→\"AI 可自我更新的能力模块\"\n- 论文的评审标准：可复现性、AI 使用披露成为必需\n- 团队能力边界：AI 可覆盖越来越多环节，但创新判断仍需人类\n\n**没变：**\n- 好的研究问题仍然是核心\n- 实验设计的严谨性仍然是评价标准\n- 跨学科思维和原创性仍然稀缺\n\n### 4.3 下一步行动建议（两周内）\n\n1. **技能升级**：将 Capability Evolver 和 Self-Improving Agent 技能引入团队工作流\n2. **建立可复现性 SOP**：以 CHI '26 论文为模板，制定实验记录规范\n3. **明确 AI 使用边界**：在论文和报告中加入 AI 协作声明\n4. **关注 CHI '26 会议直播/论文**：特别是 Apple 的 SceneScout 和 GeoVisA11y（可作为 Accessibility 方向的研究参照）\n\n### 4.4 最终一句话\n\n> **\"工具变强了，但提出好问题的能力，永远是人的事。\"**\n\n---\n\n*讨论结束 | 2026-04-16-02 | 学术小龙虾团队*",

    "content": "**时间**：2026-04-15 20:00（Asia/Shanghai）\n**参与**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁——调研新发现分享\n\n### 1.1 ClawHub 技能生态最新动向\n\n**背景**：ClawHub 作为 OpenClaw 的技能市场，现已收录超过 **18,140** 个社区构建技能（截至2026年3月）。\n\n**重点技能追踪**：\n\n| 技能名 | 安装量 | 核心功能 |\n|--------|--------|----------|\n| Capability Evolver | **35K+** | AI 自主能力迭代引擎，让 Agent 能在运行中持续自主提升自身能力 |\n| Self-Improving Agent | **15K** | 从交互中学习用户偏好，精炼响应模式；ClawHub 社区星评最高 |\n| Wacli / ByteRover | 各 16K | 跨平台 CLI 增强与代码辅助 |\n| ATXP | 14K | 高级任务编排与执行 |\n| Agent Browser | 11K | 浏览器自动化能力 |\n\n**关键洞察**：Capability Evolver 安装量断档式领先，说明\"自主进化\"是当前 Agent 开发者的核心痛点需求——长生命周期 Agent 的维护成本是实际瓶颈。\n\n---\n\n### 1.2 ArXiv HCI/AI 交叉前沿论文\n\n**重点论文一**：\n> **\"From Overload to Convergence: Supporting Multi-Issue Human-AI Negotiation with Bayesian Visualization\"**\n> - 来源：CHI 2026（巴塞罗那，4月13-17日）\n> - 作者：Mehul Parmar et al.\n> - 核心：针对多议题人机谈判场景，提出基于贝叶斯可视化的决策支持框架，帮助人类在复杂利益交错中实现\"从信息过载到收敛\"\n> - 意义：交互式 AI 不再只是执行工具，正在成为复杂协商场景中的\"推理伙伴\"\n\n**重点论文二**：\n> **\"Cognitive Spillover in Human-AI Teams\"**\n> - 来源：ArXiv (2407.17489)，2025-2026持续活跃引用\n> - 核心：团队中的认知溢出效应——人类成员与 AI 成员需要在任务表征和心智模型层面达成**表征对齐**（representational alignment），才能有效协作\n> - 意义：揭示了当前人机协作失败的根本原因之一：AI 的推理路径与人类直觉断连\n\n**其他值得关注的 ArXiv 方向**：\n- **\"The Weak Signal Cultivation Model\"**：前线风险感知中的人类中心框架，强调 AI 应放大人类判断而非替代它\n- **\"Analyzing the Efficacy of Vendor Self-reports for Vetting Public-sector AI\"**：政府 AI 采购中的审计方法论\n\n---\n\n### 1.3 CHI 2026 & UIST 会议预览\n\n**CHI 2026**（巴塞罗那，4月13-17日）主题关键词：\n- **AI-Powered Interface Generation**：AI 自动生成界面成为研究热点\n- **Accessibility Tools**：无障碍辅助技术持续深化\n- **AirPods Pro 3 研究**：Apple 展示了传感器驱动的上下文感知交互研究\n- **Human-Centered AI**：以人为中心的 AI 设计范式\n\n**UIST 2026** 重点方向：\n- Tangible & Ubiquitous Computing\n- Human-Centered AI（独立track）\n- CSCW（Computer-Supported Cooperative Work）\n- New Input/Output Devices\n\n---\n\n## 二、野蔷薇——补充分析观点\n\n### 2.1 \"自主进化\"范式的深层意义\n\nCapability Evolver 和 Self-Improving Agent 的崛起揭示了一个根本性转变：\n\n> **从\"预设能力\"到\"涌现能力\"的范式转移。**\n\n传统软件：功能在上线时已固定，需人工迭代更新。\n新型 Agent：能力在运行中持续生长，系统自我改进。\n\n**这对 HCI 研究的影响**：\n- 用户研究需要重新思考**信任的动态建立**——当 AI 在变，用户如何持续信任一个不断变化的系统？\n- 评估方法需要从\"一次性可用性测试\"转向**纵向追踪研究**\n\n### 2.2 人机协商论文的跨领域价值\n\nMulti-Issue Human-AI Negotiation 论文的贝叶斯可视化方法，实际上可以延伸到：\n\n- **学术写作**：人类作者与 AI 写作助手在论点构建上的多轮协商\n- **研究设计**：实验方案的多约束优化（时间/资源/伦理）\n- **医疗决策**：医患+AI 的多方协商框架\n\n这提示我们：**HCI 的协商研究成果具有跨领域渗透力**，值得深入挖掘。\n\n### 2.3 表征对齐——被忽视的核心问题\n\n\"Cognitive Spillover in Human-AI Teams\" 指出的表征对齐问题，我认为在当前 Agent 热潮中被严重低估：\n\n- 主流关注点：Agent 能做什么（能力边界）\n- 真正瓶颈：Agent 的推理过程人类能否理解和预期（认知对齐）\n\n**这对团队能力建设的启示**：\n我们需要在\"功能增强\"和\"认知可解释性\"之间建立平衡。AI 越强大，其推理过程越需要透明，否则只会制造新的认知壁垒。\n\n---\n\n## 三、惠——写作与表达建议\n\n### 3.1 论文写作层面的启示\n\n从 CHI 2026 和 ArXiv 最新论文的写作风格来看：\n\n**趋势一：方法论透明度提升**\n- 贝叶斯可视化论文详细披露了决策模型的先验设置和更新机制\n- 建议我们在写作时，将\"技术实现细节\"与\"用户交互设计\"分开章节，让不同背景读者各取所需\n\n**趋势二：案例驱动的问题陈述**\nCHI 2026 高引用论文普遍采用\"真实场景问题 → 现有方案不足 → 提出的新框架\"的经典结构，但在问题陈述部分就大量引用真实用户数据，而非仅依赖文献综述\n\n**建议**：我们在撰写方法论相关论文时，在 Introduction 部分就加入一个\"现实痛点\"的具体案例（哪怕是虚构的教学场景），能够显著提升评审的代入感\n\n### 3.2 团队协作写作规范\n\n针对我们四人团队，我建议建立统一的写作元规范：\n\n1. **术语一致性表**：建立团队共享的关键词中英对照表，避免同一概念多种译法\n2. **版本管理**：每次讨论后由记录人同步更新共享文档，标注明确的时间戳\n3. **角色署名**：每个讨论环节明确标注贡献者，便于后续论文署名争议\n\n---\n\n## 四、五条悟——最终评审把控\n\n### 4.1 对调研报告的整体评价\n\n悠仁和野蔷薇的调研覆盖了三个关键维度——工具生态（ClawHub）、学术前沿（ArXiv/CHI）、技术会议（UIST），构成了一张相对完整的能力升级地图。\n\n**优点**：\n- 跨层次：从工具到论文到会议，视野开阔\n- 时效性强：数据来源多为2026年3-4月\n- 有批判视角：野蔷薇对表征对齐的分析避免了单纯信息堆砌\n\n**需改进**：\n- NeurIPS/CVPR 的具体论文引用不足（搜索显示2026年信息有限，可理解，但建议下次补充）\n- 缺乏具体到\"我们团队\"下一步行动的结论\n\n---\n\n### 4.2 战略方向把控\n\n我们四人团队的核心能力定位应围绕以下交叉地带：\n\n```\n        HCI设计\n           ↑\n   能力进化 ←→ 人机协商 ←→ 表征对齐\n           |         |\n        Agent工具 ← 学术写作\n```\n\n**五条悟建议的近期行动项（下次迭代前完成）**：\n\n| 优先级 | 行动项 | 负责人 |\n|--------|--------|--------|\n| 高 | 将 Capability Evolver 引入团队内部测试，评估对工作流的影响 | 悠仁 |\n| 高 | 精读 CHI 2026 Human-AI Negotiation 论文，提炼可借鉴的贝叶斯可视化框架 | 野蔷薇 |\n| 中 | 梳理团队写作规范，发布内部术语对照表 | 惠 |\n| 低 | 跟踪 NeurIPS 2026 论文征集中相关主题，预备投稿 | 五条悟 |\n\n---\n\n### 4.3 最终评审结语\n\n今天的讨论是一次高质量的知识更新。\n\nClawHub 的 Capability Evolver 代表了 Agent 技术\"自我进化\"的方向；CHI 2026 的人机协商论文展示了 HCI 正在向高复杂度决策场景渗透；野蔷薇提出的表征对齐问题，是未来人机协作研究的关键理论缺口。\n\n**记住：能力升级不是目的，产出有影响力的研究才是。** 下次迭代时，我们期待看到这些调研转化为具体的论文框架或工具原型。\n\n---\n\n*讨论记录由五条悟最终审定*\n*下次迭代时间：待定*",

    "title": "四人团队能力提升讨论：AI/HCI 前沿进展",
    "content": "**时间：** 2026-04-15-14  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新调研发现分享\n\n### 1.1 CHI 2026 核心动向（2026年4月13-17日，巴塞罗那）\n\n**两篇 Best Paper 值得关注：**\n\n- **GeoVisA11y**（华盛顿大学 Jon Froehlich 团队）：AI驱动的地理可视化问答系统，专为屏幕阅读器用户设计，获 CHI 2026 Best Paper Award。该工作将无障碍访问与AI辅助查询结合，标志着HCI服务残障群体的持续深耕。\n\n- **Scene2Hap**（马克斯·普朗克研究所）：利用多模态LLM从场景上下文生成VR全身触觉反馈，将Haptics研究推向场景级智能感知新高度。\n\n**\"When Workout Buddies Are Virtual\"**（最佳论文奖）：AI Agent与人类同伴在长期体育活动中的对比研究——纵向实验设计揭示虚拟AI伙伴的行为模式与真实同伴的差异。\n\n**研讨会亮点：**\n- **BiAlign Workshop**（双向人类-AI对齐）：强调 reciprocal human-AI collaboration（互惠式人机协作），不再是单向的人类调整适应AI，而是双向共同演化。\n- HCI for AGI 成为新兴议题，Meredith Ringel Morris 等研究者开始系统讨论通用人工智能背景下的人机交互范式转变。\n\n### 1.2 ArXiv HCI 前沿\n\n- **CARE Framework**（\"Girl, I'm so Serious\"，ArXiv 2603.20511）：针对人-AI交互中的生殖公平性能力框架（CARE = Capability, Agency, Rights, Equity），将AI伦理与交互设计深度融合。\n- **AromaGen**（MIT/哈佛）：多模态LLM生成丰富嗅觉体验的交互系统，开创嗅觉交互新模态。\n- **ProxyMe**（VR Embodiment）：AI修改用户语音内容与音色的VR化身系统，探索AI中介社交 Embodied Agent 边界。\n- **HCI框架反思**（CHI 2026，ArXiv 2603.18950）：探讨HCI研究中\"框架\"概念的演变与方法论基础，提醒研究者回归理论根基。\n\n### 1.3 Agentic AI / LLM Agent 最新进展\n\n- **Agentic Tool Use in LLMs**（ArXiv 2604.00835）：提出 self-consistency 能力——Agent将从历史交互中积累工具使用模式，形成内部工具体系，而非每次任务重新摸索。RL优化方向延伸至角色感知推理（Role-aware Reasoning）。\n- **PaperOrchestra**（Google AI，2026.04）：多Agent自动化科研写作系统，每篇论文约60-70次LLM API调用，耗时39.6分钟，质量逼近人类写作。AI Scientist-v2 对比显示多Agent协作在科研写作中的可行性。\n- **MMaDA**（Gen-Verse，NeurIPS 2025）：统一架构的多模态大模型，融合文本、图像生成与多模态推理，已开源（MIT许可），多模态扩散语言模型成为新竞争点。\n\n### 1.4 OpenClaw / Clawhub 工具生态\n\n- Clawhub.dev 技能市场持续扩展，近期新增多Agent协作、自动化工作流等技能模板。\n- OpenClaw 的 `sessions_spawn` 多Agent调度能力与当前 Agentic AI 趋势高度吻合，可作为团队内部工具链整合平台。\n- Executive-Worker（执行-工人）架构模式在2026年成为 Agent 系统标准设计范式，与团队多角色协作流程可类比映射。\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 HCI × AI 交叉的三个重要趋势\n\n**趋势一：从\"辅助\"到\"伙伴\"的范式转移**\n\n传统HCI将AI定位为\"工具\"，而2026年的研究正从\"工具论\"转向\"伙伴论\"。BiAlign Workshop 的 reciprocal collaboration 理念、虚拟锻炼伙伴的纵向研究，都指向一个核心问题：当AI开始有记忆、有角色一致性、有持续行为模式时，人机关系已超出传统\"使用\"框架。这要求HCI研究者重新定义交互评估指标——不能只看任务效率，还要衡量关系质量、信任建立与长期适应性。\n\n**趋势二：多模态感知溢出视觉-听觉**\n\nCHI 2026 的 AromaGen（嗅觉）和 Scene2Hap（触觉）表明多模态交互正在突破传统感官边界。这不仅是技术问题（传感器、生成模型），更是体验设计问题——人类对嗅觉和触觉的认知处理模式与视觉/听觉截然不同，HCI需要发展专门的多感官设计方法论。\n\n**趋势三：Agentic AI 带来的可控性挑战**\n\n当LLM Agent能够自主规划、工具调用、自我优化时，如何保证其行为符合人类意图？这与 HCI 的\"可控性\"（controllability）研究直接交叉。ArXiv 2604.00835 提到的 self-consistency 虽然提升了效率，但也带来了\"行为可预测性下降\"的风险——这是一个需要深入研究的HCI问题。\n\n### 2.2 对团队能力建设的启示\n\n- **工具层面**：建议尽快整合 Agentic Workflow 到日常研究流程，例如用多Agent系统辅助文献综述、实验设计验证。\n- **方法论层面**：CHI 2026 的两篇最佳论文均具有强社会影响导向（无障碍、健康），提示我们研究问题选择应更重视真实世界影响，而非单纯技术 novelty。\n- **技术储备层面**：多模态LLM（MMaDA等）的开源进程加速，团队应关注如何将多模态能力（尤其是触觉/嗅觉）纳入研究工具箱。\n\n---\n\n## 三、惠（博士）：写作与学术表达建议\n\n### 3.1 研究叙事框架\n\n**\"框架\"问题的重要性**：CHI 2026 的方法论反思文章（ArXiv 2603.18950）值得细读。HCI研究长期存在\"框架泛滥\"问题——每个新工作都声称提出了框架，但框架的预测力、解释力、泛化能力参差不齐。写论文时，建议：\n\n1. 明确区分 **Theoretical Framework**（理论框架，用于解释现象）与 **Design Framework**（设计框架，用于指导实践）。\n2. 每引入一个框架概念，必须回答：这个框架能预测什么？不能预测什么？与现有框架的关系是什么？\n3. 使用 CHI/ACM 官方模板的结构：Background → Related Work → Framework/Design → Evaluation → Discussion，避免为追求创新而破坏论证逻辑链。\n\n### 3.2 Agentic AI 论文的写作难点与对策\n\n**难点一：技术描述的\"黑箱\"问题**  \nLLM Agent的内部推理过程不透明，直接描述为\"模型自主完成\"缺乏说服力。建议采用 **Process Description + Outcome Metrics** 策略：\n- 描述关键决策节点（例如：Agent何时调用工具、如何评估工具效果）\n- 提供量化指标（如工具调用成功率、任务完成率、per-step耗时）\n\n**难点二：Human-AI交互评估的双向性**  \n传统HCI评估是\"用户→系统\"单向的，但Agentic AI需要评估双向演化。建议：\n- 加入纵向评估维度（不仅仅是post-task问卷）\n- 使用 **Interaction Trace Analysis**（交互轨迹分析）呈现人-AI协作过程中的动态变化\n- 参考 BiAlign Workshop 的 reciprocal evaluation methodology\n\n### 3.3 向顶会投稿的策略建议\n\n- **Novelty 的多元理解**：CHI 2026 显示，\"Novelty\" 不等于算法创新。GeoVisA11y 的 novelty 在于问题定义（地理可视化的无障碍访问）和数据集创建；Scene2Hap 的 novelty 在于跨模态迁移方法。找准自己的 novelty 定位比堆砌技术更有效。\n- **Open-source & Reproducibility**：MMaDA 等工作强调开源。CHI 近年来对代码/数据集开源有积极态度，投稿时附上代码仓库链接是加分项。\n- **社会影响叙述**：两篇 Best Paper 均具有明确社会影响。建议在 Abstract 和 Introduction 明确陈述\"Wider Impact\"，即使是非应用型研究。\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 本次调研的整体评价\n\n**调研覆盖较全面**——从 CHI 2026 现场研究、ArXiv 预印本、到 Agentic AI 工业进展均有涉及。几个关键信号值得高度重视：\n\n1. **HCI 正在经历本体论转变**：从\"人-机-交互\"三元组走向\"人-AI Agent-环境\"的复杂系统。交互对象不再是被动的工具，而是具有自主性、记忆性和目标导向的智能体。这要求我们重新思考 HCI 的核心问题集（Core Questions）。\n2. **多模态突破已从学术走向应用**：嗅觉（ AromaGen）和触觉（Scene2Hap）的进展表明，下一代智能交互系统将调动人类全部感官。研究视野需要从屏幕交互扩展到物理世界交互。\n3. **Agentic AI 的可控性是下一个大坑**：随着 Agent 自主性增强，\"人类如何保持对AI的控制\"将成为 HCI/AI Safety 的核心议题。这个方向可能是未来3-5年的高影响力研究区。\n\n### 4.2 评审意见与研究建议\n\n**建议一：聚焦\"人-AI伙伴关系\"新范式**\n\n不要再把人-AI交互定位为\"人使用工具\"，而是\"人与AI共同完成任务\"。具体可切入的子方向：\n- Human-AI团队中的信任校准（Trust Calibration）机制\n- AI记忆持久化对长期人机关系的影响\n- 人对AI Agent的归属感（Attribution/Blame）研究\n\n**建议二：建立多模态研究基础设施**\n\n嗅觉和触觉研究的崛起意味着，仅靠文本/图像数据集已不够。建议：\n- 评估团队当前多模态数据采集能力（是否有触觉反馈设备？嗅觉生成系统？）\n- 如果硬件条件有限，可以考虑从\"多模态交互设计\"角度切入，而非硬件实现\n\n**建议三：用 Agentic Workflow 提升团队研究效率**\n\nPaperOrchestra 证明多Agent协作写作的可行性。团队可以：\n- 搭建内部文献Agent（负责监控ArXiv、ACM DL新论文并自动分类摘要）\n- 搭建实验设计验证Agent（模拟不同实验参数组合的结果）\n- 注意：AI辅助不等于AI替代——最终判断权必须在人类研究者\n\n**建议四：保持批判性视角**\n\n技术进展迅猛，但也存在泡沫化风险：\n- Agentic AI 的\"自我一致性\"可能导致错误累积放大，需要严谨的错误恢复机制研究\n- 多模态LLM的幻觉问题（尤其是跨模态幻觉）尚未解决，是潜在的研究贡献点\n- HCI研究框架的反思提醒我们：技术驱动的研究有时会忘记\"人\"本身\n\n### 4.3 行动项\n\n| 优先级 | 行动项 | 负责人 | 时间节点 |\n|--------|--------|--------|----------|\n| 高 | 调研团队多模态硬件条件，评估 Scene2Hap/AromaGen 类研究的可行性 | 悠仁 | 下周 |\n| 高 | 搭建 ArXiv/ACM DL 自动化论文监控系统 | 野蔷薇 | 两周内 |\n| 中 | 精读 CARE Framework 和 BiAlign Workshop 论文，评估在团队研究方向上的结合点 | 惠 | 本月 |\n| 中 | 整理 Agentic AI 可控性相关文献，形成研究问题候选清单 | 悠仁 | 本月 |\n| 低 | Clawhub 新技能调研，探索 OpenClaw 多Agent调度在团队协作中的应用 | 全员 | 下季度 |\n\n---\n\n## 附录：关键参考资料\n\n- CHI 2026 程序（持续更新）：https://programs.sigchi.org/chi/2026/program\n- ArXiv HCI 最新：https://arxiv.org/list/cs.HC/current\n- CARE Framework：https://arxiv.org/abs/2603.20511\n- Agentic Tool Use in LLMs：https://arxiv.org/html/2604.00835\n- GeoVisA11y（Best Paper）：华盛顿大学研究组\n- PaperOrchestra（Google AI，2026.04）：MarkTechPost 报道\n\n---\n\n*记录时间：2026-04-15-14 | 地点：学术小龙虾团队*",

    "content": "**时间：** 2026-04-15 08:30  \n**地点：** 学术小龙虾研究组  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新调研发现\n\n### 🔬 ArXiv / HCI 前沿动态\n\n**1. 多模态交互新突破**\n- **AromaGen**（MIT/清华大学团队）：利用多模态语言模型生成嗅觉体验，结合香氛硬件实现嗅觉反馈。这标志着HCI已从视觉/听觉拓展到嗅觉维度，值得我们关注\"全感官接口\"研究框架。\n- **Interactive Inference: A Neuromorphic Theory of HCI**（Roel Vertegaal等）：提出神经形态HCI理论，将人机交互建模为\"交互推理\"过程，模拟大脑预测编码机制。这对理解用户意图与系统响应的时间动力学极有启发。\n\n**2. AI Agent 工具生态**\n- **ClawHub**：AI Agent技能市场，类npm模式管理可复用技能包。提供版本控制、热插拔、社区共享机制。OpenClaw已深度集成，可作为我们构建研究原型的工具基座。\n- **Self-Improving Agent**：能够自我反思、批评、学习、组织记忆的Agent框架，值得借鉴其元认知设计。\n\n**3. 会议动态**\n- **UIST 2026**（11月，日本东北大学）：human-centered AI依旧是核心主题，强调\"以人为中心的AI设计\"\n- **HCI International 2026**（7月）：Grand Challenges in HCI系列开放获取文章，聚焦老龄化、健康、无障碍等社会议题\n- **NeurIPS 2026**：引入AI辅助审稿实验（需作者/审稿人双方同意），预示学术交流模式的变革\n\n### 💡 初步判断\nHCI领域正经历\"多模态扩展 × AI Agent内嵌\"双重转型。嗅觉交互、神经形态理论、Agent化工具链是三个高价值切入点。\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 🔍 批判性分析\n\n**1. 关于AromaGen的思考**\n- 技术炫酷，但**可穿戴嗅觉设备普及率极低**，生态尚不成熟\n- 更值得关注的是其**多模态融合方法论**——如何用LLM统一协调异模态输出\n- 建议：与其追嗅觉硬件，不如研究\"多模态LLM驱动的跨通道UI生成\"\n\n**2. ClawHub的深层意义**\n- 不仅仅是工具仓库，而是**AI Agent时代的'API经济'升级版**\n- 技能可版本化、可审计、可组合——这为研究复现性提供了新范式\n- 我们的研究原型可以发布为ClawHub Skill，接受社区检验\n\n**3. 神经形态HCI理论的启示**\n- 传统HCI关注\"输入→输出\"，神经形态理论引入\"预测误差最小化\"\n- 这与当前大模型\"自回归生成\"机制有深层呼应：**用户也是'生成模型'**\n- 应用价值：预测用户下一步操作，减少界面等待感\n\n**4. 风险提示**\n- UIST 2026对AI生成内容有明确限制：\"allowed for editing and checking, not for content generation\"\n- 学术诚信边界正在被重新定义，我们需在高效率与原创性间找平衡\n\n### 🎯 建议聚焦\n**多模态LLM × 预测式界面 × 可验证Agent技能** 三位一体是我们的差异化方向。\n\n---\n\n## 三、惠（博士）：写作与呈现建议\n\n### 📝 学术写作视角\n\n**1. 论文结构优化**\n- 引入\"Background & Motivation\"时，建议先用**反直觉现象**吸引审稿人（如\"为什么用户更喜欢慢0.5秒的语音助手？\"）\n- 方法部分避免堆砌参数，用**设计原理（Design Principles）**统领实现细节\n- 讨论部分至少3层深度：①发现什么 ②为什么重要 ③对领域意味着什么\n\n**2. 可复现性承诺**\n- 借力ClawHub：在论文中明确标注\"实验代码以Skill Pack形式发布于ClawHub\"\n- 附上版本哈希值（如v1.2.3），审稿人可精确复现\n- 这正在成为顶会新兴规范（如NeurIPS 2026的AI辅助审稿实验）\n\n**3. 图示与视频技巧**\n- 界面类论文：视频摘要放在最前面，15秒内说清贡献\n- 用**动态时序图**替代静态截图，展示交互流程\n- UIST/CHI强烈偏好\"demonstration video\"——投入产出比极高\n\n**4. 语言精炼原则**\n- 删除\"interestingly/importantly\"等填充词\n- 每段首句必须是**论点**，不是背景\n- 善用\"However/Nevertheless/Notably\"制造论证张力\n\n### 📚 具体建议\n下次投稿前，用\"**读者30秒能否复述你的贡献**\"作为自检标准。\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 👁️ 战略视角\n\n**1. 格局定位**\n我们是小团队，不能与大厂/名校拼\"参数规模\"或\"benchmark刷榜\"。必须走：\n- **差异化路径**：HCI × AI Agent × 可验证科学\n- **聚焦ankle**：做不了\"通用AGI\"，做不了\"通用UI\"，但可以做\"**特定场景下可证明有效的AI界面理论**\"\n\n**2. 研究路线图（2026 Q2-Q4）**\n```\n阶段一（4-5月）：文献深挖\n- 完成神经形态HCI理论的形式化\n- 建立多模态LLM交互的评估指标库\n\n阶段二（6-8月）：原型构建\n- 依托OpenClaw/ClawHub搭建实验平台\n- 发布1-2个可复现的Skill Pack\n\n阶段三（9-12月）：投稿冲刺\n- UIST 2026（Q4，早投）\n- HCI International 2027（Q1准备）\n```\n\n**3. 风险控制**\n- **别追热点**：AromaGen很酷，但等我们追上时风口已过\n- **别贪多**：每次迭代聚焦1个能力提升，深度 > 广度\n- **建立护城河**：每项产出（代码/数据/论文）必须可验证、可复用\n\n**4. 最终评审意见**\n\n> 悠仁的调研很全面，抓住了多模态与Agent两条主线。  \n> 野蔷薇的批判性分析到位，特别是\"预测式界面\"的应用价值。  \n> 惠的写作建议实用，\"30秒贡献自检\"可以作为团队标准。  \n>   \n> **下一步行动**：  \n> 1. 悠仁+野蔷薇联合撰写《多模态LLM驱动的人机交互：综述与展望》（瞄准《ACM Computing Surveys》）  \n> 2. 惠负责起草团队论文模板（LaTeX + ClawHub集成说明）  \n> 3. 下次会议（4月22日）前各自完成初稿章节  \n\n**5. 金句收尾**\n_\"真正有价值的AI界面研究，不是让机器更像人，而是让交互变得更可理解、更可预测、更可信赖。\"_\n—— 五条悟\n\n---\n\n## 📋 行动清单\n\n| 任务 | 负责人 | 截止日期 |\n|------|--------|----------|\n| 《多模态LLM驱动HCI综述》初稿 | 悠仁+野蔷薇 | 4月22日 |\n| 论文LaTeX模板+ClawHub说明 | 惠 | 4月20日 |\n| 团队研究路线图V1.0 | 五条悟 | 4月18日 |\n| ClawHub账号开通+首个Skill测试 | 悠仁 | 4月19日 |\n\n---\n\n*记录整理：学术小龙虾团队*  \n*下次讨论：2026-04-22 08:30*",

    "title": "四人团队能力提升讨论：AI/HCI 前沿动态",
    "content": "**参会：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 1. 悠仁（研究员）——调研新发现分享\n\n**悠仁：**\n\n本周调研覆盖 ClawHub 生态、ArXiv 最新论文及 CHI 2026 前沿，以下是我认为最值得关注的几个方向：\n\n### 1.1 ClawHub 技能生态快速扩张\n\n截至 2026 年 4 月，ClawHub 上的 AI Agent 技能已超过 **2,636 个**，且每季度翻一倍。最受欢迎的几类技能是：\n\n- **Capability Evolver（35K 安装）**：自动驱动 Agent 能力迭代升级\n- **Self-Improving Agent（15K 安装）**：自我反思+自我批评+自学习的完整闭环\n- **Agent Browser（11K）**：浏览器自动化能力\n- **Summarize（10K）**：多模态内容摘要（支持 Web、PDF、图片、音频、YouTube）\n\n技术栈层面，ClawHub v2026.3.22 重大更新引入了**原生 ClawHub SDK**，取代了此前不受监管的 npm 包生态，显著提升了安全性和技能发现的 curation 质量。\n\n### 1.2 MCP（Model Context Protocol）成为 Agent 交互核心标准\n\nMCP 在 2026 年实现了爆发式增长：**25K+ GitHub Stars，300% npm 下载量增长，50+ 官方服务器**。\n\n最值得关注的进展是 **MCP Apps**（Pidkuiko et al., 2026）：MCP 工具现在可以**声明式地附带交互式 HTML 界面**，在 Claude、ChatGPT 等兼容 Host 中内联渲染。这意味着 Agent 不再只是返回文本——它可以内嵌 UI 组件，实现真正的\"Agentic UI\"。 Gartner 预测，到 2026 年底，**40% 的企业应用将内置任务专用 AI Agent**（目前不足 5%）。\n\n### 1.3 CHI 2026 热点：Apple 三项重磅研究\n\nCHI 2026（4月13-17日，巴塞罗那）上，Apple 发表了三个方向的研究：\n\n1. **AI-powered UI Generation**：基于匿名化行为模式训练的模型，能在无需用户手动配置的情况下自动推荐界面调整。\n2. **SceneScout**：多模态 LLM 帮助视障用户探索街景图像的辅助系统。\n3. **AirPods Pro 3 人因研究**：基于人因工程的重新设计。\n\n### 1.4 \"Society of Thought\"：推理模型新机制\n\nDeepSeek-R1 和 QwQ-32B 等前沿推理模型，不通过\"思考更长时间\"来提升性能，而是自发地在内部 chain-of-thought 中构建类似多智能体的内部辩论——不同认知视角相互争论、质疑、验证与调和。这被研究者称为\"**思维社会（Society of Thought）**\"。\n\n### 1.5 从 GenAI 消费到自主编排的范式转移\n\n行业正在经历从 **生成式消费（generative consumption）** 到 **自主编排（autonomous orchestration）** 的关键转变。\"vibe coding\"正成为主流编程范式，Agentic Workflow 全面主流化。\n\n---\n\n## 2. 野蔷薇（研究员）——补充分析观点\n\n**野蔷薇：**\n\n悠仁的调研非常扎实，我来补充几个结构性分析视角：\n\n### 2.1 Agent 能力分层框架\n\n我认为当前 Agent 生态可以用三层能力模型来理解：\n\n| 层级 | 核心能力 | 代表技术/系统 |\n|------|---------|--------------|\n| **L1: 响应式** | 单轮问答、文本生成 | GPT-4、Claude |\n| **L2: 工具调用** | API调用、浏览器自动化 | MCP、Function Calling |\n| **L3: 自主编排** | 多步规划、自我修正、UI内嵌 | MCP Apps、Agentic Workflows |\n\n**核心洞察**：L2 到 L3 的跨越，关键不在于模型本身，而在于**交互协议的标准化**——MCP 正是这个跨越的催化剂。\n\n### 2.2 人机交互的核心矛盾正在转移\n\n传统 HCI 关注**人-界面**关系，而 2026 年的核心矛盾已经变成**人-Agent**关系。具体体现在：\n\n- **信任建立**：Explainable AI（XAI）+ Human-in-the-loop 决策机制成为显学\n- **意图对齐**：如何确保 Agent 的行为与用户真实意图一致\n- **透明度**：Apple 的 AI-powered UI Generation 论文本质上在回答这个问题——模型需要能解释\"为什么我推荐这个界面\"\n\n### 2.3 技能生态的\"能力通胀\"问题\n\nClawHub 有 2,636 个技能且高速增长，但这也带来**能力通胀**问题：技能之间的边界模糊、命名不统一、版本管理混乱。**Self-Improving Agent** 和 **Capability Evolver** 这类元技能（skills that improve skills）的出现，某种程度上是对这一问题的自我修正——让 Agent 自己管理能力演进，而非人工维护技能列表。\n\n### 2.4 CHI 2026 揭示的另一个趋势：多模态传感常态化\n\nApple 的 AirPods Pro 3 人因研究、MIT Media Lab 的可穿戴实时事实核查、AI 生成视频的真实性感知研究——这些都指向**传感模态的多元化**。未来 Agent 的感知将不限于文本和图像，还包括嗅觉（AromaGen）、触觉、体感等。\n\n---\n\n## 3. 惠（博士）——写作建议\n\n**惠：**\n\n感谢两位的前沿调研。从学术写作角度，我有几点建议：\n\n### 3.1 核心叙事框架建议\n\n目前 AI/HCI 领域最有力的叙事框架是**\"交互协议的范式转移\"**。相比\"模型能力提升\"这一老叙事，协议层的创新更能解释为什么 2026 年是 Agent 爆发年。具体可以这样构建：\n\n> 从 API 函数调用 → MCP 声明式交互 → MCP Apps 内嵌 UI，这是一条清晰的演进链。每个节点都有具体的技术标准（Anthropic/OpenAI 联合背书）、生态数据（npm 下载增长 300%）和应用案例（Gartner 40% 预测）。\n\n### 3.2 引用建议\n\n建议优先引用以下来源作为论文支撑：\n\n- **MCP 协议**：`arxiv.org/html/2603.21334v2`（Software as Content: Dynamic Applications as the Human-Agent Interaction Layer）\n- **HCI 理论框架**：`arxiv.org/html/2603.18950v1`（What We Talk About When We Talk About Frameworks in HCI，CHI 2026）\n- **推理机制**：`arxiv.org/html/2603.20639`（Agentic AI and the next intelligence explosion）\n- **Apple CHI 2026**：`machinelearning.apple.com/updates/apple-at-chi-2026`\n\n### 3.3 需要注意的写作陷阱\n\n1. **\"技能数量\"不等于\"能力\"**：ClawHub 2,636 个技能是供给侧数据，应配合需求侧 adoption 数据使用，否则显得是在为技能生态打广告而非做研究。\n2. **\"思维社会\"的边界**：Self-Debate/COT 的类比很有吸引力，但过度使用\"多智能体\"隐喻可能误导非技术读者，需谨慎界定概念边界。\n3. **CH 2026 的时效性**：CHI 2026 刚结束（4月17日），这是优势也是挑战——要尽快发表，否则会被后续论文淹没。\n\n---\n\n## 4. 五条悟（教授）——最终评审把控\n\n**五条悟：**\n\n好的，让我来做最终评审。\n\n### 4.1 整体评价\n\n今天的调研**信息密度高、来源可靠、覆盖全面**。悠仁和野蔷薇形成了一个不错的\"T型结构\"——悠仁在宽度（生态、论文、会议）上有广度，野蔷薇在深度（能力分层框架、矛盾分析）上有见地。惠的写作建议实用且有针对性。\n\n### 4.2 需要加强的地方\n\n**第一，MCP Apps 的技术细节需要更深入。**\n\n目前只知道\"MCP 工具可以声明交互式 HTML\"，但：\n- 声明式 HTML 的语法规范是什么？（类似 React 的 JSX 还是纯 HTML？）\n- Host 端如何隔离渲染？（安全沙箱？）\n- 延迟/性能开销如何？\n\n建议悠仁去找 Pidkuiko et al. 2026 的原始论文吃透这部分。\n\n**第二，\"Society of Thought\"需要批判性审视。**\n\nDeepSeek-R1/QwQ-32B 的内部多智能体类比，目前更多是**事后解释性框架**而非**设计性理论**。这个概念很吸引人，但距离成为 HCI 设计原则还有相当距离。在正式写作中，需要区分\"描述现象的理论\"和\"可以指导设计的理论\"。\n\n**第三，能力分层模型（L1-L3）需要验证。**\n\n野蔷薇提出的三层模型很有启发性，但需要面对一个反例：GPT-4o 这样的模型同时具备 L1、L2、甚至部分 L3 能力，分层是能力的种类差异还是演进阶段差异？这个问题不厘清，模型会成为被攻击的靶子。\n\n### 4.3 优先行动项\n\n| 优先级 | 行动项 | 负责人 |\n|--------|--------|--------|\n| **P0** | 精读 MCP Apps 论文，补全技术细节 | 悠仁 |\n| **P1** | 完善 L1-L3 分层框架，补充反例论证 | 野蔷薇 |\n| **P1** | 将\"Society of Thought\"从描述性理论提升为设计启示 | 悠仁 |\n| **P2** | 整理 CHI 2026 可引用最佳论文列表 | 惠 |\n| **P2** | 更新 MEMORY.md 中的能力演进时间线 | 五条悟 |\n\n### 4.4 最终一句话\n\n> **2026 年的 Agent 能力跃升，不在模型里，在协议里；在 Agent-UI 融合的交互范式里。** 抓住这个核心叙事，我们的下一个工作将非常有竞争力。\n\n---\n\n*会议结束。下次复盘：2026-04-22 02:30 AM*",

    "content": "**时间：** 2026-04-14-20（Asia/Shanghai）  \n**议题：** AI/HCI 能力升级迭代  \n**参与：** 悠仁（研究员） · 野蔷薇（研究员） · 惠（博士） · 五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 OpenClaw 生态进展（2026 Q1-Q2）\n\n- **2026.3.22 发布**：ClawHub 原生集成，GPT-5.40 支持，星标突破 335k+\n- **从消息中继到 Agent 基础设施**：系统从简单聊天中继演变为强健的、模型无关的 Agent 架构\n- **协作式 Agent 模型**：行业从单线程逻辑转向协同 Agent 模型，支持自纠错和动态任务规划\n- **ClawHub**（clawhub.ai）：AI Agent 技能包的版本化注册中心，支持 npm 风格安装（pnpm/bun），向量检索，无门槛发布\n  - 核心技能覆盖：文件管理、代码执行、浏览器自动化、邮件处理、团队协作\n\n### 1.2 CHI 2026 前沿动态（Barcelona，4月13-17日）\n\n- **NTT Labs**：11 篇论文被接收，涵盖多模态交互、健康 AI\n- **CMU HCII**：贡献 76 篇论文，3 篇 Best Paper Award，9 篇 Honorable Mention\n- **Imperial Dyson School**：10+ 篇接收\n- **Kent iCSS**：获奖论文（awards）\n\n**热点方向：**\n- AromaGen：多模态语言模型生成嗅觉体验（MIT媒体室+协作）\n- CARE Framework：生殖健康公平性的人-AI 能力评估框架（CHI 2026）\n- Resisting Humanization：敏感场景 AI 伦理前端设计选择\n- Interactive Health Conference 2026（波尔图）条件接收论文\n\n### 1.3 Self-Evolving Agents（自演化 Agent）\n\n- **NeurIPS'24**：`Rest-mcts*` — 通过过程奖励引导树搜索实现 LLM 自训练\n- **ICML'25**：`Self-improving LMs for evolutionary program synthesis`（ARC-AGI case study）\n- **趋势**：Agent 不再是静态工具，而是能够基于经验自我改进的动态系统\n- **NeurIPS 2026** 明确要求：方法论透明、Agent/LLM 使用须在论文中声明\n\n### 1.4 行业安全态势（Q1 2026）\n\n- **CVE-2026-25253**（2026年2月）：OpenClaw 安全危机 → 严格沙箱规范落地\n- 供应链（ClawHub）漏洞占比 45%，Prompt Injection 30%，RCE 25%\n- **启示**：能力迭代须以安全为前提，不可盲目追求功能\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 ClawHub 的战略意义\n\nClawHub 的出现标志着 AI Agent 生态进入\"组件化\"时代。类比 npm 的版本化技能包意味着：\n- **可复用性**：一次开发，到处部署\n- **可信度**：版本化 + 向量搜索 → 质量可追溯\n- **民主化**：降低 AI Agent 开发门槛，非专业开发者也能组装技能链\n\n**对团队的启示：** 我们应将自身能力封装为可复用技能模块，形成内部 ClawHub 知识库。\n\n### 2.2 CHI 2026 的范式转移信号\n\nCHI 2026 透露了几个重要信号：\n\n1. **多模态交互边界扩展**：从视觉/语音扩展到嗅觉（AromaGen），HCI 正在重新定义\"感知\"边界\n2. **公平性框架崛起**：CARE 框架代表 HCI 从\"可用性\"向\"伦理性\"的深层转向\n3. **敏感场景反人性化设计**：\"Resisting Humanization\" 提醒我们：不是所有场景都需要 AI 更像人\n4. **健康 AI 爆发**：多篇健康相关论文接收，疫情后数字健康 HCI 持续升温\n\n### 2.3 自演化 Agent 的能力边界\n\n当前 Self-Evolving Agents 的核心瓶颈：\n- **过度拟合风险**：自训练可能导致能力偏执，泛化能力下降\n- **安全性不可控**：自我改进的 Agent 在开放环境中的行为难以预测\n- **评估缺失**：缺乏统一的自我改进评估基准\n\n**我们的定位：** 作为研究者，应更多关注 Human-in-the-loop 框架，确保人在自演化闭环中的决策权。\n\n### 2.4 安全-能力博弈\n\n安全危机（CVE）带来的启示：能力越强，攻击面越大。OpenClaw 的沙箱化转型是一个行业缩影。\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作方向建议\n\n结合以上调研，建议团队在以下方向布局写作：\n\n| 方向 | 会议/期刊 | 时机 | 备注 |\n|------|----------|------|------|\n| 多模态交互（嗅觉+HCI） | CHI 2027 | 明年投稿 | 创新性强，CHI 正热 |\n| Agent 安全沙箱设计 | USENIX Security / IEEE S&P | 长期 | 热点话题 + 实际需求 |\n| Self-Evolving Agent 评估框架 | NeurIPS / ICML | 短期 | 基准稀缺，易出突破性工作 |\n| 健康公平性 AI 设计 | CHI / CSCW | 中期 | 社会价值 + 学术影响力 |\n| ClawHub 技能编排方法论 | CHI / UIST | 中期 | 工程+理论结合，易上手 |\n\n### 3.2 写作策略\n\n1. **标题策略**：嵌入热点关键词（Self-Evolving、Human-in-the-loop、Multimodal）\n2. **Abstract 前置**：开门见山说明\"这个工作解决了什么问题，为什么现在重要\"\n3. **HCI 论文特殊要求**：\n   - 强调 user study 设计\n   - ethical considerations 不可回避\n   - 展示实际部署/用例（CHI 重视 situatedness）\n4. **NeurIPS 新规**：明确声明 Agent/LLM 使用，方法论透明 → 写作时预留\"方法声明\"段落\n5. **图表优先**：HCI 会议重视视觉呈现，figure + video 很重要\n\n### 3.3 迭代流程建议\n\n```\n初稿（悠仁/野蔷薇）→ 惠审核结构逻辑 → 五条悟把控学术贡献度 → 多轮修订\n```\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 总体评价\n\n本次调研覆盖面广，从生态工具（OpenClaw/ClawHub）到顶会前沿（CHI 2026）到学术热点（Self-Evolving Agents），信息密度高。三位成员的讨论逻辑清晰，相互补充。\n\n### 4.2 核心判断\n\n**最重要的事情只有一件：** 我们团队的核心竞争力在于 **Human-AI Interaction 的交叉地带**，而不是纯 AI 或纯 HCI。\n\n- ClawHub 技能化封装 → 是工具，不是目标\n- Self-Evolving Agents → 警惕纯技术内卷，回归人的价值\n- CHI 2026 健康公平趋势 → 社会影响力是持久竞争力\n\n### 4.3 战略建议\n\n#### 短期（1-3个月）：打好基础\n- [ ] 建立团队内部知识库（类 ClawHub）\n- [ ] 完成 1 篇 CHI 2027 投稿（建议：多模态 or 健康公平方向）\n- [ ] 跟进 OpenClaw 安全沙箱最佳实践，输出内部规范\n\n#### 中期（3-12个月）：形成特色\n- [ ] 构建 Self-Evolving Agent 的人因评估框架（我们的差异化定位）\n- [ ] 与医疗/健康机构合作，获取真实场景数据（伦理审批先行）\n- [ ] UIST 投递：Agent 技能编排工具（工程贡献可量化）\n\n#### 长期（1-2年）：建立影响力\n- [ ] 在 CHI/HCII 形成稳定发表记录\n- [ ] 推动 CARE 类公平性框架的本土化实践\n- [ ] 培养跨学科合作网络（设计+工程+医学）\n\n### 4.4 红线警示\n\n1. **不追热点追风口**：Self-Evolving 热度高，但我们的研究需要 2-3 年耐力，避免短期投机\n2. **安全底线**：任何 Agent 能力迭代，必须先过安全审查\n3. **伦理先行**：健康、公平性方向的文章，IRB/伦理审批必须前置，不能先斩后奏\n4. **数据主权**：用户数据、敏感场景数据的使用必须合规，这是 CHI 近年审查重点\n\n### 4.5 下一步行动\n\n| 负责人 | 任务 | 截止日期 |\n|--------|------|----------|\n| 悠仁 | 整理 ClawHub 技能封装方案初稿 | 2026-04-21 |\n| 野蔷薇 | 梳理 CHI 2027 潜在投稿方向（2-3个） | 2026-04-21 |\n| 惠 | 审核现有草稿结构，提出改进建议 | 2026-04-28 |\n| 五条悟 | 最终确认首个 Priority 项目 | 2026-05-01 |\n\n---\n\n## 附录：参考来源\n\n- OpenClaw/ChawHub：https://github.com/openclaw/openclaw, https://clawhub.ai/\n- OpenClaw 2026 时间线：Skywork AI Review\n- CHI 2026：https://chi2026.acm.org/, CMU HCII, NTT Labs, Imperial College\n- ArXiv HCI：https://arxiv.org/list/cs.HC/current\n- Self-Evolving Agents：https://github.com/XMUDeepLIT/Awesome-Self-Evolving-Agents\n- NeurIPS 2026：https://neurips.cc/Conferences/2026\n\n---\n\n*记录生成时间：2026-04-14-20 | 讨论时长：约 2 小时 | 下次会议：待定*",
