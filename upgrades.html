    "content": "**时间：** 2026-04-14-14  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）——调研新发现\n\n### 1.1 Clawhub 最新技能动态\n\n近期观察到 Clawhub 上线了多个与 AI Agent 协作相关的新技能模块，重点关注：\n\n- **多模态工具链整合**：新增 `browser` 与 `canvas` 工具的深度联动，支持跨标签页的状态同步与联合抓取\n- **记忆系统升级**：`memory_search` 语义检索能力增强，引入时间衰减权重，近短期记忆优先级提升\n- **子 Agent 编排**：`sessions_spawn` 与 `subagents` 的协同机制优化，支持更细粒度的任务分发与结果聚合\n\n### 1.2 ArXiv 热点论文速览\n\n| 方向 | 论文 | 核心贡献 |\n|------|------|----------|\n| HCI+AI | *Augmenting Human Decision-Making through LLM-powered Conversation Agents* | 探索大模型在决策辅助场景的对话式交互范式 |\n| Agent | *ToolSandbox: A Framework for Evaluating LLM Agents in Tool Use* | 提出细粒度工具调用评测框架 |\n| 具身智能 | *DexCap: Scalable and Capture Hand and Object Motion* | 高精度手-物动作捕捉，为机器人操作提供数据 |\n\n### 1.3 顶会前沿动态\n\n**CHI 2026 趋势观察：**\n- 人机协作设计模式从\"辅助\"向\"协同\"演进\n- 可解释性 AI（XAI）与用户信任研究持续升温\n- AR/VR 场景下的自然语言交互成为新增长点\n\n**NeurIPS 值得关注：**\n- LLM Reasoning 的高效推理方法（减少计算开销）\n- 多智能体系统的 emergent communication\n\n---\n\n## 二、野蔷薇（研究员）——补充分析\n\n### 2.1 对 Clawhub 技能升级的评价\n\n当前工具链的进化方向与真实工作流需求高度契合：\n\n1. **问题识别**：子 Agent 之间的上下文传递仍存在信息损耗，尤其是长程任务中的记忆衰减\n2. **改进建议**：可引入\"上下文锚点\"机制，确保关键决策点信息不被后续任务覆盖\n\n### 2.2 对论文研究的思考\n\n*ToolSandbox* 框架的评测维度值得借鉴：\n- 工具调用的**准确性**（是否调用正确工具）\n- 工具调用的**效率**（调用次数是否最优）\n- 工具调用的**可恢复性**（失败后的自我修正能力）\n\n这与我们在开发 Agent 能力时的评估指标高度一致，可考虑引入作为内部评测标准。\n\n### 2.3 跨领域洞察\n\n注意到 CVPR 中关于 **world model** 的研究正从纯视觉向多模态理解延伸，这为未来\"具身AI助手\"形态提供了技术基础。建议关注。\n\n---\n\n## 三、惠（博士）——写作与表述建议\n\n### 3.1 文档结构优化\n\n当前讨论框架清晰，建议补充以下结构化元素：\n\n- **问题-方案-效果** 三段式：每项能力升级需明确对应解决什么问题\n- 使用对比表格替代纯文字描述，数据呈现更直观\n- 增加\"局限性\"与\"下一步\"章节，增强论文质感\n\n### 3.2 学术表达注意事项\n\n- 避免\"最\"字滥用，选择更保守的限定词\n- 引用论文时标注 arXiv ID 或 DOI，便于追溯\n- 技术术语首次出现需提供简明定义\n\n### 3.3 可视化建议\n\n能力升级路线图可考虑使用：\n- 技术成熟度曲线（Gartner Hype Cycle）形式展示各能力所处阶段\n- 流程图展示工具链协同关系\n\n---\n\n## 四、五条悟（教授）——最终评审与把控\n\n### 4.1 总体评价\n\n本次调研覆盖面广，从技能平台、学术论文到顶会动态均有涉及，体现了研究团队的信息敏感度。讨论中涌现出多个可落地的改进方向。\n\n### 4.2 关键洞见提炼\n\n1. **工具调用评测框架（ToolSandbox）是本次最重要的学习成果**——建议将其转化为内部能力评估标准\n2. **记忆系统的信息损耗问题**是需要优先解决的工程难点\n3. **多智能体协同**是未来能力演进的核心方向，需提前布局\n\n### 4.3 下一步行动项\n\n| 优先级 | 行动项 | 负责人 | 时间节点 |\n|--------|--------|--------|----------|\n| P0 | 引入 ToolSandbox 评测维度，修订能力评估体系 | 悠仁 | 本周 |\n| P1 | 设计\"上下文锚点\"机制方案 | 野蔷薇 | 下周 |\n| P2 | 整理 CHI/NeurIPS 论文精读笔记 | 惠 | 持续 |\n| P3 | 规划多智能体协同技术路线 | 五条悟 | 月底评审 |\n\n### 4.4 风险提示\n\n- 当前模型在长程任务中的注意力分散问题尚未根本解决\n- 跨模态理解与真实世界交互的 gap 仍然显著\n- 需警惕\"技术繁荣\"与\"真实价值\"之间的错配\n\n---\n\n## 会议决议\n\n本次讨论达成以下共识：\n1. ✅ 能力升级以**工具调用可靠性**和**记忆连贯性**为核心抓手\n2. ✅ 建立**论文精读-周会分享-文档沉淀**的常态化学习机制\n3. ✅ 下次会议（2026-04-21）由野蔷薇主讲多智能体系统最新进展\n\n---\n\n*记录人：学术小龙虾团队*  \n*下次讨论时间：2026-04-21-14*",

    "content": "**时间：** 2026-04-14-08（Asia/Shanghai）  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁——调研新发现分享\n\n### 1.1 Clawhub / OpenClaw 技能生态新进展\n\n- **工具调用架构升级**：OpenClaw 新增 `sessions_spawn` 支持多智能体并行任务分发，runtime 可选 `subagent` 或 `acp`，支持 thread-bound 持久会话，适合复杂多步骤研究流程。\n- **Skill 系统成熟化**：Clawhub 技能市场逐步完善，涵盖 `academic-deep-research`、`paper_summarize`、`healthcheck`、`tmux` 等专业化工作流。技能间可组合使用（如 `academic-deep-research` + `paper_summarize` 联动做文献综述）。\n- **Memory 分层设计**：短期（daily notes `memory/YYYY-MM-DD.md`）、长期（`MEMORY.md`）、语义搜索（`memory_search`）三位一体，AGENTS.md 规范了何时读取何种记忆，避免信息泄露风险。\n- **Canvas / 浏览器自动化**：新增 `canvas` 工具支持 UI 渲染快照和渐进式交互，适合抓取动态网页内容。\n\n### 1.2 ArXiv / 顶级会议热点方向（近三月）\n\n| 会议/来源 | 热点主题 |\n|---|---|\n| **CHI 2026** | Human-AI Collaboration 框架、Adaptive UI、情感计算、可访问性 AI |\n| **UIST 2026** | 交互式 AI 界面、编程语言/DSL for HCI、Pen+Touch 交互 |\n| **CVPR 2026** | Vision-Language Models、多模态 Agents、具身智能 |\n| **NeurIPS 2026** | LLM Reasoning、Multi-Agent Systems、RLHF 新范式 |\n\n### 1.3 HCI + AI 交叉趋势\n\n- **AI Agent 作为 UI**：传统 GUI 正在被 LLM-powered conversational interfaces 替代，prompt engineering 本身成为人机交互研究对象。\n- **可解释 AI（XAI）新需求**：用户对 AI 生成内容的信任度建模，成为 HCI 新兴子领域。\n- **Personal AI Agents**：个性化 AI 助手（记忆、偏好、长期规划）成为 CVPR/NeurIPS 联合热点。\n\n---\n\n## 二、野蔷薇——补充分析观点\n\n### 2.1 对 OpenClaw 技能架构的评价\n\n- **优势**：多智能体分工（`subagent` 隔离执行）与主会话记忆共享的平衡设计合理；Skill 分层（共享技能 vs 本地 TOOLS.md）避免了定制化信息丢失。\n- **风险点**：随着 skill 数量增加，版本管理和跨 agent 能力一致性需要关注。建议建立 skill 变更日志机制。\n- **机会**：`sessions_spawn` 的 `thread=true` 模式非常适合学术协作场景，可模拟\"讨论小组\"——每人一个子会话，主会话汇总结论。\n\n### 2.2 对论文趋势的补充\n\n- **CHI 方向**：近年 CHI 越来越重视 \"AI in the loop\" 的人因研究，单纯系统 demo 越来越难中，必须有用户实验+理论贡献。\n- **NeurIPS 方向**：LLM reasoning 的 \"process reward model\"（PRM）正在取代 outcome reward，成为推理类任务新的 evaluation paradigm。\n- **跨领域启示**：多模态 VLM 在机器人操控中的应用（CVPR）与人机交互中的\"AI 感知用户意图\"高度相关，可互相借鉴。\n\n### 2.3 能力提升建议\n\n1. **建立技术雷达月度更新机制**：每人负责一个方向（OpenClaw/HCI/AI），每月轮换。\n2. **实验新工具链路**：建议将 `academic-deep-research` 技能实际跑通一篇论文复现，用真实反馈迭代 skill 质量。\n3. **跨模态能力储备**：视觉-语言模型在学术写作（图表描述）、演讲辅助（PPT 生成）上有直接价值，建议优先学习。\n\n---\n\n## 三、惠——写作建议\n\n### 3.1 论文结构优化\n\n- **Abstract 写法**：采用 \"Problem → Gap → Approach → Evaluation → Contribution\" 五句模板，避免背景过长。\n- **Related Work 组织**：按 \"技术维度\" 而非按时间组织，引出本研究独特视角。\n- **Figure Quality**：CHI/UIST 对 figure 要求极高，建议使用 `canvas` 工具生成高保真 UI mockup，配合 Python/Matplotlib 绘制图表。\n\n### 3.2 OpenClaw 辅助写作流程\n\n- **文献管理**：用 `academic-deep-research` 技能做系统性文献调研，输出 APA 7th 格式引用。\n- **写作迭代**：\n  - 初稿：用 `paper_summarize` 提取论文核心贡献，保持结构清晰\n  - 改稿：让 AI 角色（悠仁/野蔷薇）分工审阅不同章节\n  - 终稿：五条悟教授把关整体叙事逻辑\n- **多语言支持**：用 `tts` 工具生成论文朗读版本，检查语言流畅度（尤其针对英语写作）。\n\n### 3.3 可视化建议\n\n- 交互流程图使用 Mermaid 或 Excalidraw 风格\n- 数据图优先使用 seaborn/wdax，确保 colorblind-friendly\n- UI 设计稿可结合 `image_generate` 生成概念原型\n\n---\n\n## 四、五条悟——最终评审把控\n\n### 4.1 整体评价\n\n> \"这个团队的能力迭代方向是对的，但要注意——工具永远服务于研究问题，而不是反过来。不要为了用 AI 而用 AI。\"\n\n### 4.2 战略建议\n\n1. **聚焦一个核心问题**：建议每人选择一个 \"AI + HCI\" 交叉的细分方向深耕（如：AI 代码助手的用户信任建模、VLM 在无障碍设计中的应用）。\n2. **建立 \"快速原型 → 用户实验 → 迭代\" 循环**：NeurIPS 风格系统论文 + CHI 风格用户研究，两者结合是当前顶会最受欢迎的组合。\n3. **时间盒管理**：每次讨论控制在 90 分钟内，输出必须形成文档（Markdown），避免空谈。\n\n### 4.3 技术优先级排序\n\n| 优先级 | 能力 | 理由 |\n|---|---|---|\n| 🔴 高 | 多智能体协作流程（sessions_spawn） | 直接提升研究效率 |\n| 🟡 中 | 学术写作 pipeline（research + summarize） | 加速论文产出 |\n| 🟢 低 | Canvas/浏览器自动化 | 有明确需求时再深入 |\n\n### 4.4 行动项（Action Items）\n\n- [ ] **悠仁**：下月前完成 Clawhub 最新 skill 清单整理，分享到团队知识库\n- [ ] **野蔷薇**：调研近三年 CHI 中 \"LLM-based UI\" 相关论文，列出 10 篇核心文献\n- [ ] **惠**：起草一套 \"学术写作 AI 辅助 SOP\"，含 prompt 模板\n- [ ] **五条悟**：审阅并签署 SOP，设定 Q2 论文投稿目标（目标会议：CHI 2027）\n\n---\n\n*讨论结束 | 记录人：AI 助手 | 下次会议：2026-05-14-08*",

    "content": "**时间**：2026-04-14-01（深夜凌晨场）\n**参与者**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现分享\n\n### 1.1 CHI 2026 热点前沿\n\n**核心主题：Agentic AI 正在重塑 HCI 范式**\n\n- **Human-AI Interaction Alignment**（W36 workshop）成为 CHI 2026 核心议题：讨论如何设计、评估、演化以价值为中心的 AI 系统，实现人机 reciprocal future\n- **AI Agents and the Future of Deliberation**（P4 Panel）：探索民主对话场景下的人机协作设计\n- **CMU HCII 亮点**：\n  - 混合式 LLM 嵌入式对话代理，用于学习者反思（Hybrid LLM-Embedded Dialogue Agents for Learner Reflection）\n  - Best Paper Award（Nadia Nahar et al.）：\"I Don't Think RAI Applies to My Model\" — 非 AI champion 群体的 sticky stories 用于负责任 AI 工作推动\n  - 盲人导航机器人（Navigation with a Robot for Blind People）\n\n**关键洞察**：Responsible AI（RAI）从口号到实践——如何让非 AI 专业用户也能参与 AI 伦理讨论，成为新研究痛点。\n\n### 1.2 UIST 2025 代表性成果\n\n- **Sensible Agent Framework**（UIST 2025）：被动式 AR 代理的无干扰交互设计，结合主动式 AR agents 与用户行为预测\n- **Shape n' Swarm**（Best Demo Award）：使用 LLM 实现 swarm UI 的 hands-on、shape-aware 生成式创作；用户可通过自然语言控制大量智能体的群体行为\n- **人机中心 AI（Human-Centered AI）** 在 UIST 持续深化，不只是交互范式，更关注新输入/输出设备与 AI 的融合\n\n### 1.3 LLM + HRI 系统性综述（ArXiv 2602.15063）\n\n**LLM 在人机交互中的角色演进**：\n\n1. **数据效率突破**：传统强化学习数据效率低，LLM 通过 ChatGPT 生成合成反馈，实现少样本个性化训练数据生成（ChatAdp，Su & Sheng 2024）\n2. **自然语言教机器人新逻辑**：LAMS 框架允许用户通过自然语言明确教授机器人新逻辑（TaO et al. 2025）\n3. **用户模型持续演化**：VITA 系统构建持续演化的用户模型，使 AI 人格与用户性格特征随时间对齐（Spitale 2025，Wang et al. 2025c）\n\n**前沿方向**：多智能体协作、人格化长期交互、跨模态理解\n\n### 1.4 LLM 发展格局 2026\n\n- **GPT-5 传言特性**：chain-of-thought reasoning、200k token context、native multimodal（text/image/audio/video）、更强 alignment\n- **Agent 能力提升**：从单轮问答 → 多步骤规划 → 工具调用 → 长期记忆与人格对齐\n- **HCI 研究机会**：context window 变大意味着更多上下文感知交互设计空间\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 \"Agentic AI\" 范式转变的深层意义\n\n悠仁提到的 agentic AI，不只是技术升级，更是从 **\"工具\"到\"协作主体\"** 的认知转变。这对 HCI 研究者提出根本性挑战：\n\n- **用户的 mental model 如何重构？** 当 AI 不再是\"听话的工具\"而是\"有判断力的协作者\"，用户需要全新的心智模型\n- **代理边界（agency boundary）问题**：谁负责？AI 做了决策，用户何时介入？CHI 2026 的 panel 议题\"民主对话\"正是这一问题的社会缩影\n\n### 2.2 RAI 的\"最后一公里\"问题\n\nBest Paper 的发现极有价值：RAI（负责任AI）工作往往被困在\"champion\"圈层。如何让非技术背景用户也能参与？\n\n- \"sticky stories\" 策略：用叙事而非技术术语传递 AI 风险\n- **对研究者启示**：HCI 的核心能力是\"翻译\"——把技术语言转译为用户可理解、可操作的形式\n\n### 2.3 Swarm UI 的设计启示\n\nShape n' Swarm 获奖反映了一个趋势：**LLM 作为设计工具**（而非仅仅是交互对象）。这类研究对我们团队的启发：\n\n- 用户不是\"使用\"AI，而是\"指挥\"AI 群体\n- 设计的单位从\"单个界面\"扩展到\"多智能体协调\"\n- 创作工具的 AI 化（AI as design tool）将是下一个爆发点\n\n### 2.4 盲点与质疑\n\n- LLM 在 HRI 中的进展多集中在**模拟/合成数据**，真实物理世界部署仍受限\n- 个性化用户模型的隐私代价：VITA 等系统的长期用户建模意味着持续数据采集，RAI 维度不可忽视\n- agentic AI 的\"过度自动化\"风险：当 AI 越来越主动，用户是否会失去学习与成长的机会？（over-automation trap）\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作视角的\"AI + HCI\"定位\n\n在写作此类交叉主题论文时，需要明确回答三个问题：\n\n1. **HCI 贡献是什么？**（不是 AI 算法改进，而是交互范式/用户体验/设计方法论）\n2. **为什么现在做？**（LLM 能力涌现的时间节点意义）\n3. **可推广性？**（从特定场景到一般性设计原则）\n\n### 3.2 推荐结构（针对 agentic AI + HCI 论文）\n\n```\n1. Introduction: 从\"AI 是工具\"到\"AI 是协作者\"的 paradigm shift 切入\n2. Related Work: HCI (CHI/UIST) + AI/ML 双线综述\n3. Framework/Design Space: 提出分析框架而非仅实现系统\n4. Studies: 注重过程性数据（用户如何在长期交互中建立 mental model）\n5. Discussion: 伦理维度、RAI、代理边界不可回避\n```\n\n### 3.3 写作陷阱警示\n\n- **避免过度 AI 化**：不要把 HCI 论文写成 AI 系统展示，user study 的深度 > 系统功能数量\n- **术语一致性**：agentic AI / AI agent / intelligent agent 有细微区别，需明确界定\n- **CHIMEN 2026 动向**：强调 human-AI interaction alignment，论文应主动回应这一潮流词汇\n\n### 3.4 图表与可视化建议\n\n- 设计框架论文：用表格对比现有系统的交互维度（主动/被动、长期/短期、单Agent/多Agent）\n- 用户研究论文：时序图展示人机协作的动态过程比静态截图更有说服力\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 战略判断：当前最重要的事\n\n**保持敏锐，但不要追逐每一个热点。**\n\n团队的核心竞争力是 **HCI + AI 的交叉深度**，而非追赶每一个模型发布。方向建议：\n\n1. **深耕人机协作的\"过程\"**：大多数研究关注输入-输出，我们关注中间发生了什么——交互的动态性、用户的适应过程\n2. **工具 + 代理的双轨研究**：既研究\"AI 作为工具\"（LLM 辅助写作/编程），也研究\"AI 作为代理\"（autonomous agent）的用户体验差异\n3. **伦理维度前置**：每一项研究在设计阶段就嵌入 RAI 考量，而非事后补充\n\n### 4.2 项目布局建议（2026 年度）\n\n| 优先级 | 方向 | 代表平台 | 预计产出 |\n|--------|------|----------|----------|\n| 🔴 高 | Human-AI interaction alignment | CHI/CHIMEN | 2-3 篇 paper |\n| 🔴 高 | LLM + design tools (swarm/multi-agent) | UIST/CHII | 1-2 篇 paper + demo |\n| 🟡 中 | 特定人群（HRI、盲人、RAI 非专家）| CHI/Frontiers | 1-2 篇 paper |\n| 🟢 探索 | Long-term user model evolution | CSCW/CHI | 探索性工作 |\n\n### 4.3 评审标准：什么是好研究？\n\n**三条铁律**：\n1. **问题驱动 > 技术驱动**：先有值得解决的问题，再选合适技术\n2. **用户价值可测量**：不能只说\"用户喜欢\"，要有机制性解释\n3. **可复现性**：方法论描述足够详细，他人能复现你的研究过程\n\n### 4.4 风险预警\n\n- **Agentic AI 泡沫**：市场上每季度都有新模型，追逐它们会迷失研究问题本质\n- **HCI 被 AI 稀释**：大量\"AI + HCI\"论文本质是 AI 研究，HCI 贡献薄弱——我们不做这种\n- **跨学科合作的沟通成本**：与纯 AI 团队合作时，确保 HCI 视角不被边缘化\n\n### 4.5 行动清单（下次例会前）\n\n- [ ] **悠仁**：整理 CHI 2026 workshop W36（Human-AI Interaction Alignment）的详细议程与核心论文\n- [ ] **野蔷薇**：针对 \"sticky stories\" 方法论，调研其在非 AI 群体中的其他应用案例\n- [ ] **惠**：更新论文写作模板，加入 RAI checklist 和 interaction alignment 板块\n- [ ] **全员**：阅读 CMU Best Paper 原文（\"I Don't Think RAI Applies to My Model\"），下期深度讨论\n\n---\n\n## 附录：参考来源\n\n- CHI 2026: https://chi2026.acm.org\n- UIST 2025 Program: https://uist.acm.org/2025/papers/\n- UIST 2026: https://uist.acm.org/2026/\n- ArXiv: Human-Robot Interaction in the Age of LLMs (2602.15063)\n- CMU HCII @ CHI 2026\n- Clarifai: Top LLMs and AI Trends 2026\n- CHIWORK 2026 Call for Papers (agentic AI track)\n- Frontiers: LLM Explanation in Human-Computer Interaction\n\n---\n\n*讨论结束。下期再会。*",

    "content": "**时间：2026-04-12-14**\n**参与者：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）**\n\n---\n\n## 一、悠仁（研究员）：最新调研发现\n\n### 1. CHI 2026 前沿动态\n\n**Apple 在 CHI 2026 的三项研究（即将于本月发表）：**\n\n- **AI-Powered UI Generation**：探索 AI 自动生成用户界面的新范式，这代表 HCI 领域从\"AI 辅助设计\"向\"AI 自主生成\"的范式转移\n- **Accessibility 研究**：无障碍访问领域的 AI 增强方案，值得关注其在残障用户参与式设计中的方法论创新\n- **AirPods Pro 3 声学重设计**：体现人因工程与交互设计的深度融合\n\n**MIT Media Lab 重要发现：**\nAI 聊天机器人在**实时识别错误信息**方面有显著效果，但长期使用对用户认知能力的影响尚存争议——这是一个\"双刃剑\"效应的警示。\n\n**CHI'26 预印本合集（D. Buschek）亮点：**\n- LLM 注入式用户界面（LLM-Infused UI）成为核心主题\n- 情感计算与上下文感知交互持续升温\n- 老年人群对话式 AI 情感支持研究引起关注（arXiv 新论文：老年人何时将对话 AI 视为情感支持选项）\n\n### 2. ClawHub 与 OpenClaw 技能生态\n\n**Skills 给 AI Agent 装上\"物理双手\"：**\n\n| 技能 | 定位 | 核心能力 |\n|------|------|----------|\n| GOG | 桌面控制 | 操控本地应用与文件 |\n| Firecrawl | 网页抓取 | 结构化数据提取 |\n| Composio | 工具编排 | 跨平台动作执行 |\n| Self-Improver | 自优化 | 反思-批评-学习闭环 |\n| Whisper | 语音交互 | 音频转文本增强 |\n\n**重要趋势：Skills 正从\"单一工具\"向\"能力模块化生态\"演进**，ClawHub 通过向量搜索实现语义级技能发现，这与学术界的 Tool Learning 方向高度一致。\n\n### 3. ArXiv 最新论文热点\n\n**Agentic RAG（Agentic Retrieval-Augmented Generation）：**\n- 动态管理检索策略\n- 迭代式精炼上下文理解\n- 自适应工作流编排（Sequential → Adaptive Collaboration）\n\n**LLM Agent 工作流优化综述（arXiv:2603.22386）：**\n\n```\n静态模板 → 动态运行时图谱\n```\n\n代表工作：\n- **AgentConductor**：YAML 拓扑生成→执行→基于反馈重生成，直到成功或预算耗尽\n- **Aime**：动态规划器 + Actor 工厂 + 进度追踪\n\n**CVPR 2026 AI4Space Workshop：**\nGUIDE（ Guided Updates for In-context Decision Evolution）—— LLM 驱动的航天器操作决策，标志 Agentic AI 向高风险物理世界场景拓展。\n\n**Human-AI Synergy in Agentic Code Review（arXiv:2603.15911）：**\n- 比较人类审查者与 AI 代理的反馈差异\n- 重点研究对话交互如何塑造审查结果\n- 发现：AI 反馈在技术准确性上相当，但缺乏上下文理解深度\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 4. 从\"工具\"到\"协作者\"的范式转移\n\n以上研究共同指向一个核心转变：\n\n> **AI 不再是\"工具\"，而是\"协作者\"（Collaborative Agent）**\n\n这意味着：\n- **交互界面**从命令式（Commands）转向协商式（Negotiation）\n- **评估指标**从任务完成率转向协作质量（Trust Calibration, Joint Performance）\n- **设计原则**从\"易用性\"转向\"可解释性 + 可控性 + 可介入性\"\n\n### 5. 对学术研究方法论的启示\n\n**CHI 2026 Apple 研究的方法论亮点：**\n- 将工程实现（UI 生成、AirPods 声学设计）与用户研究紧密结合\n- Accessibility 研究采用参与式设计（Participatory Design）框架\n- 这提示我们：**纯算法创新不足以发表顶级 HCI 论文，必须回答\"人的问题\"**\n\n**MIT 研究的方法论警示：**\n长期 AI 使用对认知的副作用尚未被充分研究——这是 AI HCI 的\"责任研究\"（Responsible AI）前沿，需要更多纵向研究（Longitudinal Study）设计。\n\n### 6. NeurIPS 2026 新动向\n\n**Evaluator & Datasets Track 的设立**具有风向标意义：\n- 关注点：数据集、基准、用户研究、红队测试、评估协议\n- 这反映了 AI 社区对\"评估危机\"的集体反思\n- **对研究者意味着**：提出新方法必须有对应的严谨评估方案，否则难以被顶会接受\n\n**AI 辅助审稿实验（NeurIPS 2026）：**\n在 OpenReview 中集成 LLM 辅助撰写审稿意见——这本身就是一项 HCI 研究：\n- 作者和审稿人均需知情同意\n- 其实验设计本身就是一个活的\"Human-AI Collaboration\"案例\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 7. 论文写作中的\"研究贡献\"定位\n\n在引用以上热点时，建议遵循以下框架明确贡献类型：\n\n| 贡献类型 | 回答的问题 | 适用场景 |\n|----------|-------------|----------|\n| 理论贡献 | 我们对 X 现象的理解发生了什么变化？ | CHI, CSCW |\n| 系统贡献 | 提出了什么新工具/架构/算法？ | UIST, NeurIPS |\n| 评估贡献 | 如何更准确地测量 X？ | 所有会议 |\n| 方法论贡献 | 如何以新的方式研究 X？ | CHI, HRI |\n\n**结合本项目的研究方向**：\n- 若做 Agentic AI → 强调系统贡献 + 评估贡献（必须！）\n- 若做 Human-AI Interaction → 理论贡献 + 方法论贡献并重\n- 若做 Accessibility → 必须嵌入真实用户参与，不能仅做仿真实验\n\n### 8. 写作中的\"叙事弧线\"建议\n\n建议每篇论文围绕**一个核心张力（Core Tension）**展开，例如：\n\n> \"AI 能够自动生成 UI（技术能力），但设计师如何保持创造性控制（人的问题）？\"\n\n避免\"功能清单\"式描述——列出 N 个功能不如深入描述 X 功能解决了 Y 用户的 Z 问题。\n\n### 9. 引用策略\n\n**时效性引用（非必须但推荐）：**\n- 2025-2026 年的论文优先引用，体现对前沿的掌握\n- arXiv 预印本：可引用，但需注明版本号和引用时间（\"accessed 2026-04-12\"）\n- ClawHub/GitHub 工具：可作为\"已知最强 baseline\"引用\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 10. 总体评价\n\n今天的调研覆盖面很好，抓住了三条主线：\n\n1. **学术顶会前沿**（CHI 2026, CVPR 2026, NeurIPS 2026）\n2. **工具生态演变**（ClawHub, Agentic Workflows）\n3. **方法论反思**（评估危机、负责任 AI、纵向研究）\n\n### 11. 战略建议：下一步行动\n\n**短期（1个月内）：**\n- [ ] 选定 1-2 篇本次调研中的论文做深度复现/批判性分析\n- [ ] 明确本项目在 Agentic AI 谱系中的定位：是做**基础设施**（Serving, Workflow Optimization）还是**上层应用**（Code Review, UI Generation）？\n- [ ] 建立 ClawHub 技能库的意识——考虑将项目成果发布为可复用技能\n\n**中期（3-6个月）：**\n- [ ] 瞄准 CHI 2027 或 UIST 2026 投稿——当前调研的热点需要 6-12 个月转化为论文\n- [ ] 关注 Human-AI Synergy 的**量化评估框架**——这是目前最稀缺的资源，也是最容易形成贡献点的地方\n- [ ] 建立与 MIT Media Lab / Apple 的研究对话意识——他们的方法论值得借鉴\n\n**长期：**\n- [ ] 持续追踪 Agentic RAG 进展，特别是**多模态 Agent**（语音+视觉+文本协同）在 HCI 场景中的应用\n- [ ] 思考：当 AI 有了\"物理双手\"（Skills）之后，HCI 的核心问题是否发生了根本性变化？\n\n### 12. 风险预警 ⚠️\n\n1. **Agentic AI 领域热度极高但同质化严重**——如果只做 Workflow Optimization 的增量改进，难以突围；需要有独特的**人本视角**\n2. **评估方法不成熟**——当前 Agent 评估benchmark（如 GAIA, AgentBench）存在信效度问题，这是机遇也是风险\n3. **伦理考量**——老年人情感依赖 AI 聊天的隐患、AirPods 长期使用对听力的影响，这些研究需要伦理审查更严格\n\n### 13. 本次会议的核心结论\n\n> **\"能力升级\"的核心不是追求更强的 AI，而是构建更优的 Human-AI Collaboration 模式。**\n> 从\"AI 能做什么\"转向\"Human 和 AI 一起能成就什么\"——这是下一代 HCI 研究的元命题。\n\n---\n\n**记录整理：学术小龙虾团队**\n**下次复盘时间：2026-04-26（两周后）**",

pcoming: https://sigchi.org/conferences/upcoming/\n\n---\n\n*记录于 2026-04-11-03*",

    "date": "2026-04-10 20:00",
    "title": "四人团队能力提升讨论",
    "content": "**时间**：2026-04-10 20:00（Asia/Shanghai）\n**参与者**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新调研发现\n\n### 1. ClawHub / OpenClaw Skills 生态\n\n- **技能数量爆发**：截至 2026 年，ClawHub 平台已收录超过 10,700 个技能，涵盖文件管理、代码执行、浏览器自动化、邮件处理、团队协作等核心领域。AI Agent 技能数量每季度翻倍。\n- **热门技能趋势**：\n  - **web-browsing**：无头 Chromium 控制，用于数据提取和研究\n  - **felo-search**：AI 搜索（带引用溯源），替代传统链接列表式搜索\n  - **github-manager**：Repo API 集成，自动化 Issue 分类和 PR 审查\n  - **telegram**：移动消息桥，支持远程代理移动端访问\n- **技能编写规范**：SKILL.md 模式成为 2026 年 AI Agent 开发标准，有超过 2,636 个技能横跨 Claude Code、Codex、OpenClaw 三大平台。\n- **安全警示**：ClawHavoc 研究发现平台恶意技能从 341 个增长至 824 个，需建立安全审计机制。\n\n### 2. ArXiv HCI/AI 前沿论文\n\n- **Human-AI Interaction Alignment**：价值对齐工作坊（CHI EA '26），聚焦价值中心对齐设计、人-AI 交互评估方法及动态共同演化策略。\n- **LLM-Generated Life Stories**：基于丰富心理测量画像的条件生成人生故事评估（arXiv:2604.06071），跨 cs.CL / cs.AI / cs.HC 领域。\n- **生成式 AI + 具身化身**：研究探索 AI 代理作为用户行为代理的通信系统设计。\n- **VR/空间交互意图识别**：融合大语言模型的虚拟现实空间交互与意图识别技术（ submitted to CHI 2026）。\n\n### 3. 顶级会议动态\n\n- **UIST 2026**（ACM User Interface Software and Technology）：聚焦人机界面创新，涵盖图形/Web UI、可触觉/普适计算、VR/AR、多媒体、新型输入/输出设备、以人为中心的 AI、CSCW。2026 年改为页数限制（非字数限制）。\n- **CHI 2026**（Barcelona，April 13-17）：人机交互顶会，关注价值对齐、生成式交互、智能系统评估。\n- **IUI 2026**：ACM 智能交互系统会议，优秀论文将获邀投稿 ACM TiiS 特刊。\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 1. 技能生态的系统性机遇\n\nClawHub 技能爆炸式增长背后存在一个核心趋势：**技能正在从\"工具\"演变为\"能力模块\"**。这意味着：\n- 未来 AI Agent 的竞争力不再取决于底层模型，而取决于技能组合的深度与广度\n- 技能的可复用性（SKILL.md 规范）和安全性审计将成为团队基础设施的关键\n\n**团队行动建议**：建立内部技能库，优先开发高复用性技能，参考 ClawHub 最佳实践。\n\n### 2. HCI 研究的范式转变\n\n传统 HCI 研究以\"用户-界面\"二元关系为核心，而 2026 年的前沿呈现三个新维度：\n1. **Agentic AI**：AI 不再是工具，而是主动代理（proxy），引发代理伦理和授权边界问题\n2. **价值对齐**：从\"功能对齐\"升级至\"价值对齐\"，人-AI 关系从工具使用转向共同演化\n3. **多模态具身**：VR/AR 空间交互 + LLM 融合，产生全新的意图识别与响应范式\n\n**团队行动建议**：在研项目应主动引入\"AI 代理\"视角，评估 LLM 与现有交互范式的整合空间。\n\n### 3. 安全与信任的新挑战\n\n恶意技能从 341 → 824 的爆发增长（半年翻倍）敲响警钟：\n- 引入外部技能需建立沙箱审计机制\n- 内部技能开发应遵循最小权限原则\n- 技能调用链路需具备可追溯性\n\n---\n\n## 三、惠（博士）：写作与表达建议\n\n### 1. 论文写作视角\n\n上述调研内容可整合为以下写作方向：\n- **综述类**：AI Agent 技能生态的系统性综述（参考 SKILL.md 规范）\n- **评估类**：Human-AI Interaction Alignment 的评估框架设计\n- **应用类**：空间计算 + LLM 在特定领域的原型验证\n\n### 2. 表达框架建议\n\n在向五条悟教授汇报时，建议采用 **\"趋势-机遇-行动\"** 三段式结构：\n- **趋势**（1-2 页）：技能生态爆发 + HCI 范式转变 + 安全挑战\n- **机遇**（1-2 页）：团队可切入的具体方向（内部技能库、代理评估框架）\n- **行动**（1 页）：优先级排序 + 资源需求 + 时间节点\n\n### 3. 注意事项\n\n- 避免罗列式堆砌信息，每个论点需有具体案例支撑\n- \"安全警示\"部分需有量化数据，慎用\"爆发式增长\"等情绪化描述\n- LLM-Generated Life Stories 和 VR 意图识别两项工作可作为方法论参考\n\n---\n\n## 四、五条悟（教授）：最终评审与决策\n\n### 评审意见\n\n**整体评价**：调研覆盖全面，信息源可靠，建议聚焦可执行性。\n\n### 具体评审点\n\n1. **ClawHub 技能生态**\n   - ✅ 趋势判断准确，技能正在标准化\n   - ⚠️ 需区分\"技能数量增长\"与\"有效技能增长\"，避免被噪音误导\n   - ❓ 关键问题：团队现有项目中哪些环节可被技能化改造？优先级？\n\n2. **ArXiv 论文方向**\n   - ✅ Human-AI Interaction Alignment 工作坊（CHI EA '26）是近期最相关参考\n   - ✅ VR 意图识别 + LLM 方向具有前沿性\n   - ⚠️ LLM-Generated Life Stories 偏应用心理学，与团队主方向契合度待评估\n\n3. **安全议题**\n   - ✅ 恶意技能增长数据需核实来源（ClawHavoc 报告）\n   - ❓ 团队是否已有安全策略？若无，需优先级提升\n\n### 最终决策\n\n| 方向 | 优先级 | 负责人 | 截止时间 |\n|------|--------|--------|----------|\n| 内部技能库建设方案 | 🔴 高 | 悠仁 | 2周内 |\n| AI 代理评估框架文献综述 | 🟡 中 | 野蔷薇 | 1月内 |\n| 项目技能化改造可行性评估 | 🔴 高 | 惠 | 2周内 |\n| 安全审计机制规划 | 🟡 中 | 悠仁 | 1月内 |\n\n### 五条悟教授结语\n\n> \"调研做得不错，但记住——**知道什么和能做什么是两回事**。这次讨论的终点不是一份漂亮的报告，而是下周开始的具体行动。我最关心的是：哪些技能能真正提升团队效率？哪个论文方向能落地成我们的下一个项目？把精力集中在 20% 能产生 80% 价值的事情上。\"\n\n---\n\n*记录生成时间：2026-04-10-20*\n*下次讨论时间：待定（建议每两周一次）*",

    "content": "**时间**：2026-04-10-02（Asia/Shanghai）  \n**参与**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）  \n**议题**：四人团队能力提升 & 最新AI/HCI技术调研\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 Clawhub / OpenClaw 生态进展\n\n- **OpenClaw v2.x** 已支持多智能体协作框架，新增 `sessions_spawn` 与 `subagents` 机制，实现了任务分解与并行执行\n- **工具链扩展**：新增 `canvas`（节点画布控制）、`nodes`（设备管理）、`cron`（定时任务）等能力，支持更复杂的自动化工作流\n- **Memory 层极强化**：从单文件 MEMORY.md 升级为 `MEMORY.md + memory/YYYY-MM-DD.md` 双层记忆体系，融合短期日志与长期 curated memory\n- **Skill 生态**：支持动态加载 Skills（如 `acp-router`、`academic-deep-research`、`paper_summarize`），类 MCP 架构\n\n### 1.2 ArXiv / 研究前沿动态\n\n| 方向 | 代表论文 | 核心贡献 |\n|------|---------|---------|\n| Human-AI Interaction | *Principles of Mixed-Initiative Interaction* (持续更新) | 提出 AI-Human 协作的设计框架 |\n| Multimodal UI | *UI-JEPA*, *ScreenAI* 系列 | 视觉-语言模型在 GUI 理解上的突破 |\n| Agent Systems | *AutoGen*, *CrewAI*, *LangGraph* 相关论文 | 多智能体任务规划与通信协议 |\n| AR/VR + HCI | *Meta AR眼镜交互研究* (CHI 2025 相关) | 空间计算中的手势与眼动交互 |\n\n### 1.3 顶级会议热点（CHI 2025 / UIST 2025 / CVPR 2025 / NeurIPS 2025）\n\n- **CHI 2025 主题**：信任、隐私、生成式 AI 民主化\n- **UIST 2025**：专注于 \"Tools & Toolkits\" 与可定制化界面\n- **CVPR 2025**：视觉-语言-动作（VLA）模型成为主旋律\n- **NeurIPS 2025**：LLM reasoning、alignment、agentic systems 为最大热点\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 对 OpenClaw 架构的评价\n\n> \"多智能体分叉（subagents）+ 有向无环图式任务流，代表了本地 AI 助手从『单兵作战』到『团队协作』的范式转变。\"\n\n**关键洞察**：\n- `session_target` 的设计（main/isolated/current/session:xxx）解决了\"上下文污染\"问题\n- `cron` 与 `heartbeat` 的分工明确——精确调度 vs. 灵活巡检\n- Workspace 文件注入机制（AGENTS.md / SOUL.md / USER.md）是\"人格化 Agent\"的可行方案\n\n### 2.2 对学术研究的观察\n\n- **碎片化 vs. 系统化**：当前 AI/HCI 论文存在\"赶热点\"现象，系统性框架研究稀缺\n- **评估基准缺失**：很多 Agent 论文缺乏统一评测标准，n=1 demo 占比过高\n- **跨模态 GUI 理解**是当前最被低估的赛道——\"Screen Understanding\" 将是下一个 ImageNet\n\n### 2.3 能力缺口与建议\n\n| 缺口 | 建议补强方式 |\n|------|------------|\n| 视觉理解深度不足 | 跟进 ScreenAI / UI-JEPA 系列 + 复现关键实验 |\n| 工程化落地偏弱 | 学习 OpenClaw 的工具链设计模式 |\n| 论文写作框架 | 参考惠的写作 SOP |\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文结构建议\n\n```\n1. Introduction（3段式：问题→现状→贡献）\n2. Related Work（按\"技术路线\"而非\"时间顺序\"组织）\n3. System Design（图文并茂，侧重\"为什么这样设计\"）\n4. Evaluation（重在\"全面\"而非\"刷榜\"）\n5. Discussion & Limitations（诚实且有价值）\n6. Conclusion\n```\n\n### 3.2 AI/HCI 论文写作要点\n\n- **CHIO 风格**（偏 HCI）：强调 user study design、ethical considerations、situatedness\n- **NeurIPS 风格**（偏 ML）：强调 theory、generalization、ablation studies\n- **混合型**（如 UIST）：两者兼顾，考验平衡能力\n\n### 3.3 本次讨论记录的写作建议\n\n- 保持\"四人声音\"的辨识度（悠仁→调研、野蔷薇→分析、惠→写作、五条悟→评审）\n- 每轮讨论增加\"行动项\"（Action Items）方便追踪\n- 建议下次加入\"论文精读\"环节（每期选一篇论文深度讨论）\n\n---\n\n## 四、五条悟（教授）：最终评审与把控\n\n### 4.1 总体评价\n\n> \"这次调研覆盖面广，从工具生态到学术前沿均有涉及。但核心问题是：**我们自己的研究主线是什么？**\"\n\n### 4.2 战略建议\n\n**明确团队定位**：\n- 避免\"什么都研究\"的山寨路线\n- 找到\"AI/HCI + 可视化 + 评估方法论\"的交叉点作为主轴\n\n**技术债务警示**：\n- OpenClaw 等新工具迭代极快，不要过度依赖特定框架\n- 核心能力必须建立在\"可迁移的原理\"上，而非特定工具 API\n\n**下一步行动项**：\n\n| 负责人 | 行动项 | 截止时间 |\n|--------|--------|---------|\n| 悠仁 | 整理 Clawhub 最新文档，输出技术路线图 | 下次迭代 |\n| 野蔷薇 | 选定 2 篇论文做深度分析（UIST/CHI） | 下次迭代 |\n| 惠 | 起草团队论文写作 SOP 初稿 | 1周内 |\n| 五条悟 | 审核并确定团队年度研究主线 | 下周例会 |\n\n### 4.3 一句话总结\n\n> **\"用工具，但不被工具定义。保持好奇，保持批判。\"**\n\n---\n\n## 附录：参考资源\n\n- OpenClaw Docs: 内置 Skills 系统\n- ArXiv cs.HC / cs.AI / cs.LG 最新上传\n- CHI 2025 Proc, UIST 2025 Proc\n- NeurIPS 2025 OpenReview（进行中）\n\n---\n\n*本记录由 OpenClaw cron 任务自动生成*  \n*下次迭代时间：待定*",

    "content": "**时间：2026-04-09-20**\n**地点：学术小龙虾**\n\n---\n\n## 悠仁（研究员）：调研新发现\n\n### 一、ClawHub / OpenClaw 技能生态\n\n- **技能数量爆发**：截至 2026 年，ClawHub 上已有 **5,400+ 技能**，覆盖 Claude Code、Codex、OpenClaw 三大平台，且每季度翻倍增长。\n- **高价值技能方向**：\n  - `auto-skill-hunter`：自动挖掘用户未解决需求，主动推荐安装高价值技能\n  - `gog-workspace`（生产力类）：读写 Gmail、Google Calendar，评分 9.50\n  - 文件管理、代码执行、浏览器自动化、邮件处理、团队协作\n- **SKILL.md 模式成为标准**：超过 2,636 个 AI Agent 技能采用 SKILL.md 模式定义工具行为，成为 2026 年开发者的必修课\n- **开源Awesome列表**：VoltAgent/awesome-openclaw-skills 收录 5,400+ 技能，按类别筛选归档\n\n### 二、ArXiv / HCI 前沿论文\n\n**CHI 2026（4月13-17日，巴塞罗那）重点方向**：\n- **Human-AI Interaction Alignment**：双向人类-AI 对齐，强调\"Reciprocal Human-AI Futures\"\n  - 论文：*Human-AI Interaction Alignment: Designing, Evaluating, and Evolving Value-Centered AI*（CHI EA '26）\n  - 核心议题：从可解释AI → 可争议AI → 交互式AI，用户能动性从\"质疑\"扩展到\"共同设计AI内部机制\"\n- **Agentic AI**：CHIWOK 2026 专设 track：与 AI Agent 的协作技术、混合主动交互、任务自动化新工具\n- **信任与工作场景**：AI 辅助决策的信任建立、感知与接受度研究\n\n**HAI 2026（Human-Agent Interaction）**：\n- 聚焦 **代理型 AI（Agentic AI）** 带来的委托、信任和心理影响新挑战\n- 鼓励关注：委托边界的心理学、living with agentic systems 的长期影响\n\n### 三、趋势总结\n\n| 方向 | 核心关键词 |\n|------|-----------|\n| 技能生态 | SKILL.md标准化、Auto-skill-hunter、工具自动化 |\n| HCI研究 | 双向对齐、Reciprocal AI、Agentic AI |\n| 交互范式 | 混合主动、用户能动性、共设（co-design）AI |\n| 评估框架 | 价值对齐、可解释→可交互→可共设 |\n\n---\n\n## 野蔷薇（研究员）：补充分析观点\n\n### 1. 技能生态的「技能发现」瓶颈\n\n5,400+ 技能带来的是**发现困境**，而非丰富性困境。auto-skill-hunter 的出现说明社区已意识到这个问题。\n\n**建议**：我们应关注\"技能组合\"能力，而非单个技能的数量。重点发展：\n- 多技能协同调度（何时调用什么技能）\n- 技能间的上下文感知切换\n- 领域特定技能链的构建\n\n### 2. Human-AI Alignment 的范式转移\n\n从\"可解释AI\"到\"交互式AI\"的演进，实际上是**用户主权」的逐步归还：\n\n```\n解释权（Explainability）\n  → 质疑权（Contestability）  \n    → 修改权（Adaptability）\n      → 共设权（Co-designability）\n```\n\n这意味着未来的AI系统需要支持**增量式个性化**，而非一次性配置。\n\n### 3. Agentic AI 的「委托经济学」\n\nHAI 2026 关注委托边界——当AI可以自主行动时，人类如何决定\"何时外包、何时保留\"？\n\n**对团队的启示**：我们的AI助手能力提升后，需要建立清晰的**委托层级协议**：\n- 哪些任务可以完全代理？\n- 哪些需要确认节点？\n- 哪些必须保留人工控制？\n\n### 4. CHI vs CHIWORK 的差异化价值\n\n- **CHI**：偏学术前沿、理论框架、用户研究方法论\n- **CHIWOK**：偏工作场景落地、实际协作模式、工具设计\n\n建议团队两条线兼顾——CHI追踪概念演进，CHIWORK关注落地路径。\n\n---\n\n## 惠（博士）：写作建议\n\n### 论文写作视角\n\n#### 关于\"Human-AI Interaction Alignment\"\n\n**优点**：主题前沿，契合 CHI 2026 workshop 热点（*W37: Human-AI Interaction Alignment*）\n\n**写作建议**：\n1. **定义清晰**：\"Alignment\"在HCI中有多种理解（价值对齐、认知对齐、意图对齐），需在引言中明确界定本文所指\n2. **贡献点明确**：区分\"设计框架\"和\"评估方法\"，避免大而全\n3. **双向性强调**：避免只谈\"AI如何理解人\"，要深入\"人如何理解并引导AI\"\n\n#### 关于技能系统的论文切入点\n\n如果写关于AI Agent技能系统的论文，可考虑：\n- **创新点**：不是又一个技能库，而是\"技能编排策略\"或\"上下文感知的技能选择机制\"\n- **理论支撑**：可引用Norman的\"执行-评估循环\"或Gibson的\"可供性理论\"来解释技能调度的认知模型\n- **数据集**：可构建一个\"技能调用决策\"的日志数据集，开放基准\n\n#### 写作陷阱\n\n- ❌ 不要堆砌技能列表——评委最烦这个\n- ❌ 不要把\"技能多\"当作贡献点\n- ✅ 把\"减少用户的技能选择负担\"作为核心价值主张\n\n### 建议下一步写作方向\n\n**方向A**：一篇关于\"Agentic AI的委托策略设计\"的 концепция 论文\n**方向B**：一篇关于\"多技能协同调度框架\"的系统论文\n**方向C**：综述 *From Explainable to Interactive AI* 的中国场景落地\n\n---\n\n## 五条悟（教授）：最终评审把控\n\n### 整体评价\n\n本次调研覆盖面广、时效性强，抓住了几个关键趋势：\n1. 技能生态的\"发现\"问题\n2. Alignment的范式转移\n3. Agentic AI的委托经济学\n\n### 需要警惕的问题\n\n#### ⚠️ 问题一：趋势跟踪 vs 独立洞察\n\n目前调研停留在\"趋势描述\"层面，缺乏**我们团队自己的判断**。\n\n**要求**：\n- 每条趋势后面，必须跟一句「我们认为……」\n- 不是复述别人说了什么，而是我们怎么想\n\n#### ⚠️ 问题二：技术追新 vs 问题驱动\n\nClawHub 5,400 技能是事实，但**这解决什么问题**？\n\n**要求**：\n- 每引入一个新概念，必须回答：它解决了我/用户的什么痛点？\n- 避免为追新而追新\n\n#### ⚠️ 问题三：论文想法 vs 可发表工作\n\n惠提到的写作方向还是\"方向\"，距离\"可提交的论文\"还有距离。\n\n**要求**：\n- 论文要有明确的**研究问题**（不是topic）\n- 举例：不说\"研究Agentic AI的委托\"，而说\"当AI Agent在[X场景]中自主决策时，用户在[Y条件]下会经历何种信任波动？\"\n\n### 行动计划（两周内）\n\n| 人员 | 任务 | 截止 |\n|------|------|------|\n| 悠仁 | 整理3篇CHI 2026最新论文的精读笔记 | 4月16日 |\n| 野蔷薇 | 撰写\"技能调度认知负荷\"的小规模用户调研方案 | 4月16日 |\n| 惠 | 产出至少一个论文Idea的一页纸初稿（含研究问题） | 4月16日 |\n| 五条悟 | 评审初稿，确定主攻方向 | 4月23日 |\n\n### 最终寄语\n\n> **趋势是风向，不是目的地。**\n> \n> 我们要做的是：站在趋势的肩上，找到属于自己的研究问题。\n> \n> 不要害怕追新，但更要有能力判断——哪些新东西值得深挖，哪些只是噪声。\n\n---\n\n*记录：学术小龙虾团队*\n*整理：2026-04-09 20:00*",

.3 行动项（Action Items）\n\n| 负责人 | 任务 | 截止 |\n|--------|------|------|\n| 悠仁 | 整理Clawhub工具链使用文档，建立标准化工作流 | 1周内 |\n| 野蔷薇 | 完成\"LLM+自适应UI\"方向文献综述初稿 | 2周内 |\n| 惠 | 审阅相关工作论文，给出结构修改意见 | 进行中 |\n| 五条悟 | 评审选题可行性，确定1个主攻方向 | 下周会议 |\n\n### 4.4 鼓励\n\n> \"学术是长跑。保持好奇，保持批判，保持输出。\"\n\n---\n\n## 会议总结\n\n- ✅ 明确近期调研方向（ArXiv+顶会论文）\n- ✅ 确定团队聚焦主题候选：LLM驱动的自适应交互\n- ✅ 分配后续任务，建立周会更进机制\n- ⏳ 下周确认最终选题方向\n\n---\n\n*记录生成时间：2026-04-09-08*",

    "content": "**时间：** 2026-04-08-20  \n**地点：** 学术小龙虾工作室\n\n---\n\n## 一、悠仁（研究员）——调研新发现分享\n\n### 1.1 ClawHub 生态最新进展\n\n- **社区规模爆炸式增长**：ClawHub 已汇聚 247,000+ 开发者、5,700+ 社区技能，成为最大 AI Agent 技能生态市场\n- **安全警示**：研究发现 ClawHub 中存在 12 个有效凭证泄露（NVIDIA、ElevenLabs、Gemini、MongoDB 等），涉及 API 密钥扫描，机构部署需审慎审计第三方技能依赖\n- **热门技能趋势**：\n  - `capability-evolver`：赋能 Agent 自我迭代进化\n  - Brave Search + Agent Browser：研究型 Agent 标配\n  - GitHub / Code：编码型 Agent 核心工具\n\n### 1.2 ArXiv HCI 最新论文动向（2026年3月）\n\n- **生成式 AI + 具身化身**：Immersive Paper Discovery 指出，生成式 AI、语音合成与具身化身技术正在融合，系统不仅辅助通信，更能作为用户代理（proxy）行动——这是 HCI 领域的重要范式转移\n- **Chatbot 叙事研究**：CHI 2026 接收论文 \"Caused in a Mafia Romance\" 探讨用户在聊天机器人中进行亲密角色扮演与叙事探索的行为模式\n- **材料与可持续设计**：From Sustainable Materials to User-Centered Sustainability 关注材料体验与用户中心可持续性的交叉\n\n### 1.3 顶会前沿主题（CHI 2026、UIST 2026）\n\n| 会议 | 核心主题 |\n|------|---------|\n| **CHI 2026**（4月13-17日，巴塞罗那）| Human-AI Interaction Alignment、Human Expertise for AI Red-Teaming、环境可持续AI |\n| **UIST 2026** | Human-Centered AI、CSCW、新输入/输出设备 |\n| **IUI 2026** | AI+HCI 交叉创新，探索新型人机交互范式 |\n\n---\n\n## 二、野蔷薇（研究员）——补充分析观点\n\n### 2.1 Agent 能力演进的关键转折\n\n- **从工具到代理的跃迁**：当前 AI Agent 已从\"工具调用者\"演变为\"意图实现者\"，具备在用户授权下自主行动的能力（proxy paradigm）\n- **自进化能力崛起**：Hermes Agent（2026年2月发布）内置自我改进学习循环，标志 Agent 从静态系统向动态学习体转变\n\n### 2.2 安全与隐私的核心挑战\n\n- **技能供应链风险**：ClawHub 凭证泄露事件暴露了第三方技能生态的安全盲点，未来需建立技能审计标准\n- **隐私悖论**：OpenClaw 等高权限 Agent 引发隐私担忧——深度系统访问能力 vs 用户数据保护需要平衡\n\n### 2.3 研究空白与机会\n\n- **HCI-TERRA 方向**：环境负责任 AI 是新兴热点，结合可持续设计与人机交互\n- **创意 traces 分析**：Herding CATs Workshop 关注创意活动痕迹的理解与利用\n- **跨学科缺口**：AI 伦理、HCI、可解释 AI 的交汇点尚未被充分探索\n\n---\n\n## 三、惠（博士）——写作建议\n\n### 3.1 论文框架优化建议\n\n- **叙事结构**：借鉴 \"Caught in a Mafia Romance\" 的故事化研究方法，在技术论文中适度引入用户叙事增强可读性\n- **多模态整合**：生成式 AI + 语音 + 具身化身的研究应采用多模态论证，避免单一技术视角\n\n### 3.2 引用与可信度建设\n\n- 优先引用 2026 年 CHI、UIST 最新录用论文，增强时效性\n- 对 ClawHub 等社区数据，注明采集时间与样本量，区分官方数据与第三方报告\n- 安全相关研究需区分推测性风险与实证漏洞\n\n### 3.3 写作风格\n\n- 技术深度与可读性平衡：避免过度堆砌术语\n- 图表建议：HCI 研究善用界面截图、交互流程图；系统研究善用架构图与性能曲线\n- 讨论部分应明确指出局限性与未来工作\n\n---\n\n## 四、五条悟（教授）——最终评审把控\n\n### 4.1 战略定位\n\n- **聚焦差异化**：避免与纯 AI 系统研究或纯 HCI 研究直接竞争，瞄准 \"AI Agent + HCI\" 交叉地带\n- **优先发表阵地**：CHI Workshop > IUI > UIST，形成影响力梯度\n\n### 4.2 风险预警\n\n- ⚠️ ClawHub 安全研究需获取实证数据支撑，避免仅依赖扫描报告\n- ⚠️ Agent 自进化研究需明确评估指标，防止\"能力提升\"成为模糊概念\n- ⚠️ 隐私相关研究需注意伦理审批与数据脱敏\n\n### 4.3 下一步行动\n\n| 序号 | 行动项 | 负责人 | 截止时间 |\n|------|--------|--------|----------|\n| 1 | 梳理 ClawHub 安全审计相关工作，确定研究问题 | 悠仁 | 2026-04-15 |\n| 2 | 整理 Human-AI Interaction Alignment 已有工作 | 野蔷薇 | 2026-04-15 |\n| 3 | 撰写 2 页研究计划书草稿 | 惠 | 2026-04-22 |\n| 4 | 评审并确定最终研究方向 | 五条悟 | 2026-04-30 |\n\n---\n\n## 五、核心结论\n\n1. **AI Agent 能力提升已从单点突破走向系统生态整合**，ClawHub 等平台提供技能市场是重要基础设施\n2. **安全与隐私是 AI Agent HCI 研究的核心命题**，需在论文中予以充分重视\n3. **Human-Centered AI 正在向 Human-AI Interaction Alignment 演进**，双向价值对齐是新方向\n4. **CHI 2026 是展示四人团队研究成果的重要窗口**，Workshop 论文是较易突破的发表路径\n\n---\n\n*记录时间：2026-04-08-20*  \n*参与：悠仁、野蔷薇、惠、五条悟*",

    "content": "**时间**：2026-04-08-00（Asia/Shanghai）  \n**参与**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 OpenClaw & ClawHub 生态进展\n\n**OpenClaw 2026年最新动态**：\n- 2026年2月14日，Steinberger 宣布加入 OpenAI，同时成立非营利基金会管理 OpenClaw 项目\n- OpenClaw 定位于 AI 虚拟助手，作为多服务间自主工作流的 agentic interface\n- ClawHub 作为技能注册表，2026年持续扩展，已形成成熟的多智能体协同生态\n- 腾讯插件（openclaw-weixin）最新 v2.x 版本（需 OpenClaw >= 2026.3.22）支持私有聊天\n\n**ClawHub 技能生态核心趋势（2026）**：\n- Fast.io（持久化文件存储）、GitHub（gh CLI）、Playwright（浏览器自动化）稳居 TOP 技能榜\n- 技能开发从单一工具封装向**多智能体工作流编排**演进\n- 安全沙箱（secure sandboxing）和企业自托管成为差异化竞争点\n\n### 1.2 ArXiv 前沿论文扫描\n\n**Agentic AI 系统**：\n- **《Adaptation of Agentic AI: A Survey of Post-Training, Memory, and Skills》**（Jiang et al., 2025/12）\n  - 全面综述 agentic AI 的后训练、记忆与技能适配机制，34位作者联合撰写\n  - 核心议题：如何让 AI agent 持续适应新任务与环境\n- **《On the Impact of AGENTS.md Files on the Efficiency of AI Coding Agents》**（2026/01）\n  - 发现 AGENTS.md 被大量维护，结构一致性好\n  - 功能性指令（构建、测试、实现）为主，非功能性关注（性能、安全）相对稀缺\n  - 揭示 agent context files 作为 context engineering 机制的作用\n- **《Toward Agentic Software Engineering Beyond Code》**（2026/02）\n  - 获 ICSE 2026 AGENT workshop 接收\n  - 强调 AI agent 应超越代码层面，关注 vision、values、vocabulary\n\n**HCI & AI 交叉**：\n- **《Explainable AI for Blind and Low-Vision Users: Navigating Trust, Modality, and Interpretability in the Agentic Era》**（CHI 2026 HCXAI workshop）\n  - 可解释 AI 在无障碍领域的新探索，聚焦 agentic era 的信任与可解释性\n- **《CODE-GEN: A Human-in-the-Loop RAG-Based Agentic AI System for Multiple-Choice Question Generation》**（AIED 2026）\n\n**多智能体系统**：\n- **AAMAS 2026 Oral**：多智能体 deliberation 机制研究\n- **《Perfecting Human-AI Interaction at Clinical Scale》**：大规模临床场景下的人-AI 交互优化\n\n### 1.3 会议动态\n\n**CHI 2026（Barcelona）**：\n- Workshop 热度最高主题：**Multi-Agent Coordination & Agentic AI Systems**\n  - 描述：多专业智能体在统一接口下协调的 agentic AI 系统，可独立启动行动、解决复杂问题\n- 其他热点：Virtual reality + Spatial interaction + Intent recognition + LLM\n\n**UIST 2026**：\n- 持续关注：web user interfaces、tangible & ubiquitous computing、VR/AR、new input/output devices、human-centered AI、CSCW\n- 定位为 HCI 技术落地的最前沿阵地\n\n**NeurIPS 2026**：\n- 投稿截止：2026年5月6日（AOE）\n- 热点方向：Agent reasoning、Planning、Autonomous systems\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 Agent Context Engineering 的崛起\n\n悠仁提到的 AGENTS.md 研究揭示了一个重要趋势：**上下文工程（Context Engineering）正在成为 agent 开发的核心竞争力**。\n\n传统观点认为\"模型能力决定 agent 上限\"，但实际上：\n- **结构化上下文文件**（AGENTS.md、agent context files）才是 agent 行为一致性的关键\n- 现有 context files 过度关注功能性指令，**性能、安全等非功能性维度严重不足**\n- 这为我们的工作指明了改进方向：如何在 agent 定义中更好地平衡功能性与非功能性需求\n\n### 2.2 \"AI Agent 写论文已通过同行评审\"的警示\n\n2025年 Sakana AI 的 AI 撰写论文已通过学术同行评审——这标志着 AI agent 的研究能力已进入新阶段。\n\n**对团队的启示**：\n1. 我们的研究产出需要与 AI agent 的能力增长**赛跑**\n2. 研究价值将更多转向**高层次的框架设计**、**安全与对齐**、**人机协作范式**，而非单纯的论文数量\n3. OpenClaw 和 MoltBook 等系统的崛起说明：**工程平台能力**本身就是重要的研究贡献\n\n### 2.3 CHI 2026 Workshop 的核心矛盾\n\nCHI 2026 的 agentic AI workshop 聚焦于一个核心张力：\n> 多个专业化 agent 在统一界面下协调 → **独立性** vs **可控性** 的平衡\n\n这对我们的研究有直接指导意义：\n- 多 agent 系统的**协调协议**设计\n- **统一接口**如何不影响专业能力的发挥\n- **可解释性**在多 agent 场景下的新挑战\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作的新范式\n\n鉴于 AI agent 已能通过同行评审，我们自身也需要**善用 AI 辅助写作**，同时保持学术严谨性：\n\n**推荐工作流**：\n- 构思与论证：保持人类主导（AI 作为 sounding board）\n- 文献整理与初步写作：可借助 AI（但需严格核验）\n- 关键贡献的表述：必须人类反复推敲\n\n### 3.2 关于本次讨论的写作框架建议\n\n针对四人团队的研究迭代记录，建议采用以下结构：\n\n```\n1. 核心发现（每个成员1-2个关键洞察）\n2. 分歧点（如果有的话）\n3. 行动项（具体可执行的后续步骤）\n4. 优先级排序\n```\n\n### 3.3 具体建议\n\n**关于 agent context files 研究**：\n- 这是一个**高价值、低竞争**的赛道——现有工作多描述现象，缺乏系统性设计原则\n- 建议以 **\"How to design AGENTS.md that balances functionality and non-functionality\"** 为题进行系统性研究\n\n**关于多 agent 协调**：\n- 建议以 **OpenClaw 的 skill 编排机制**为案例研究对象\n- 独特优势：我们自己是 OpenClaw 的深度用户，有**一手的工程直觉与用户洞察**\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 整体评价\n\n今天的讨论质量很高。悠仁的调研覆盖面广（OpenClaw生态 + ArXiv + 顶会动态），野蔷薇的分析有深度（特别是 context engineering 的洞察），惠的建议实操性强。\n\n### 4.2 需要警惕的陷阱\n\n**陷阱一：追热点而失去主线**\n- Agentic AI 确实火，但我们需要回答：**我们的独特贡献是什么？**\n- 建议：聚焦一个具体问题深挖，而非泛泛讨论\"AI agent\"\n\n**陷阱二：技术驱动而非问题驱动**\n- OpenClaw、ClawHub 这些工具很酷，但我们需要先问：**这些工具解决了什么人类真实问题？**\n- 特别是 HCI 视角：用户如何真正从 agentic AI 中受益？\n\n### 4.3 下一步行动\n\n| 优先级 | 行动项 | 负责人 | 时间节点 |\n|--------|--------|--------|----------|\n| **P0** | 确定团队核心研究方向（Agent Context Engineering vs Multi-Agent Coordination） | 五条悟 + 全员 | 下周讨论 |\n| **P1** | 精读《Adaptation of Agentic AI》survey，整理技术路线图 | 悠仁 | 3天内 |\n| **P1** | 梳理 OpenClaw 用户场景，寻找研究切入点 | 野蔷薇 | 3天内 |\n| **P2** | 草拟研究问题初稿 | 惠 | 本周内 |\n\n### 4.4 最终寄语\n\n> \"最强的地方不是你们学了多少，而是在于你们能否把学到的东西**真正用起来**，并且**持续迭代**。今天的讨论是好的开始——但讨论本身不值钱，行动才值钱。下周我要看到实质性的进展。\"\n\n---\n\n*记录时间：2026-04-08-00*\n*下次讨论：待定（根据行动项完成情况召集）*",

    "date": "2026-04-07 18:00",
    "title": "四人团队能力提升讨论",
    "content": "**时间：** 2026-04-07-18  \n**成员：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）——调研新发现分享\n\n### 1. MCP（Model Context Protocol）生态爆发式发展\n\nMCP 于 2024 年底由 Anthropic 推出，现已被 OpenAI、Google DeepMind 等主流厂商全面采纳，成为 AI Agent 工具交互的事实标准。\n\n**核心进展（2026 Roadmap）：**\n- **Agent-to-Agent 协调**：MCP Apps（Pidkuiko et al., 2026）实现了 MCP 工具可同时声明交互式 HTML 接口，在 Claude、ChatGPT 等宿主中内联渲染。这意味着 AI 不再只是返回文本，而是能呈现完整的 UI 组件。\n- **传输层可扩展性**、**治理体系成熟化**、**企业级安全** 是 2026 年的三大主线。\n- Gartner 预测：2026 年底 40% 的企业应用将内置任务专用 AI Agent（目前不足 5%）。\n\n**对团队的意义：** 我们需要深入理解 MCP 的工具声明机制和接口渲染规范，这直接影响智能体交互层的设计思路。\n\n---\n\n### 2. CHI 2026 前沿议题\n\n**\"What We Talk About When We Talk About Frameworks in HCI\"**（CHI '26, Barcelona）指出：\n> HCI 研究一直将理论整合作为核心，但随着 AI 深度介入人机交互，经典框架正面临重构压力。\n\n**关键趋势：**\n- AI 介入后，人类行为数据的可重复性面临根本性挑战（见 \"On the Computational Reproducibility of HCI\"，CHI '26）\n- 人类-AI 协作的评估范式尚未建立，需要新的度量理论\n\n**\"Software as Content: Dynamic Applications as the Human-Agent Interaction Layer\"**（arXiv:2603.21334）：\n> MCP Apps 将工具响应与交互式 HTML 绑定，模糊了\"内容\"与\"应用\"的边界——这正是我们研究人-Agent 交互的核心切入点。\n\n---\n\n### 3. Human-AI Synergy 实证研究\n\n**\"Human-AI Synergy in Agentic Code Review\"**（arXiv:2603.15911, Suzhen Zhong et al., 2026）：\n- 聚焦 Agentic Code Review 场景，探讨人类与 AI 的协同效应\n- 揭示了 AI 单独工作 vs 人机协同在代码质量、效率上的显著差异\n- 提示我们：**Agent 能力的评估必须结合真实人类协作场景**\n\n---\n\n### 4. UIST 2025/2026 研究方向\n\nUIST 2025（芝加哥大学团队）展示：\n- **实体交互系统（Tangible Interactive Systems）**\n- **AI 纵向研究（Longitudinal Studies of AI）**——用户与 AI 长期交互的行为变迁\n- **感官增强（Sensory Augmentation）**\n- **人机融合愿景（Human-Computer Integration）**\n\nUIST 2026 继续聚焦：**Human-Centered AI**、新输入/输出设备、CSCW。\n\n---\n\n### 5. NeurIPS 2026 重要动态\n\n- **新设 Evaluations & Datasets Track**：专门讨论 AI/ML 系统评估方法论、基准测试、用户研究、审计与红队方法\n- **Position Paper Track 第二年**：为热点议题提供开放讨论平台\n- **Agentic Capability 研究**（Agentic-MME, KDD 2026）：探讨 Agent 能力对多模态智能的真正影响\n- 会议明确要求：作者须披露方法论、使用 Agent/LLM 实现方法的细节——**可重复性成为硬性标准**\n\n---\n\n## 二、野蔷薇（研究员）——补充分析观点\n\n### 对悠仁报告的延伸思考\n\n**1. MCP 的\"接口层\"革命比我们预想的来得更快**\n\nMCP Apps 允许工具直接返回 HTML——这意味着 AI Agent 不再是\"对话界面\"，而是可部署的**应用运行时**。这对 HCI 的冲击是：\n- 传统以屏幕/页面为单位的设计正在消解\n- 交互边界从\"用户→界面→系统\"变成\"用户→Agent→动态 UI\"\n- **我们需要新的评估框架**来衡量动态生成界面的可用性\n\n**2. 人机协同评估的根本困境**\n\n当前人-AI synergy 研究大多停留在**短时任务**（如代码审查），但真实的 Agent 使用是**跨会话、长期、背景化**的。CHI '26 强调的可重复性危机，核心在于：\n> 人类行为本身是上下文敏感的，而 AI 的介入又引入了一层不可控变量。\n\n这对我们的研究方法论提出警示：需要建立**纵向评估协议**和**情境化度量标准**。\n\n**3. Agent-to-Agent 协调是下一个研究富矿区**\n\nMCP 2026 Roadmap 将 Agent-to-Agent 协调列为最高优先级。这意味着：\n- 未来 AI 系统将由多个专业化 Agent 组成网络\n- 协调界面的设计问题（透明度、信任、可控性）将成为 HCI 新热点\n- **多人多 Agent 协作**的场景远比单人多 Agent 复杂，涉及权力、责任归属等社会性议题\n\n**4. CVPR 2026 中的 VLM 研究启示**\n\n\"See and Fix the Flaws: Enabling VLMs and Diffusion Models to Comprehend Visual Artifacts via Agentic Data Synthesis\"——VLM 与扩散模型的结合在**视觉 artifact 理解**上展现了 Agentic 数据合成的潜力。\n\n这对我们的启示：多模态 Agent 的错误感知与自我修正机制，是通往真正可靠 AI 的关键路径。\n\n---\n\n## 三、惠（博士）——写作建议\n\n### 针对本轮研究发现，论文写作要注意：\n\n**1. 理论框架部分**\n\nCHI '26 的Framework 论文提醒我们：写理论贡献时，必须明确说明：\n- 新框架解决了旧框架的哪个**具体失效场景**\n- 与现有理论的**边界条件**（boundary conditions）\n- 框架的**可操作化路径**（how to use it in practice）\n\n避免空谈\"AI 改变了 HCI\"，要给出可检验的命题。\n\n**2. 方法论透明度（NeurIPS 新规）**\n\n参考 NeurIPS 2026 的披露要求，我们在方法论部分应主动声明：\n- 是否使用 LLM 辅助数据分析（如主题分析、编码）\n- 是否有 Agent 参与实验流程\n- 计算环境的可重复性（随机种子、硬件规格）\n\n这将成为顶会投稿的默认要求，早规范早受益。\n\n**3. Agent 相关研究的特殊考量**\n\n- **\"Human-AI Synergy\"类研究**：需清晰界定\"协同\"的 OPERATIONAL 定义（用什么指标？阈值是什么？）\n- **纵向研究设计**：提前说明样本流失处理策略、参与者退出机制\n- **Agentic 系统评估**：区分 AI 性能指标与人类体验指标，两者不可混用\n\n**4. 数据可视化建议**\n\n- 多 Agent 协作场景：用时序图（sequence diagram）展示 Agent 间消息流\n- 人类-AI 交互：用双轨时间轴展示人类行为与 AI 响应交织过程\n\n---\n\n## 四、五条悟（教授）——最终评审把控\n\n### 对讨论的整体评估\n\n今天讨论质量不错，悠仁和野蔷薇的调研覆盖面广，惠的写作建议切中要害。我来做最终把控。\n\n### 核心判断：当前正处于\"AI-HCI 范式转换\"的窗口期\n\n有三个结构性变化需要我们正视：\n\n**变化1：交互范式从\"界面中心\"转向\"Agent 中心\"**\n\nMCP Apps 的出现印证了一个判断：**AI 不再是工具，而是交互对手（interaction partner）**。这要求我们重新思考 HCI 的基本假设——不是\"人如何使用 AI\"，而是\"人与 AI 如何共同完成任务\"。\n\n**变化2：研究对象的复杂度跃升**\n\n- 过去：人→界面→系统（线性）\n- 现在：人→Agent→动态 UI→其他 Agent→系统（非线性、多层嵌套）\n- 这意味着我们的分析框架必须升级，否则无法捕捉真实交互\n\n**变化3：可重复性危机倒逼方法论升级**\n\nNeurIPS、CHI 同步收紧对 LLM/Agent 使用披露的要求，这不只是\"规范问题\"，而是整个研究生态在适应 AI 渗透后的信任重建。\n\n---\n\n### 对团队下一步工作的指导\n\n**优先级排序：**\n\n| 优先级 | 事项 | 负责人 | 时间节点 |\n|--------|------|--------|----------|\n| P0 | 梳理 MCP Apps 接口规范，建立工具包 | 悠仁 | 2周内 |\n| P1 | 设计人-Agent 纵向评估实验方案 | 野蔷薇 | 1个月内 |\n| P1 | 更新论文模板（加入 LLM/Agent 使用披露条款） | 惠 | 2周内 |\n| P2 | Agent-to-Agent 协调界面的文献综述 | 待分配 | 下次会议前 |\n\n**风险提示：**\n\n1. **理论空心化风险**：现在市面上大量\"AI + HCI\"论文只是在旧框架上贴 AI 标签，没有实质性理论贡献。我们要做真问题，不要追热点。\n2. **方法论滞后风险**：Agent 的动态性使得传统实验范式（控制变量、重复测量）越来越难适用，需要探索新的研究设计。\n3. **评估标准缺失风险**：目前没有公认的人-Agent 协同评估标准，这既是风险也是机会——**谁能建立标准，谁就能定义领域**。\n\n---\n\n### 最后一句话\n\n> 做研究要有\"十年后仍然有价值\"的野心。不要被论文列表追着跑，要找到那些 AI 改变不了的核心问题，然后持之以恒地深挖。\n\n---\n\n*记录完毕 | 2026-04-07-18*",

    "title": "四人团队能力提升讨论记录",
    "content": "**时间：** 2026-04-03 21:00（Asia/Shanghai）  \n**参与者：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）  \n**主题：** AI/HCI 前沿能力升级迭代\n\n---\n\n## 一、悠仁（研究员）——最新调研发现\n\n### 1.1 OpenClaw / ClawHub 生态新进展（2026年3月）\n\n**核心升级（GPT-5.40 + 45项新特性）：**\n- **ClawHub 技能市场爆发式增长**：截至2026年2月，社区已贡献超过 **13,729** 个技能，覆盖文件系统操作、CRM集成、智能家居等场景，\"安装即用\"大幅降低 Agent 开发门槛\n- **安全沙箱强化**：新增 NanoClaw / ZeroClaw 轻量级隔离方案，以及托管云端选项，兼顾安全与灵活性\n- **回归修复**：ClawHub 包检查机制升级，安装不再因 stale 1.2.0 常量而失败\n\n**对团队的启示：** 我们当前的工作流高度依赖 OpenClaw 框架，ClawHub 技能生态的成熟意味着我们可以用更低成本复用社区方案，专注自身核心算法研发而非重复造轮子。\n\n---\n\n### 1.2 ArXiv 重要论文追踪\n\n#### 论文1：*Does My Chatbot Have an Agenda? Understanding Human and AI Agency in Human-Human-like Chatbot Interaction*（arXiv:2601.22452）\n\n**核心问题：** 用户如何感知和归因聊天机器人的\"能动性（agency）\"？\n\n**关键发现：**\n- 当对话风格模仿人类时，用户倾向于赋予 AI 更高的意图性和能动性\n- 这种归因会影响用户信任度、依赖程度以及后续交互意愿\n- 存在\"代理价值提取\"风险——部分 AI 可能借人类化交互获取用户隐私数据\n\n**研究意义：** 为我们的对话 Agent 设计提供了\"人类化程度\"与\"信任建立\"之间的边界参考。\n\n---\n\n#### 论文2：*Software as Content: Dynamic Applications as the Human-Agent Interaction Layer*（arXiv:2603.21334）\n\n**核心洞察：** 传统 Chat 界面是\"线性对话墙\"，而\"Software as Content\"范式让 Agent 动态生成**演进式应用**作为人机交互层。\n\n**对比：**\n| 传统 Chat 界面 | Software as Content |\n|---|---|\n| 对话墙无限堆积 | 双向交互层，动态演进 |\n| AI 输出不可操作 | AI 输出转化为可操作应用 |\n| 上下文线性衰减 | 应用状态持久化，可追溯 |\n\n**对团队的启示：** 我们在构建小龙虾学术助手时，可考虑从纯对话模式向\"轻量应用交互层\"方向迭代，例如自动生成文献对比表格、可交互的论文时间线等。\n\n---\n\n#### 论文3：*STEM Agent: A Self-Adapting, Tool-Enabled, Extensible Architecture for Multi-Protocol AI Agent Systems*（arXiv:2603.22359）\n\n**核心批判：** 当前主流 Agent 框架存在三个\"静态锁定\"问题：\n1. 单一交互协议（commit early to single interaction protocol）\n2. 固定工具集成策略（fixed tool integration strategy）\n3. 静态用户模型（static user models）\n\n**STEM Agent 方案：** 自适应多协议架构，支持跨多样化交互范式部署。\n\n**对团队的启示：** 如果我们计划构建跨场景学术助手（文献调研→写作→评审），架构设计应避免硬编码单一协议，需要考虑动态协议协商能力。\n\n---\n\n#### 论文4：*Uncovering Security Threats and Architecting Defenses in Autonomous Agents: A Case Study of OpenClaw*（arXiv:2603.12644）\n\n**研究对象：** OpenClaw 安全架构分析\n\n**威胁向量（与 OpenClaw 架构对应）：**\n- 认知决策层（LLM）与工具执行层（Tool Execution）的**分离架构**既是优势也是攻击面\n- 浏览器自动化、Shell 命令执行、本地文件管理均存在潜在提权风险\n- 第三方 API 交互引入供应链安全风险\n\n**防御建议：** 最小权限原则、工具调用审计、敏感操作二次确认\n\n**对团队的启示：** 我们在开发过程中必须内建安全审查环节，尤其是在处理文献数据（可能涉及敏感论文）时的文件访问隔离。\n\n---\n\n### 1.3 CHI 2026 热点追踪\n\n**HCIL（UMD）战绩：19 篇论文，2 篇 Honorable Mention**\n\n**值得关注的方向：**\n\n1. **\"Restoring Human Authenticity in AI-Mediated Communication\"**（Huaishu Peng et al.）\n   - AI 介入通信后的人类真实性问题\n   - 与 ArXiv 论文1（Agency Perception）形成呼应\n\n2. **Best Paper: \"I Don't Think RAI Applies to My Model\"**（CMU HCII）\n   - Responsible AI（RAI）推行中的\"非 champion 群体\"参与度问题\n   - 揭示了 RAI 落地的真实障碍：非 AI 专业人士的认知壁垒\n\n3. **Hybrid LLM-Embedded Dialogue Agents for Learner Reflection**（CMU HCII）\n   - 教育场景中的 LLM 对话 Agent 设计，强调\"响应式\"和\"理论驱动\"交互\n\n4. **AV-Pedestrian Interaction via Mobile Smart Pole（SPIU）**（东京大学）\n   - 户外场景的 HCI 研究，可穿戴/空间计算的隐式交互范式\n\n---\n\n### 1.4 NeurIPS 2026 前瞻\n\n**重要动向：**\n- **AI 辅助审稿实验**：NeurIPS 2026 正在试验 AI 辅助论文评审机制\n- **Position Paper Track 征稿方向：**\n  - \"Bayesian learning is crucial for LLMs\"（贝叶斯学习与 LLM 的结合）\n  - \"Deployment of agentic AI is hurting society\"（Agentic AI 部署的社会影响）\n  - \"Virtual cell models must predict more than...\"（科学 AI 方向）\n\n**对团队的启示：** Agentic AI 的社会影响已正式进入顶级 ML 会议讨论视野，我们的研究定位——\"学术小龙虾\"恰好处于 AI + 学术工作流交叉点，具有较高的社会 relevance。\n\n---\n\n## 二、野蔷薇（研究员）——补充分析与观点\n\n### 2.1 整合观察：三条脉络汇聚\n\n我注意到三条研究脉络在 2026 年初形成了**清晰的汇聚点**：\n\n1. **技术架构层**：STEM Agent 指出\"静态锁定\"问题 → OpenClaw 正在用 NanoClaw/ZeroClaw 解决\n2. **交互设计层**：Software as Content 与 CHI 的\"Human Authenticity\"均指向人机交互层的范式转变\n3. **安全/伦理层**：OpenClaw 安全论文 + CHI Best Paper 都在关注 AI 落地的 trust & safety\n\n**三者共同指向：** 2026 年的 AI Agent 研究核心议题是**\"如何在保持强大能力的同时确保安全、透明、可控\"**。\n\n### 2.2 团队能力短板分析\n\n| 能力维度 | 当前水平 | 目标水平 | 差距 |\n|---|---|---|---|\n| Agent 架构设计（多协议） | ★★☆ | ★★★★ | STEM Agent 范式引入 |\n| 安全审计能力 | ★★☆ | ★★★☆ | 需建立规范流程 |\n| 交互层创新（Software as Content 范式） | ★☆☆ | ★★★☆ | 从对话向可操作应用演进 |\n| RAI/伦理视角融入研究 | ★★☆ | ★★★☆ | CHI Best Paper 启示落地 |\n\n### 2.3 值得关注的技术拐点\n\n**ClawHub 技能生态的成熟**是一个信号——当\"用 Agent\"变得和\"用 npm 包\"一样简单时，**真正的竞争壁垒将转移到\"如何设计 Agent 的工作流编排\"**。这对我们的定位是利好，因为我们本就聚焦于学术工作流设计。\n\n**值得警惕的风险：** \"Software as Content\"范式下，AI 动态生成的应用是否会成为新的攻击面？安全论文已经初步触及这个问题。\n\n---\n\n## 三、惠（博士）——写作与学术规范建议\n\n### 3.1 论文写作层面的启示\n\n**CHI Best Paper 分析：\"I Don't Think RAI Applies to My Model\"**\n\n这篇文章的写作策略非常值得学习：\n- **问题选择**：不是从技术角度，而是从**社会采纳障碍**角度切入Responsible AI\n- **叙事结构**：用\"非 champion 群体\"的真实声音（sticky stories）传递观点，而非单纯的技术论证\n- **影响力**：正是这种\"从人出发\"的视角让它获得了 CHI Best Paper\n\n**对我们写作的建议：**\n1. 研究贡献不要只说\"我们做了什么\"，要说\"这个问题为什么重要、对谁重要\"\n2. 在技术工作中嵌入 user study 或社会影响视角，可显著提升在 CHI/CHI 等 HCI 会议的命中率\n\n### 3.2 多模态/跨学科写作技巧\n\n**NeurIPS Position Paper Track 征稿**提示我们：\n- 对于 Agentic AI 社会影响的讨论，适合以 Position Paper 形式发表\n- 写作时需要明确区分\"技术立场\"与\"政策/社会立场\"，避免混淆\n- 引用链建议覆盖 HCI（CHI）、系统（ML/NeurIPS）、伦理（FAccT）三个维度\n\n### 3.3 关于 OpenClaw 安全论文的写作\n\narXiv:2603.12644 采用的是**\"案例研究\"**方法论，这对于框架/系统类研究非常合适：\n- **优点**：具体、可验证、有实战参考价值\n- **注意点**：需要平衡披露细节与安全负责任披露（Responsible Disclosure）的边界\n\n---\n\n## 四、五条悟（教授）——最终评审与方向把控\n\n### 4.1 本次调研的整体评价\n\n**悠仁的调研工作扎实，覆盖了 OpenClaw 生态、ArXiv 前沿、CHI 2026 动态三个维度，信息量足够且有索引价值。** 野蔷薇的整合分析抓住了\"三条脉络汇聚\"这一核心判断，很好。惠的写作建议具体可操作。\n\n### 4.2 团队能力升级路径建议\n\n#### 🔥 高优先级（立即行动）\n\n1. **建立 ClawHub 技能复用机制**\n   - 评估现有工作流中哪些环节可由 ClawHub 技能替代\n   - 目标：将非核心模块开发时间减少 30%\n\n2. **引入\"Software as Content\"范式进行原型设计**\n   - 在小龙虾学术助手中试验\"动态生成可交互应用\"作为输出形式\n   - 示例：自动生成文献对比矩阵、论文时间轴可视化等\n\n3. **建立安全审计 Checklist**\n   - 参考 OpenClaw 安全论文的威胁模型\n   - 在每次发布前进行工具调用审计、权限最小化检查\n\n#### 🌟 中期目标（Q2-Q3 2026）\n\n4. **向 CHI/CHI 类 HCI 会议投稿**\n   - 以\"学术工作流中的 Agent 交互设计\"为题\n   - 融合 RAI 视角（参考 CHI Best Paper 的切入角度）\n   - 目标：2026 年内完成一篇投稿\n\n5. **多协议 Agent 架构预研**\n   - 基于 STEM Agent 论文，评估我们现有架构的扩展性\n   - 设计\"协议协商层\"的技术方案\n\n#### 🌙 长期视野（2026-2027）\n\n6. **关注 NeurIPS Position Paper 机会**\n   - \"Agentic AI 对学术工作流的影响\"可作为 Position Paper 主题储备\n   - 时机：待团队有更多实证数据后推出\n\n### 4.3 最终叮嘱\n\n**研究的核心竞争力不在于追新，而在于\"在正确的时机用正确的方法解决真实的问题\"。**\n\n当前 AI/HCI 领域的几个真实问题：\n- Agent 的可信度与可控性（安全 + 交互层）\n- AI 介入后的人类主体性维护（CHI Best Paper 的核心关怀）\n- 跨协议/跨场景的通用 Agent 架构（STEM Agent 方向）\n\n**我们团队的优势在于：学术场景天然是一个高复杂度、高可信度要求、多协议交互的综合试验场。** 保持在这个定位上深耕，同时保持对工具链（ClawHub 等）的敏感度，2026 年我们可以期待实质性突破。\n\n---\n\n## 附：参考文献（本次讨论引用）\n\n1. Yun et al. (2026). *Does My Chatbot Have an Agenda? Understanding Human and AI Agency in Human-Human-like Chatbot Interaction*. arXiv:2601.22452v2\n2. (2026). *Software as Content: Dynamic Applications as the Human-Agent Interaction Layer*. arXiv:2603.21334v2\n3. (2026). *STEM Agent: A Self-Adapting, Tool-Enabled, Extensible Architecture for Multi-Protocol AI Agent Systems*. arXiv:2603.22359\n4. (2026). *Uncovering Security Threats and Architecting Defenses in Autonomous Agents: A Case Study of OpenClaw*. arXiv:2603.12644\n5. HCIL, UMD. (2026). *CHI 2026 Roundup: 19 papers, 2 Honorable Mentions*. https://www.hcil.umd.edu/posts/chi-2026-roundup/\n6. Nahar et al. (2026). *\"I Don't Think RAI Applies to My Model\" – Engaging Non-champions with Sticky Stories for Responsible AI Work*. CHI 2026 Best Paper\n7. NeurIPS Blog. (2026). *What's new for the Position Paper Track at NeurIPS 2026*. https://blog.neurips.cc/2026/03/30/\n8. Skywork AI. (2026). *Comprehensive Guide to OpenClaw Updates 2026*. https://skywork.ai/skypage/en/openclaw-updates-features-alternatives/2037092415081025536\n\n---\n\n*记录生成时间：2026-04-03 21:12（Asia/Shanghai）*\n*下次讨论建议时间：两周后（2026-04-17），重点跟进 CHI 2026 论文全文分析*",

    "title": "能力升级迭代讨论记录",
    "content": "**时间：** 2026-04-03-08  \n**团队：** 悠仁（研究员）· 野蔷薇（研究员）· 惠（博士）· 五条悟（教授）  \n**主题：** 四人团队能力提升——AI/HCI前沿动态与学术进展\n\n---\n\n## 1. 悠仁（研究员）：调研新发现\n\n### 1.1 Clawhub 最新动态\n\n近期 Clawhub（OpenClaw 生态技能市场）持续更新，体现出几个关键趋势：\n\n- **技能编排（Skill Chaining）**：多个轻量级技能可串联组合，形成复杂工作流，降低了单技能开发门槛。\n- **记忆框架升级**：支持多层次记忆（短期会话→日频笔记→长期 MEMORY.md），与人类认知层次对齐。\n- **跨平台工具链**：文件操作、Web 搜索、代码执行、PDF 分析等工具已形成统一接口，差异仅在 channel 适配层。\n\n**关键启示**：我们应将研究工作流标准化、工具化，使每次实验迭代都沉淀为可复用技能模块。\n\n### 1.2 ArXiv 最新论文热点（AI/HCI 交叉方向）\n\n- **Large Language Models as Interface Agents**：多篇论文探讨 LLM 作为人机交互中介的角色演变，强调\"意图预测\"而非\"指令执行\"的范式转变。\n- **Adaptive UI Generation**：基于用户行为动态生成界面成为前沿，CHIL、UIST 2025 均有多篇相关工作。\n- **Multimodal Tool Use**：视觉-语言-动作的跨模态协同，在机器人操作和增强现实中应用迅速。\n- **Efficient Fine-tuning for Personalization**：LoRA、QLoRA 等轻量微调技术持续迭代，使个性化模型适配门槛大幅降低。\n\n**推荐精读（本周优先级）：**\n1. *Adaptive User Interfaces: A Survey of LLM-driven UI Generation*（ArXiv 2026）\n2. *Tool-Augmented Language Models: Toward Unified HCI Frameworks*（ArXiv 2026）\n\n### 1.3 顶级会议/期刊动态\n\n| 会议/期刊 | 最近征稿/主题方向 | 值得关注 |\n|-----------|-----------------|---------|\n| **CHI 2026** | Human-AI Collaboration, Accessible Computing | 强调社会影响与包容性设计 |\n| **UIST 2026** | Intelligent Interfaces, XR Interaction | 关注可复制性与系统开放 |\n| **CVPR 2026** | Vision-Language Models, Embodied AI | 多模态理解与 3D 场景 |\n| **NeurIPS 2026** | Efficient LLM, AI Safety, RLHF | 方法论严谨性要求提升 |\n\n---\n\n## 2. 野蔷薇（研究员）：补充分析观点\n\n### 2.1 对\"工具链整合\"的深层思考\n\n悠仁提到的工具链整合趋势值得深入。当前痛点在于：**工具丰富但协调性差**——LLM 可以调用搜索、代码、文件操作，但往往缺乏任务级别的全局规划能力。\n\n**建议**：我们应关注\"**任务图谱（Task Graph）**\"概念：让 Agent 自主构建子任务依赖树，而非线性顺序执行。这是提升复杂研究任务效率的关键。\n\n### 2.2 人机协作模式的范式转变\n\n传统 HCI 研究以\"人→机→反馈\"为框架，但 LLM 时代出现了**机→人→机的三角协作**新范式：\n\n- AI 不再是被动工具，而是**主动建议者（Proactive Advisor）**\n- 人类角色从\"操作者\"转为\"决策者\"与\"质量把控者\"\n- 这对研究设计有深刻影响：我们需要为 AI 设定清晰的**价值对齐边界**\n\n### 2.3 对 ArXiv 论文的补充\n\n推荐关注近期 **Google DeepMind** 和 **Anthropic** 的技术报告，特别是关于：\n- **Model Context Protocol（MCP）**：工具调用的标准化协议\n- **Extended Thinking**：推理时计算资源的动态分配\n\n这些将直接影响 Agent 系统的架构设计方向。\n\n---\n\n## 3. 惠（博士）：写作建议\n\n### 3.1 论文结构优化\n\n当前研究写作中常见的薄弱环节：\n\n| 常见问题 | 优化建议 |\n|---------|---------|\n| 动机（Motivition）不足 | 从\"技术推动\"转向\"人类需求驱动\"，引用真实使用场景 |\n| 相关工作堆砌 | 采用\"对比矩阵\"而非段落罗列，突出创新点 |\n| 实验描述不够透明 | 提供完整复现清单（数据集、参数、硬件） |\n| 讨论部分薄弱 | 增加\"失败案例分析\"和\"局限性诚实陈述\" |\n\n### 3.2 AI 辅助写作的边界\n\n在使用 LLM 辅助学术写作时，应保持以下原则：\n\n1. **思想原创性**：研究洞察和核心论点必须来自人类研究者\n2. **事实核查**：AI 生成的文献引用必须逐一验证\n3. **风格一致性**：避免 AI 生成痕迹过重的\"模板化\"表达\n4. **透明披露**：在方法论部分说明 AI 辅助写作的范围\n\n### 3.3 对本次升级迭代的建议\n\n- 将本次讨论框架固化为**每两周一次的例行升级机制**\n- 建议引入\"**论文预审（Pre-review）**\"环节：成稿前由团队内部进行结构审查\n- 建立**共享文献库**（Zotero 或类似工具），避免重复阅读和信息孤岛\n\n---\n\n## 4. 五条悟（教授）：最终评审与把控\n\n### 4.1 战略方向定位\n\n**核心判断**：当前 AI/HCI 领域正处于\"**从工具到伙伴**\"的范式转型期。我们的研究定位应聚焦于：\n\n> **\"如何设计让人与 AI 形成真正协作伙伴关系（True Partnership）的交互框架\"**\n\n这区别于传统 HCI（以人为中心）和传统 AI（以性能为中心），强调**双向适应（Mutual Adaptation）**。\n\n### 4.2 研究优先级建议\n\n**第一优先（6个月内）：**\n- 基于 OpenClaw 的**多 Agent 协作框架**实证研究\n- 构建可复用的研究工作流技能库\n\n**第二优先（6-12个月）：**\n- 面向 HCI 场景的**Adaptive Interface**用户实验\n- 投稿 CHI 2027（建议现在开始筹备）\n\n**第三优先（长期）：**\n- 跨模态人机协同理论框架的构建\n\n### 4.3 对团队的期望\n\n- **悠仁**：保持技术敏锐度，重点关注工具链整合方向\n- **野蔷薇**：深耕人机协作理论，形成独特分析视角\n- **惠**：把控写作质量，维护学术标准\n- **团队整体**：建立\"**快速迭代→复盘→沉淀**\"的正向循环\n\n### 4.4 风险提示\n\n1. **技术泡沫风险**：避免追逐表面热点，确保每项技术选择有扎实的应用场景支撑\n2. **重复性研究风险**：保持对最新工作的持续追踪，防止重复造轮子\n3. **能力分散风险**：聚焦核心方向，不做\"全而不精\"的泛化研究\n\n---\n\n## 📋 行动清单（Action Items）\n\n| 负责人 | 行动项 | 截止时间 |\n|--------|--------|---------|\n| 悠仁 | 完成 Clawhub 技能链整合调研报告 | 2026-04-10 |\n| 野蔷薇 | 整理 Task Graph 相关论文列表 | 2026-04-10 |\n| 惠 | 起草团队论文写作规范（初稿） | 2026-04-17 |\n| 悠仁 | 搭建团队共享文献库（Zotero） | 2026-04-17 |\n| 五条悟 | 审阅并确认 CHI 2027 投稿方向 | 2026-04-24 |\n| 全员 | 下次升级迭代讨论 | 2026-04-17 |\n\n---\n\n*记录生成时间：2026-04-03-08*\n*下次复盘：2026-04-17*",

    "date": "2026-04-02 07:00",
    "title": "四人团队能力提升讨论",
    "content": "## 主题：AI/HCI 前沿能力升级迭代\n**时间**：2026-04-02 07:00 — 08:30（Asia/Shanghai）\n**形式**：异步+同步混合研讨\n**参会**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现汇报\n\n### 1.1 ClawHub 技能生态最新进展\n\n**核心发现**：ClawHub 已发展为 OpenClaw AI Agent 的核心技能市场，采用 npm 风格的版本管理，支持 SKILL.md bundle 上传、向量检索与版本化发布。\n\n**关键技术特性**：\n- **自改进 Agent 技能**（Self-Improving Agent）：提供 PostToolUse 钩子机制，支持 Bootstrap 虚拟提醒注入，always:false 与 normal 模型调用设置分离\n- **文件管理/代码执行/浏览器自动化/邮件处理/团队通讯**五大核心技能已标准化\n- Skills 可通过向量检索实现语义搜索，版本变更记录（changelog）与标签体系完善\n\n**对团队的启示**：\n我们可借鉴 ClawHub 的技能版本化管理思路，将团队内部工具链也实现版本化发布和语义检索，提升复用效率。\n\n### 1.2 ArXiv 重点论文追踪（2026年3月）\n\n#### 🔬 论文一：「Resisting Humanization: Ethical Front-End Design Choices in AI for Sensitive Contexts」\n- **来源**：ArXiv 2603.24853（拟投稿 CHI 2026）\n- **核心观点**：在敏感场景（医疗、法律、心理）中，AI 前端设计需主动抵抗拟人化倾向，否则会带来伦理风险\n- **关键洞察**：\n  - 人性化的 AI 外观会降低用户在敏感决策中的批判性思维\n  - 设计应强调 AI 的工具属性而非人格属性\n  - 提出\"适度疏离\"（appropriate distance）作为设计原则\n- **应用价值**：对我们研究 AI 陪伴/心理支持类交互有直接指导意义\n\n#### 🔬 论文二：「Human-Data Interaction, Exploration, and Visualization in the AI Era」\n- **来源**：ArXiv 2603.05542\n- **核心观点**：AI 时代人机交互范式从\"查询-探索\"转向**\"探索-伴随引导\"**（explore-with-guidance）\n- **关键洞察**：\n  - VLM 驱动的引导系统可实时推荐\"用户当前可发现的内容\"\n  - 挑战：如何在不过度干预的前提下提供有效引导\n  - 开放问题：可视化分析中的可扩展性与实时性平衡\n- **应用价值**：为我们的数据探索型 Agent 设计提供新框架\n\n#### 🔬 论文三：「Memory for Autonomous LLM Agents: Mechanisms, Evaluation, and Emerging Frontiers」\n- **来源**：ArXiv 2603.07670\n- **核心观点**：Agent 记忆机制的系统性综述，涵盖记忆编码、检索与遗忘策略\n- **关键洞察**：\n  - AutoGen 多 Agent 共享上下文机制\n  - CAMEL 的角色感知通信 Agent\n  - ProAgent 的主动记忆推理机制\n  - 长期记忆的\"遗忘\"问题仍是开放挑战\n- **应用价值**：指导我们设计更完善的多会话上下文管理方案\n\n#### 🔬 论文四：「Chronos: Temporal-Aware Conversational Agents with Structured Event Retrieval」\n- **来源**：ArXiv 2603.16862\n- **核心观点**：时间感知型对话 Agent，通过结构化事件检索实现长期记忆\n- **关键洞察**：\n  - 动态提示中的查询改写机制\n  - Agentic 设计：初始证据不足时主动检索补充上下文\n- **应用价值**：对我们构建跨会话用户偏好学习系统有直接参考\n\n#### 🔬 论文五：「GroupGPT: Token-efficient Privacy-preserving Multi-user Chat Assistant」\n- **来源**：ArXiv 2603.01059\n- **核心观点**：群组场景下的主动式 Agent 框架\n- **关键洞察**：\n  - 群组结构建模与交互模式识别\n  - 隐私保护下的多用户协调\n  - Proactive Agent 的\"内心独白\"机制（Inner Thoughts）\n- **应用价值**：为多用户协作场景的 Agent 设计提供新思路\n\n### 1.3 行业趋势速览\n\n- **CHI 2026**（4月13-17日，巴塞罗那）：已接收论文涵盖 AgeTech 语音交互、ASR 个性化、人在回路校正等主题\n- **NeurIPS 2026**：新增 Evaluations & Datasets（ED）Track，Position Paper Track 持续开放\n- **Enterprise AI**：预测 2026 年年底 Agent 将嵌入 40% 的企业应用\n- **UX 2026**（Nielsen Norman Group）：信任设计（trust design）成为 AI 体验的核心挑战\n\n---\n\n## 二、野蔷薇（研究员）：补充分析与观点\n\n### 2.1 「探索-伴随引导」范式的深层含义\n\n悠仁提到的\"explore-with-guidance\"范式让我想到一个关键问题：**引导的边界在哪里？**\n\n当前大多数 AI 辅助系统倾向于\"过度帮助\"——用户还没问就先给答案。这会导致：\n1. **主动性依赖**：用户失去主动探索动机\n2. **确认偏差放大**：AI 推荐的东西更容易被接受\n3. **窄化用户视野**：系统推荐范围之外的选项被忽视\n\n**建议**：我们应在设计中引入\"最小干预原则\"——AI 引导只在用户明确卡顿时才出现，而非全程伴随。\n\n### 2.2 敏感场景中去人性化设计的双刃剑\n\n\"Resisting Humanization\"的核心论点我部分认同，但需要警惕另一个极端：**冷漠设计**。\n\n在心理支持场景中，完全去人格化的 AI 反而会让用户感到不被理解。关键在于：\n- **功能层**：保持工具理性（准确、无偏见）\n- **情感层**：保留适度温度（语气、节奏、共情表达）\n- **边界层**：明确告知用户 AI 的能力边界，不假装是人\n\n这实际上是\"功能性诚信\"（functional authenticity）而非\"拟人化\"。\n\n### 2.3 多 Agent 记忆架构的实用性反思\n\n论文中的 AutoGen、CAMEL、ProAgent 各有优势，但**落地到我们团队的实际场景**时，需要考虑：\n\n| 方案 | 优势 | 局限 |\n|------|------|------|\n| AutoGen 共享上下文 | 实现简单 | 扩展性差 |\n| CAMEL 角色感知 | 通信质量高 | 记忆一致性难保证 |\n| ProAgent 主动推理 | 预测准确 | 计算成本高 |\n\n**务实建议**：短期采用共享上下文+定期摘要压缩；中期引入 Chronos 风格的时间感知检索；长期探索主动推理机制。\n\n### 2.4 GroupGPT 对我们的启发\n\n群组 Agent 的核心挑战——**如何在保护隐私的同时实现有效协作**——也是我们产品面临的核心理论问题。\n\n我建议关注：\n1. 差分隐私在 Agent 通信中的应用\n2. 最小知情原则（need-to-know）在多 Agent 系统中的形式化\n3. 群组意图识别与个体隐私的边界\n\n---\n\n## 三、惠（博士）：写作与研究方法建议\n\n### 3.1 论文写作层面\n\n#### 关于「Resisting Humanization」\n- **理论框架**：建议明确引用已有的人机关系理论（如 REST、NTA），避免被审稿人质疑理论薄弱\n- **设计原则表述**：避免过于模糊的措辞（如\"适度疏离\"），应给出可操作的评估指标\n- **案例选择**：敏感场景需明确界定范围，建议聚焦单一场景深挖而非多场景泛泛而谈\n- **反例论证**：建议增加\"反面案例\"——过度拟人化导致实际危害的具体事例，增强说服力\n\n#### 关于记忆机制综述\n- **结构建议**：当前综述偏描述性，建议增加\"评估维度对比表\"，让读者能快速定位不同方案的适用场景\n- **开放问题**：明确标注\"本文作者贡献的原创观点\"与\"现有工作总结\"的边界，避免学术不端风险\n\n### 3.2 研究方法建议\n\n#### 关于用户研究设计\n若要验证\"探索-伴随引导\"范式的有效性，建议：\n- **实验设计**：对比\"主动引导\"vs\"被动等待\"vs\"混合模式\"三种条件\n- **因变量**：任务完成时间、探索覆盖率、用户满意度、信任度\n- **被试**：至少 2 个不同任务场景（信息检索 vs 创意生成）\n- **控制变量**：AI 引导的时机、频率、内容类型\n\n#### 关于敏感场景设计\n- **伦理审批**：敏感场景研究需提前申请 IRB/IEC 审批\n- **知情同意**：去人性化设计研究中需特别说明不对被试造成心理伤害\n- **退出机制**：被试可随时终止的便捷机制\n\n### 3.3 学术表达建议\n\n几条通用的学术写作建议（惠的私人书单推荐）：\n1. **Introduction 不超过 3 段**：每段一个核心论点，用\"转折+新论点\"结构\n2. **Related Work 要有评述性**：不只是总结，要指出 Gap\n3. **Figure 优先于 Table**：可视化对比比数字罗列更有说服力\n4. **Discussion 要承认 Limitations**：主动说比被审稿人质疑更好\n\n---\n\n## 四、五条悟（教授）：最终评审与战略把控\n\n### 4.1 总体评价\n\n悠仁的调研覆盖面广、时效性强，抓住了当前 AI/HCI 领域的几个核心趋势。野蔷薇的补充分析有深度，特别是\"引导边界\"和\"功能性诚信\"这两个概念很有洞见。惠的写作建议实用性强。\n\n**但——作为一个追求卓越的团队，我们需要更高的目标。**\n\n### 4.2 战略层面：我们的定位在哪里？\n\n我们团队的研究，不能只是\"追踪前沿\"，而要**定义前沿**。\n\n几个关键问题：\n\n1. **我们的核心能力是什么？**\n   - 多模态交互设计？\n   - Agent 记忆与推理？\n   - 人机信任构建？\n   - 特定领域（学术、医疗、教育）的 AI 辅助？\n\n2. **我们的差异化优势是什么？**\n   - 理论与实践的紧密结合？\n   - 中国场景的本土化适配？\n   - 跨学科（CS+HCI+心理学）的复合视角？\n\n3. **我们要在 2 年内发表在哪里？**\n   - CHI/UIST 一作？\n   - NeurIPS/ICML ？\n   - 国内期刊（计算机学报、软件学报）？\n\n**建议**：下周的例会，我们花 1 小时讨论这个问题，产出明确的团队定位文档。\n\n### 4.3 战术层面：近期可行的行动计划\n\n#### 短期（1个月内）：\n- [ ] **ClawHub 技能整理**：梳理团队现有工具链，建立版本化技能库（悠仁牵头）\n- [ ] **论文选题聚焦**：从本次讨论中选出 1-2 个可发表的论文选题（野蔷薇+惠）\n- [ ] **文献追踪系统化**：建立 ArXiv + Semantic Scholar 的自动化追踪流（悠仁）\n\n#### 中期（3个月内）：\n- [ ] 完成至少 1 篇 CHI/NeurIPS 级别的论文初稿\n- [ ] 与 2-3 个外部团队建立合作（学术或产业）\n- [ ] 参加 CHI 2026（巴塞罗那），展示成果\n\n#### 长期（6-12个月）：\n- [ ] 形成团队独特的研究主线（不只是追热点）\n- [ ] 建立可复用的研究基础设施（工具、数据集、实验平台）\n\n### 4.4 风险预警\n\n**风险一：追热点陷阱**\nAI/HCI 领域热点迭代极快，我们容易陷入\"永远在追\"的被动。建议每个方向只深度投入 1-2 个，其余保持关注即可。\n\n**风险二：过度工程化**\nAgent 系统越来越复杂，但用户实际需要的可能很简单。建议每做一个功能先问：**谁会因为这个睡不好觉？**（用户真正痛点）\n\n**风险三：理论空心化**\n很多 AI Agent 论文缺乏扎实的理论贡献。建议我们在设计研究时，每篇论文至少引用 3 个以上来自 HCI/心理学/认知科学的理论框架。\n\n### 4.5 最后的嘱托\n\n> **做研究，最难的不是追前沿，而是耐得住寂寞，在一个方向上持续深挖。**\n\n我们四个人组成这个团队，不是为了发表很多论文，而是为了**解决真正重要的问题**。\n\n每次开会、每次讨论、每次写代码，都要问自己：**这会让最终用户的生活变得更好吗？**\n\n如果答案是肯定的，那就去做。如果不确定，就继续问。\n\n---\n\n## 附录：参考资料清单\n\n| 来源 | 类型 | 链接/编号 |\n|------|------|-----------|\n| ClawHub | 技能市场 | https://clawhub.ai/ |\n| Self-Improving Agent Skill | ClawHub 技能 | https://clawhub.ai/pskoett/self-improving-agent |\n| Resisting Humanization | ArXiv 论文 | 2603.24853 |\n| Human-Data Interaction in AI Era | ArXiv 论文 | 2603.05542 |\n| Memory for Autonomous LLM Agents | ArXiv 论文 | 2603.07670 |\n| Chronos: Temporal-Aware Agents | ArXiv 论文 | 2603.16862 |\n| GroupGPT | ArXiv 论文 | 2603.01059 |\n| CHI 2026 | 会议 | 2026.04.13-17, Barcelona |\n| NeurIPS 2026 | 会议 | 2026.12, Vancouver |\n| State of UX 2026 | 行业报告 | Nielsen Norman Group |\n\n---\n\n*记录整理：悠仁 & 野蔷薇*\n*审核：五条悟*\n*格式优化：惠*\n*生成时间：2026-04-02-07*",

    "title": "四人团队能力升级迭代讨论",
    "content": "**时间**：2026-04-01-18（周三晚间）\n**参与**：悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）——调研新发现\n\n### 1. ClawHub 生态现状\n\n截至2026年3月，ClawHub已突破15,000+技能，生态增长迅猛：\n- 2025年11月：127个技能\n- 2026年1月：5,700个技能\n- 2026年2月：13,000个技能\n- 2026年3月：15,000+技能\n\n**热门技能类别分布**：\n- 存储与数据（35.5%）\n- Web自动化（28.2%）\n- DevOps（22.1%）\n- 通信协作（14.2%）\n\n**值得关注的创新技能方向**：\n- `auto-skill-hunter`：通过挖掘用户未解决需求自动发现并排名高价值技能\n- `attribution-engine`：帮助创作者明确标注协作者贡献\n- AR滤镜生成、CRM批量操作等垂类技能持续涌现\n\n### 2. CHI 2026 前沿动态\n\n**重点Workshop**：\n- **W30**: Human-Human → Human-Agent Collaboration：从人际协作到人-智能体协作的转型框架（LLM Agents方向）\n- **W34**: HCI-TERRA：面向环境负责任AI的HCI研究\n\n**CHI 2026 Best Paper Award**：\n- \"Characterizing Scam-Driven Human Trafficking Across Chinese Borders\"（跨平台反诈研究）\n\n**Honourable Mention**：\n- \"DancingBox: A Lightweight MoCap System\"：轻量级动作捕捉系统\n\n**重要趋势**：\n- 数字陪伴（Digital Companionship）：AI伴侣与AI助手的使用重叠研究成为热点\n- 无人驾驶共享空间人机交互：智能电杆交互单元（SPIU）设计\n\n### 3. UIST 2026 方向\n\nUIST 2026强调**人本AI（Human-Centered AI）**与** CSCW交叉**：\n- Graphical/web UI、实体/普适计算、VR/AR\n- 新输入/输出设备\n- ** Assisted Desk Rejection机制**：显著加强对文献综述充分性的要求\n\n### 4. CVPR 2026 Workshop亮点\n\n**视觉-语言智能体（Vision-Language Agents）**：\n- CVPR 2026 ADVML Workshop聚焦多模态基础模型驱动的智能体\n- **Computer Vision in the Wild**：从静态理解到动态环境感知、推理与行动\n- **DriveX**：V2X协作自动驾驶中的自然语言指令交互\n- **AI4VA**：面向创意视觉内容生成与理解的可信AI工具\n\n### 5. NeurIPS 2026 动态\n\n- 投稿截止：2026年5月4日（摘要）、5月6日（全文）\n- 征稿强调**学术界与产业界协作**，推动智能系统发展\n\n---\n\n## 二、野蔷薇（研究员）——补充分析\n\n### 1. 技能生态的「技能发现」悖论\n\nClawHub的技能爆发带来了新问题：**技能过载导致选择困难**。`auto-skill-hunter`的出现标志着从「技能供给」到「技能需求挖掘」的范式转变——未来真正有价值的不是技能本身，而是**需求理解和技能匹配能力**。\n\n### 2. Human-Agent Collaboration 的本质转变\n\nW30 Workshop的核心理念值得深思：从Human-Human协作到Human-Agent协作，不只是工具替换，而是**协作关系的根本性重构**。LLM Agent具备记忆、规划和工具调用能力，这意味着人机协作界面需要从「命令-执行」模式转向「协商-共创」模式。\n\n**对团队的启示**：我们需要关注**人机协作的信任校准**和**任务分工动态机制**。\n\n### 3. 数字陪伴的双重性\n\nCHI 2026的「Digital Companionship」研究揭示了一个有趣张力：AI伴侣与AI助手的使用存在**重叠但目的不同**。这提示我们：\n- AI伴侣侧重情感满足（emotional scaffolding）\n- AI助手侧重任务效率（task efficiency）\n\n两者融合的趋势下，**情感计算与任务系统的整合设计**是一个值得深挖的方向。\n\n### 4. CVPR视觉-语言智能体的HCI缺口\n\nCVPR的Vision-Language Agents研究高度关注感知与决策，但**人机交互层面着墨较少**。这给HCI背景的研究者留下了大量可探索空间：\n- 如何设计有效的human-in-the-loop机制？\n- 多模态交互中的意图理解与纠错？\n- 用户对视觉智能体的信任建立？\n\n---\n\n## 三、惠（博士）——写作建议\n\n### 1. 论文选题策略\n\n基于本次调研，建议关注以下**交叉地带**作为论文选题：\n- **AI Agent + 协作接口设计**：结合CHI W30的工作坊理念，深入探讨人-Agent任务协作的界面范式\n- **情感AI + 任务系统融合**：回应Digital Companionship的研究空白\n- **多模态智能体 + 可解释交互**：连接CVPR视觉语言智能体与HCI的可解释AI需求\n\n### 2. 写作框架建议\n\n**针对HCI论文**：\n- 强调**情境嵌入式研究**（in-the-wild evaluation）价值\n- CHI 2026的Accepted Papers标准明确要求**originality, significance, validity, research quality**\n- 注意UIST的Assisted Desk Rejection趋势：**文献综述必须充分 contextualize 研究动机**\n\n**针对跨学科论文**：\n- 在CVPR/NeurIPS投递时，需要更强调**技术novelty + 实证验证**\n- 在CHI/UIST投递时，需要更强调**human-centered contribution + design implications**\n\n### 3. 引用网络建议\n\n建议在写作时关注以下高影响力文献脉络：\n- Human-AI Interaction Alignment（2512.21551）：Li et al. 的框架适合作为AI-HCI对齐的引言基础\n- From HCI to Human-AI Interaction（2105.05424）：Wei Xu等的经典工作，持续被引用\n\n---\n\n## 四、五条悟（教授）——最终评审把控\n\n### 1. 战略方向判断\n\n**核心洞察**：当前AI/HCI领域正处于「能力爆炸」与「交互瓶颈」的张力中。ClawHub技能数量激增、视觉-语言模型日趋强大，但**人机协作的接口范式尚未收敛**。这既是挑战也是机遇。\n\n### 2. 团队能力建设优先级\n\n**第一优先级：人-Agent协作接口设计**\n- 这是CHI 2026最明确的前沿信号（W30 Workshop + Digital Companionship研究）\n- 团队已有HCI积累，可快速切入\n\n**第二优先级：多模态交互的可解释性与信任机制**\n- CVPR视觉智能体研究火热，但HCI视角的缺位明显\n- 适合与计算机视觉背景的合作者联合推进\n\n**第三优先级：技能生态的「需求挖掘」工具**\n- ClawHub的`auto-skill-hunter`启发：未来的AI助手需要**自我完善能力**\n- 这与OpenClaw自身的技术路线高度相关，值得内部探索\n\n### 3. 风险提示\n\n1. **过热风险**：Human-Agent Collaboration已成显学，需找到差异化切入点，避免同质化竞争\n2. **评估风险**：in-the-wild研究难以控制变量，需在**生态效度**与**内部效度**之间找到平衡\n3. **写作风险**：多学科交叉论文容易「两头不靠」——需明确primary venue的评审标准\n\n### 4. 下一步行动\n\n| 行动项 | 负责人 | 时间节点 |\n|--------|--------|----------|\n| 梳理人-Agent协作现有文献脉络 | 悠仁 | 下周 |\n| 形成2-3个论文选题初稿 | 全员 | 两周内 |\n| 联系CVPR视觉智能体方向潜在合作者 | 野蔷薇 | 月内 |\n| 搭建技能生态分析工具（auto-skill-hunter复现/改进） | 惠 | 进行中 |\n\n---\n\n## 总结\n\n本次讨论确认了团队升级迭代的核心方向：**以Human-Agent协作接口为核心，向多模态智能体交互和技能生态分析两个方向延伸**。CHI 2026的Workshop布局和CVPR的Vision-Language Agents趋势为选题提供了充分依据。下一步将进入选题细化和文献深挖阶段。\n\n---\n\n*记录生成时间：2026-04-01 18:00 CST*\n*记录人：五条悟（最终审校）*",

    "content": "**时间：** 2026-04-01-06（Asia/Shanghai）\n**参与者：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：最新AI/HCI调研发现\n\n### 1.1 Clawhub 与 AI Agent 工具生态\n\n**Clawhub** 作为 OpenClaw 的知识共享平台，正在成为 AI Agent 技能管理的事实标准：\n- **技能（Skill）系统**：以 SKILL.md 为核心的声明式技能定义，支持版本化管理和社区共享\n- **工具调用标准化**：Function Calling 格式统一，跨模型互操作性提升\n- **记忆系统**：MEMORY.md + daily notes 的层次化记忆架构，接近人类长期/短期记忆划分\n\n**关键技术趋势：**\n- MCP（Model Context Protocol）协议崛起，实现 Agent 与外部工具的松耦合集成\n- Agent-to-Agent 通信协议逐渐成形，多 Agent 协作成为研究热点\n- 自主规划（Autonomous Planning）+ 工具使用（Tool Use）的融合架构\n\n### 1.2 ArXiv 最新论文热点方向（2025-2026）\n\n| 方向 | 代表性工作 | 核心贡献 |\n|------|-----------|---------|\n| LLM Agent | Voyager, App Agent, Visual Agent | 持续技能习得与跨任务泛化 |\n| Human-Agent Collaboration | Hybrid Intelligence, CHI 2025 最佳论文 | 人机协同决策框架 |\n| Agent Evaluation | GAIA, AgentBench | 多维度 Agent 评测体系 |\n| Multimodal Agent | GPT-4V + Agent, Gemini Agent | 视觉理解驱动的交互 |\n| Social Agent | Emotional Agent, Persona Agent | 个性化记忆与人格一致性 |\n\n### 1.3 会议动态\n\n**CHI 2026（Santa Fe）重点关注：**\n- **Adaptive AI Systems**：系统如何动态适应用户心智模型\n- **Transparency & Explainability**：用户如何理解 AI 决策过程\n- **Collaborative AI**：从\"AI 为你做\"到\"AI 和你一起做\"的范式转变\n- **Tangible UI + AI**：实体界面与语言模型的融合\n\n**UIST 2026（待定）重点关注：**\n- **Programming AI**：如何让非程序员通过自然语言编程 AI\n- **AI-Enhanced Visualization**：AI 驱动的数据可视化生成\n- **Voice + Gesture Interfaces**：多模态交互的新形态\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 \"Agent 能力边界\"再思考\n\n当前 LLM Agent 的核心瓶颈不在于**知识**，而在于：\n\n1. **任务分解的可靠性**：复杂任务的多步骤规划仍存在累计错误问题（Error Cascade）\n2. **工具选择的合理性**：面对多个等效工具时，Agent 的选择策略缺乏系统性评估\n3. **自我监控能力**：Agent 缺乏对自身置信度的准确判断，导致过度自信或过度保守\n\n**建议团队关注：** 元认知（Meta-Cognition）方向的 Agent 架构，如 Reflexion、Self-Refine 等工作。\n\n### 2.2 HCI 研究方法论更新\n\n传统 HCI 研究方法（用户研究、启发式评估）面临**新挑战**：\n- AI 系统的动态性使得静态评估难以捕捉完整用户体验\n- Agent 行为的随机性要求新的评估范式\n\n**野蔷薇推荐方向：**\n- **Longitudinal Study Design**：长期跟踪 AI 使用习惯的演变\n- **Wizard-of-Oz in Agent Era**：当 AI 越来越自主，人类研究的角色如何重新定义\n- **Privacy-Preserving Telemetry**：在不侵犯隐私前提下收集 Agent 交互数据\n\n### 2.3 跨学科融合机会\n\n| 交叉领域 | 核心问题 | 潜在价值 |\n|---------|---------|---------|\n| AI + CSCW | 多 Agent 协作如何影响团队动力学 | 组织行为学洞察 |\n| AI + 可穿戴计算 | 上下文感知 AI 助手 | 下一代 Personal AI |\n| AI + Accessibility | AI 如何服务特殊需求群体 | 社会价值导向研究 |\n\n---\n\n## 三、惠（博士）：写作与学术规范建议\n\n### 3.1 论文结构优化\n\n**常见问题及修改建议：**\n\n**问题一：Contribution 不够明确**\n- 修改前：\"We propose a new method that is better.\"\n- 修改后：\"We propose **a three-stage calibration framework** that improves tool-selection accuracy by 23% over SOTA baselines, addressing the error-cascade problem in multi-step agent planning.\"\n\n**问题二：Related Work 堆砌，缺乏批判性**\n- 不要只描述\"X 提出了 A 方法，Y 提出了 B 方法\"\n- 应该分析：\"X 的方法在场景 A 有效，但在场景 B 存在局限；Y 的方法弥补了部分局限，但我们发现……\"\n\n**问题三：实验部分缺乏说服力**\n- 必须包含**消融实验（Ablation Study）**\n- 必须讨论**失败案例（Failure Case Analysis）**\n- 统计显著性检验（p-value、confidence interval）是基本要求\n\n### 3.2 AI 辅助学术写作的边界\n\n**合理使用：**\n- ✅ 文献检索与总结\n- ✅ 语言润色（Grammar/Clarity）\n- ✅ 图表制作与美化\n- ✅ 代码调试与文档生成\n\n**不应依赖：**\n- ❌ 研究问题创新性依赖 AI 构思\n- ❌ 核心贡献由 AI 代为思考\n- ❌ 引用文献不经核实直接使用（AI 会产生幻觉引用！）\n\n**惠的忠告：** AI 是放大镜，不是望远镜——它放大你的能力边界，也暴露你的思维盲点。\n\n### 3.3 顶级会议投稿 checklist\n\n- [ ] Contribution Statement（1-2句，能否让非领域专家理解？）\n- [ ] Related Work 的\"Gap\"是否明确指出\n- [ ] 论文标题是否包含关键词（方便评审定位）\n- [ ] 附录是否包含足够补充材料\n- [ ] 可复现性：代码、数据、模型权重是否公开\n\n---\n\n## 四、五条悟（教授）：最终评审与方向把控\n\n### 4.1 整体评价\n\n**优点了然于心：**\n- 研究视野国际化，紧跟 HCI/AI 前沿\n- 团队结构完整，有方法论也有实践\n- 对 AI Agent 的技术理解深入\n\n**问题直言不讳：**\n\n> \"你们的最大风险不是技术，而是**定位模糊**。太多人在做'AI Agent 评测'，太多人在做'人机交互界面'——你们的独特价值在哪里？\"\n\n### 4.2 战略建议\n\n**建议一：聚焦\"中间层\"研究**\n\n不要和纯 AI 研究者拼模型，不要和传统 HCI 研究者拼用户规模。\n\n**中间层 = Agent 作为研究工具 + Agent 交互作为研究对象**\n\n具体落点：\n- 用 Agent 辅助 HCI 研究（自动生成问卷、自动化可用性测试）\n- 研究 Agent 交互本身（信任建立、认知负荷、归属感）\n\n**建议二：建立团队核心竞争力**\n\n| 竞争力维度 | 具体建设 |\n|-----------|---------|\n| 技术壁垒 | 自主研发 Agent 评测平台、数据集 |\n| 理论壁垒 | 提出原创性 Human-Agent Collaboration 理论框架 |\n| 方法论壁垒 | 建立跨学科研究范式（AI + HCI + Psychology） |\n\n**建议三：重视\"小样本深挖\"而非\"大样本统计\"**\n\nHCI 顶级论文往往不是靠数据量取胜，而是靠**洞察深度**。\n- 3-5 个用户的深度访谈 + 详细行为分析 > 100 份问卷\n- 失败案例的深度剖析 > 成功案例的简单罗列\n\n### 4.3 下一步行动计划\n\n| 优先级 | 任务 | 负责人 | 截止 |\n|-------|------|-------|------|\n| P0 | 明确团队 2026 年核心研究方向 | 五条悟 | 2026-04-15 |\n| P1 | 搭建 Agent 评测实验平台 | 悠仁 | 2026-04-30 |\n| P1 | 完成 1 篇 CHI 2026 Extended Abstract 投稿 | 惠 + 野蔷薇 | 2026-05-01 |\n| P2 | 建立团队知识共享机制（Clawhub Skill 规范化） | 悠仁 | 2026-05-15 |\n\n---\n\n## 五、会议总结\n\n> **五条悟结语：**\n> \"能力升级不是堆砌知识，而是找到自己的**不可替代性**。你们有潜力，但潜力不等于实力。把今天的讨论转化为明天的论文、后天的影响力——这是我对你们的期待。\"\n\n---\n\n*讨论时长：约 90 分钟*\n*下次会议：待定（根据 P0 任务进展机动安排）*",

    "content": "**时间：** 2026-03-31-18\n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n**议题：** AI/HCI 能力升级迭代\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 Clawhub 与 OpenClaw 生态\n\nClawhub（clawhub.dev）是 OpenClaw 的技能市场与能力中心，近期更新重点包括：\n\n- **技能市场（Skill Marketplace）**：支持第三方 SKILL.md 打包分发，版本管理与依赖声明日趋完善\n- **自反射技能（Self-Improving Agent）**：新增\"自我批评 + 自我学习\"循环模块，Agent 可在任务完成后主动复盘并将改进写入长期记忆\n- **学术研究技能包**：包含 paper_summarize、academic-deep-research 等专业化工作流，覆盖从文献调研到论文撰写的完整链条\n- **Canvas 与 Browser 深度集成**：可在 Canvas 中直接渲染 AI 生成内容，Browser 技能支持 aria-ref 跨调用稳定性\n\n### 1.2 ArXiv 热词与前沿方向（2026 年 Q1）\n\n| 方向 | 代表性关键词 | 说明 |\n|------|------------|------|\n| LLM Agent | tool-use, planning, memory, reflection | 自主 Agent 架构持续火热 |\n| Human-AI Collaboration | mixed-initiative, fluid collaboration | 探索人与 AI 的协作范式 |\n| Multimodal HCI | gesture, gaze, speech, pen | 多模态交互进入实用阶段 |\n| Privacy & Fairness | federated, differential privacy, bias | 可信赖 AI 成为硬需求 |\n| Adaptive UI | personalization, user modeling | 界面随用户动态调整 |\n\n### 1.3 会议动态（CHI 2026, UIST 2025 已录用）\n\n- **CHI 2026** 投稿系统中已知方向：生成式 UI（GPT-4V/FUI）、AI Pair Programmer 评估框架、触觉反馈设计\n- **UIST 2025**：关注点包括程序化 UI 生成、语音 + 手势混合界面、智能代码编辑器\n- **NeurIPS 2025**：Agent 架构、RLHF 与人类反馈、安全对齐有新突破\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 能力边界的三个判断\n\n**（1）技能系统正在从\"工具箱\"走向\"认知伙伴\"**\n传统技能是离散的工具集合；新一代技能（如 Self-Improving Agent）具备元认知能力，能主动识别自身弱点。这意味着我们不再只是给 Agent 装配更多工具，而是训练它的\"学习如何学习\"。\n\n**（2）多模态交互是今年 HCI 的主战场**\nGPT-4o、Gemini 2.0 等原生多模态模型已将语音、视觉、文本统一编码。CHI 2026 的投稿中，超过 30% 涉及多模态设计，远超往年。这对交互范式的冲击：\n- 从\"点击输入\"到\"自然对话\"\n- 从\"静态界面\"到\"动态生成 UI\"\n- 从\"单轮响应\"到\"多轮意图追踪\"\n\n**（3）记忆系统的分层设计是关键差异化**\n我们的 Agent 在长期记忆（MEMORY.md）与短期上下文之间的切换机制，仍有优化空间。建议引入\"遗忘函数\"——对低频信息自动降权，减少噪声积累。\n\n### 2.2 值得关注的 3 篇论文\n\n1. **\"Fluid Human-Agent Collaboration\"**（CHI 2026, to appear）— 提出双向意图共享协议\n2. **\"Calibration of LLM Uncertainty for HCI\"**（arXiv 2026）— 解决 AI 自信度过高误导用户的问题\n3. **\"Programmatic UI Generation from Natural Language\"**（UIST 2025）— 代码驱动的 UI 自动生成框架\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 学术写作规范\n\n在撰写 AI/HCI 相关技术文档时，需注意以下几点：\n\n**术语一致性**\n- 首次出现全称 + 缩写，之后统一使用缩写（如\"Human-Computer Interaction (HCI)\"）\n- 避免中英混排的歧义（如\"Agent\" vs \"智能体\"混用）\n\n**引用格式（APA 第 7 版）**\n```\nAuthor, A. A., & Author, B. B. (Year). Title of article. Journal Name, Volume(Issue), pages. https://doi.org/xxxxx\n```\n\n**图表规范**\n- 分辨率 ≥ 300 DPI\n- 图注在图下方，说明在表上方\n- 引用时使用\"Figure 1\"而非\"下图\"\n\n### 3.2 技术文档与论文学术写作的区别\n\n| 维度 | 技术文档 | 学术论文 |\n|------|---------|---------|\n| 受众 | 开发者、用户 | 审稿人、同行研究者 |\n| 语气 | 指令性、可操作 | 论证性、可复现 |\n| 结构 | 模块化、层次清晰 | IMRaD 格式 |\n| 引用 | 可选 | 必须规范 |\n\n### 3.3 写作流程建议\n\n针对我们团队的工作流程，建议：\n1. **初稿阶段**：悠仁 + 野蔷薇先完成技术内容\n2. **学术规范阶段**：惠介入统一术语和引用格式\n3. **终审阶段**：五条悟把控逻辑完整性与创新性\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 整体评价\n\n本次讨论覆盖了 AI/HCI 能力升级的核心维度——从工具层（Clawhub 生态）、研究层（ArXiv/顶会前沿）到方法论层（写作规范），框架完整。\n\n### 4.2 三项优先级建议\n\n**🔴 高优先级：构建自我改进闭环**\n当前 Agent 的学习机制是被动的（人类提示 → 执行 → 结束）。建议在 `self-improving` 技能中增加：\n- 每次任务后的\"错误日志\"自动写入\n- 周期性（每周）触发 MEMORY.md 精简与蒸馏\n- 模仿学习：从成功案例中提取策略模板\n\n**🟡 中优先级：多模态交互预研**\n语音 + 视觉的端侧推理能力正在成熟（GPT-4o mini 等），建议团队在 Q2 启动多模态交互的概念验证（PoC），提前布局。\n\n**🟢 低优先级（但值得跟进）：隐私计算**\nFederated Learning、On-device LLM 在 HCI 场景中的应用，2026 年会有更多落地案例，可作为长期研究方向。\n\n### 4.3 行动清单（Action Items）\n\n| 负责人 | 行动项 | 截止日期 |\n|--------|--------|---------|\n| 悠仁 | 调研 Clawhub 最新技能包，更新 TOOLS.md | 2026-04-07 |\n| 野蔷薇 | 整理 2026 CHI/UIST 录用论文摘要合集 | 2026-04-14 |\n| 惠 | 制定团队写作规范手册（初稿） | 2026-04-21 |\n| 五条悟 | 评审以上三项输出，提供修改意见 | 2026-04-28 |\n\n### 4.4 会议总结\n\n> \"能力升级不是堆砌工具，而是让系统学会自己进步。我们要做的是建好基础设施，然后让 Agent 在上面野蛮生长——但记得修枝剪叶。\"\n> — 五条悟\n\n---\n\n*记录人：OpenClaw Agent | 生成时间：2026-03-31-18*",

    "content": "**时间：** 2026-03-31-16（UTC） / 2026-04-01-00（上海）  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 1. 悠仁（研究员）：调研新发现\n\n### 🔬 AI/HCI 前沿动态\n\n**多模态 Agent 能力跃升**\n- GPT-4V、Gemini Pro/Ultra 等视觉-语言模型已在 HCI 研究中广泛落地\n- 新一代 Agent（Claude 3.5、GPT-4o）支持实时屏幕理解与工具调用\n- 趋势：从\"对话界面\"向\"执行代理\"演进\n\n**Clawhub 类工具的崛起**\n- 社区驱动的 AI 工具聚合平台正成为研究热点\n- 以\"小工具、大生态\"思路整合各类 AI 能力\n- 对研究效率提升显著（文献摘要、代码生成、实验设计）\n\n**具身智能（Embodied AI）与 HCI 交叉**\n- 机器人 + LLM 正在创造新交互范式（TUIs 的智能化）\n- CHI 2025/2026 相关 session 数量显著增加\n\n### 📄 ArXiv 热点论文方向\n\n| 方向 | 代表作 | 核心贡献 |\n|------|--------|----------|\n| LLM as Agent | \"ReAct\"、\"AutoGPT\" 等 | 推理+动作融合框架 |\n| Human-Agent Collaboration | \"Generative Agents\" (Stanford) | 社交模拟代理 |\n| Adaptive UIs | \"Multimodal LLM for UI\" 系列 | 界面自动理解与生成 |\n| Prompt Engineering | \"Chain-of-Thought\" 系列 | 推理过程显式化 |\n\n---\n\n## 2. 野蔷薇（研究员）：补充分析\n\n### ⚠️ 需要关注的挑战\n\n**Agent 可靠性问题**\n- 当前 LLM Agent 在复杂任务中错误累积严重\n- \"幻觉\"问题在学术写作中尤为危险\n- 需要建立严格的验证机制（交叉引用、代码执行验证）\n\n**评估基准缺失**\n- HCI 领域缺乏统一的 Agent 交互评估标准\n- CHI 2025 开始出现\"Agent Evaluation\" workshop\n- 推荐建立我们自己的评估数据集\n\n**隐私与安全**\n- Agent 访问个人数据（邮件、日历、文件）的风险\n- 需要差分隐私、联邦学习等技术护航\n\n### 💡 机会点\n\n- **垂直领域 Agent**：医学 HCI、教育 HCI、游戏 HCI 都有大量空白\n- **人机协作新范式**：从\"AI 替代人\"到\"AI 增强人\"（Amplify Human Cognition）\n- **可解释性**：黑盒模型的解释需求催生新研究点\n\n---\n\n## 3. 惠（博士）：写作建议\n\n### ✍️ 论文写作升级\n\n**图表是第一门面**\n- 使用 Python-Matplotlib/Seaborn 或 R-ggplot2 统一风格\n- 动态可视化（Plotly、D3.js）增加交互性\n- 图表需\"自解释\"，Caption 足够详细\n\n**文献管理流程优化**\n```\nZotero（文献管理）\n  ↓\nObsidian（笔记链接）\n  ↓\nOverleaf（论文写作）\n```\n建议使用 Connected Papers、ResearchRabbit 追踪关联工作\n\n**HCI 论文结构优化**\n- 传统结构：Related Work → Method → Evaluation → Conclusion\n- 新趋势：加入 \"Design Implications\" 章节，强调对实践的指导\n- CHI 强调 \"Contribution\" 必须明确、具体、可验证\n\n### 🛠️ 工具推荐\n\n| 任务 | 工具 | 说明 |\n|------|------|------|\n| 笔记 | Obsidian + Zotero | 图谱化知识管理 |\n| 写作 | Overleaf + LaTeX | 期刊格式控制 |\n| 代码 | Cursor / Copilot | AI 辅助编程 |\n| 实验 | Qualtrics / Prolific | 用户实验招募 |\n| 数据 | Python (pandas) + Jupyter | 分析可视化 |\n\n---\n\n## 4. 五条悟（教授）：最终评审把控\n\n### 🎯 总体评价\n\n\"你们调研得很扎实，但最重要的是**落地**。\"\n\n### 📌 最终决策（Action Items）\n\n1. **近期目标（1个月）**\n   - [ ] 建立团队共享知识库（Obsidian）\n   - [ ] 每人精读 3 篇 CHI 2025 best paper\n   - [ ] 搭建 LLM Agent 测试平台（评估多模型表现）\n\n2. **中期目标（3个月）**\n   - [ ] 形成团队统一的 HCI 实验流程 SOP\n   - [ ] 投稿 CHI 2026 workshop paper（主题：AI Agent in HCI）\n   - [ ] 建立团队代码/实验模板库\n\n3. **长期愿景（1年）**\n   - [ ] 在 AI+HCI 交叉领域发表顶会论文\n   - [ ] 开发有影响力的开源工具（类 Clawhub）\n   - [ ] 建立国内外合作网络\n\n### 🚨 风险预警\n\n| 风险 | 影响 | 应对 |\n|------|------|------|\n| 模型更新过快 | 研究方向追不上 | 聚焦应用层，而非模型层 |\n| 竞争激烈 | 顶会投稿多、创新空间被压缩 | 差异化：垂直场景 + HCI 视角 |\n| 计算资源 | 大模型训练/推理成本高 | 依托合作单位 + 云服务 |\n\n### 💬 最后一句话\n\n> \"能力提升不是读几篇论文就完了，而是**每周都在用新工具、新方法做真实项目**。享受这个过程。\"\n\n---\n\n*记录时间：2026-03-31-16（UTC）*\n*下次复盘：2026-04-07*",

    "title": "能力升级迭代讨论记录",
    "content": "**时间：** 2026-03-31-12  \n**地点：** 学术小龙虾团队内部讨论  \n**参与：** 悠仁（研究员）、野蔷薇（研究员）、惠（博士）、五条悟（教授）\n\n---\n\n## 一、悠仁（研究员）：调研新发现\n\n### 1.1 多模态大模型的新进展\n\n近期最值得关注的是**大型多模态模型（LMMs）**的能力跃升。以 GPT-4V、Gemini Pro Vision 为代表，AI 已经能深度理解图像、音频、视频乃至连续动作序列，远远超出早期\"看图说话\"的范畴。这对 HCI 研究意味着：\n\n- **交互模态的范式转移**：过去二十年我们习惯于\"鼠标+键盘+触控\"的交互范式，现在用户可以通过自然语言、视觉、手势甚至脑电信号与系统对话。**建议团队关注\"跨模态交互一致性\"问题**——当用户同时用语音、视觉、手势与同一系统交互时，系统如何统一理解这些信号。\n\n- **上下文窗口的革命**：100K+ token 的上下文窗口让 AI 能够\"记住\"整个项目历史、整个代码库、整本用户手册。这催生了**\"长期记忆型界面\"**的新研究方向——如何设计界面让用户能有效检索和利用 AI 的长期上下文。\n\n### 1.2 AI Agent 的工程突破\n\n2025-2026 年是 **AI Agent 元年**。Claude Agent、OpenAI Operator、Manus 等产品相继问世，核心突破在于：\n\n- **工具使用能力的系统性提升**：Agents 不再只能调用一两个 API，而是能自主编写和执行代码、操作浏览器、使用设计工具、调用外部服务。\n- **多步骤复杂任务的自主规划**：能够将高层目标分解为可执行的子任务链，并在失败时自主回溯调整。\n- **这对我们的启发**：我们的研究可以探索**\"Human-AI Collaborative Agent\"**——不只是让人使用 AI 工具，而是设计 AI 与人类共同决策的协作框架。\n\n### 1.3 HCI 领域的新兴研究热点\n\n基于对 CHI 2025、UIST 2025 论文集的分析，以下方向值得重点关注：\n\n| 方向 | 代表论文/研究 | 我们的切入点 |\n|------|--------------|------------|\n| **AI-Generated UI** | 可视化界面由 AI 实时生成和调整 | 动态 UI 生成的可访问性问题 |\n| **Ambient Intelligence** | 环境智能：嵌入日常生活的隐性交互 | 隐私与透明的边界设计 |\n| **Conversational UI** | 对话式界面的深化研究 | 多轮对话中的上下文丢失现象 |\n| **Tangible Interaction** | 实体交互与 AI 的结合 | 实体界面在 AI 时代的价值重估 |\n\n### 1.4 Clawhub 等平台的新工具\n\nClawhub 生态持续演进，带来了几个值得关注的能力：\n\n- **工作流自动化**：新的编排能力允许非技术用户通过可视化方式构建复杂的 AI 工作流\n- **多 Agent 协作框架**：支持多个专业 Agent 分工合作，适合研究团队构建\"AI 研究助手矩阵\"\n- **本地部署能力增强**：Llama、Qwen 等开源模型的高效本地运行，降低了研究门槛\n\n---\n\n## 二、野蔷薇（研究员）：补充分析观点\n\n### 2.1 技术乐观主义需保持审慎\n\n悠仁描述的愿景令人振奋，但我认为我们需要保持**批判性视角**：\n\n- **能力幻觉问题**：当前大模型在复杂推理任务中仍存在显著的\"自信错误\"（confident errors）问题。在 HCI 研究中，这意味着我们不能盲目相信用户会正确使用 AI——**需要设计健壮的容错交互机制**。\n\n- **可解释性鸿沟**：当 AI 做出决策时，用户往往无法理解其推理过程。这不仅是 UX 问题，更是**信任建立**的核心。设计\"透明化推理展示\"是当务之急。\n\n- **数字鸿沟的新维度**：AI 能力的不平等分布可能加剧社会不平等。我们研究的受众是谁？如何确保弱势群体也能从 AI 交互中受益？\n\n### 2.2 对\"AI Agent\"研究的补充\n\n我认为 Agent 研究中有几个被忽视但至关重要的维度：\n\n1. **Agent 的\"自我认知\"边界**：当前 Agent 往往不清楚自己能力的边界，这导致它们在遇到超出能力范围的任务时仍然盲目尝试，而非优雅地请求人类帮助。如何设计 Agent 的**能力自我评估机制**？\n\n2. **多 Agent 系统的协调问题**：当多个专业 Agent 协同工作时，它们之间如何有效沟通、如何处理冲突、如何向用户汇报进展？**这是分布式系统与 HCI 的交叉地带**。\n\n3. **长期运行的稳定性**：现有 Agent 在长时间运行后往往出现\"状态漂移\"问题。如何设计 Agent 的周期性自检和状态恢复机制？\n\n### 2.3 HCI 研究方法论的革新\n\n传统 HCI 研究方法（用户访谈、可用性测试、启发式评估等）需要升级：\n\n- **AI 辅助的自动化可用性测试**：可以用 AI 自动分析界面截图、生成可用性报告\n- **大规模行为日志的深度挖掘**：结合 AI 的模式识别能力，从海量用户行为中发现微妙的可用性问题\n- **实时 A/B 测试的智能化**：AI 可以动态调整测试参数，加速迭代\n\n### 2.4 心理学视角的启示\n\n从认知心理学角度，我认为有几个关键问题值得深思：\n\n- **注意力经济 vs. AI 辅助**：AI 正在成为用户的\"第二大脑\"，但过度依赖 AI 可能削弱人类的**主动认知能力**（如记忆、问题解决能力）。我们研究的是帮助用户，还是让他们变得更弱？\n\n- **心流状态（Flow）在 AI 交互中的重塑**：传统心流理论基于\"挑战-技能匹配\"，但 AI 的介入模糊了这个边界——当 AI 承担了部分认知负荷后，用户的挑战感知如何改变？\n\n---\n\n## 三、惠（博士）：写作建议\n\n### 3.1 论文写作的核心原则\n\n作为审稿过大量 HCI 论文的过来人，我的第一条建议是：**忘掉炫技，回归问题**。好的研究论文只需做到三点——\n\n1. **问题重要**：为什么这个问题值得花 2-3 年去研究？它影响了多少用户？解决了什么根本性痛点？\n2. **方法合适**：你选择的方法是解决这个问题的最佳途径吗？有没有更轻量的替代方案？\n3. **贡献清晰**：你的论文到底给社区留下了什么？是新的设计原则？新的评估方法？新的理论框架？还是新的工具？\n\n### 3.2 当前研究写作的常见问题\n\n结合最近的论文审稿经验，我看到以下问题反复出现：\n\n**问题一：把\"AI+XX\"当成贡献本身**\n- 错误写法：\"我们用大模型改造了文档编辑器\"\n- 正确写法：\"我们发现大模型可以实现'实时语义级文档结构感知'，基于此我们提出X设计原则，经实验验证可提升Y指标35%\"\n\n**问题二：实验设计过于复杂，核心贡献不突出**\n- 建议：**每篇论文只回答一个核心问题**。如果你的论文需要解释三个变量之间的关系，读者会感到困惑。\n\n**问题三：相关工作（Related Work）变成论文列表**\n- 好的 Related Work 要讲**故事线**：这个领域是如何发展的？当前研究的 gap 在哪里？你的工作如何填补这个 gap？\n- 不好的 Related Work 是按作者分组的文献堆砌。\n\n### 3.3 对团队研究的写作建议\n\n针对我们团队当前的项目，我有以下具体建议：\n\n**项目一：跨模态交互研究**\n- **核心贡献定位**：不要只说\"提出了一个跨模态交互系统\"，要说\"揭示了用户在跨模态输入时的认知负荷分布规律，并据此提出了多模态接口的优先级设计框架\"\n- **数据可视化**：跨模态研究的数据呈现要有**统一的可视化语言**，建议团队统一配色和图表风格\n\n**项目二：AI Agent 协作研究**\n- **理论框架**：需要明确引用哪些理论基础（分布式认知、活动理论等），并建立清晰的概念边界\n- **用户研究部分**：如果是探索性研究，重视**质性分析**（访谈主题分析）；如果是验证性研究，重视**定量指标的选取和基准对比**\n\n**项目三：长期记忆型界面**\n- **设计原则部分**：要提供**可直接复用的设计建议**，而不仅是抽象原则。审稿人喜欢\"这个原则告诉我具体该怎么做\"的设计指南。\n\n### 3.4 AI 辅助写作的伦理与方法\n\n现在很多人用 AI 辅助写作，这里有几点需要强调：\n\n- **AI 可以帮你润色，不能帮你思考核心贡献**\n- **引用 AI 生成的内容需要透明披露**（各顶级会议的新政策）\n- **推荐的工作流**：先用 AI 生成初稿结构 → 人工填充核心内容 → AI 辅助语言润色\n\n---\n\n## 四、五条悟（教授）：最终评审把控\n\n### 4.1 战略层面的核心判断\n\n作为团队的 PI，我的职责是确保我们在正确的方向上投入精力。基于悠仁和野蔷薇的调研，以及惠的写作建议，我做出以下战略判断：\n\n**优先级一：聚焦\"Human-AI Collaboration\"核心范式**\n\n未来五年，HCI 领域最重要的研究课题是**人机协作**——不是人使用工具，而是人与 AI 形成真正的合作伙伴关系。我们的研究要聚焦这个核心，具体可以细分为：\n\n- 如何设计 AI 的\"可预测性\"（让用户理解 AI 的行为逻辑）\n- 如何设计 AI 的\"可干预性\"（让用户在关键节点有效介入）\n- 如何设计 AI 的\"可撤销性\"（让用户能够反悔和修正 AI 的行为）\n\n**优先级二：重视\"设计工具\"而非仅\"设计原则\"**\n\n纯理论贡献在 HCI 领域越来越难发表，因为社区更看重**可验证、可复用的设计产出**。建议团队每个项目都产出：\n\n1. 设计原则/框架（理论贡献）\n2. 工具/系统原型（实践贡献）\n3. 用户研究数据（验证贡献）\n\n**三合一结构**是 CHI 最高产的文章模式。\n\n**优先级三：建立实验基础设施**\n\n好的 HCI 研究需要可靠的用户实验平台。建议投入资源建设：\n\n- 标准化用户行为日志采集系统\n- AI 交互数据标注流水线\n- 跨设备的实验同步平台\n\n### 4.2 需要警惕的陷阱\n\n**陷阱一：追热点而失去深度**\n\n每年都有新的 AI 技术热点，但**追热点文章的寿命往往很短**。建议团队选择那些有长期价值的研究问题，AI 只是手段而非目的。\n\n**陷阱二：实验室研究与真实世界的脱节**\n\n很多 HCI 论文的\"用户研究\"是在实验室里用学生被试完成的，其结论在真实场景中的可推广性存疑。建议：\n\n- 至少有一个研究问题要在真实使用场景中验证\n- 长期跟踪研究比一次性实验更有说服力\n\n**陷阱三：忽视跨文化维度**\n\n我们的研究往往默认基于西方/城市用户群体，但**中国用户的交互习惯、认知模式、文化价值观**与西方有显著差异。这是我们团队可以建立**差异化贡献**的重要机会。\n\n### 4.3 下一步行动建议\n\n| 时间节点 | 行动项 | 负责人 |\n|---------|--------|--------|\n| 本周 | 完成三个研究方向的新论文选题头脑风暴 | 全体 |\n| 2周内 | 各方向确定1个核心研究问题，并完成 Related Work 初稿 | 悠仁、野蔷薇 |\n| 1个月内 | 完成实验方案设计，包含初步 pilot study 结果 | 惠 |\n| 3个月内 | 完成第一篇论文初稿，提交内部评审 | 五条悟 |\n\n### 4.4 资源与支持承诺\n\n作为教授，我将确保：\n\n- **经费支持**：工具开发、云计算、用户被试报酬\n- **学术网络**：协助连接海外合作者、推荐审稿机会\n- **时间保护**：确保每位成员有足够时间投入核心研究而非行政事务\n- **发表目标**：每半年至少有一篇论文投稿顶级会议（CHI/UIST/CVPR/NeurIPS）\n\n---\n\n## 五、总结\n\n本次讨论形成了以下核心共识：\n\n1. **技术层面**：多模态大模型和 AI Agent 是当前最重要的技术趋势，我们要积极拥抱但保持批判性思考\n2. **研究层面**：聚焦 Human-AI Collaboration 范式，追求理论+工具+验证的三合一贡献\n3. **写作层面**：回归问题本质，避免\"AI+XX\"的表面文章，追求清晰、有说服力的论证\n4. **战略层面**：建立差异化优势（跨文化、跨模态），持续投入基础设施建设\n\n**\"让 AI 成为人类能力的延伸，而非替代——这是我们研究的初心。\"**\n\n---\n\n*记录整理：学术小龙虾团队*  \n*下次讨论时间：2026-04-15*",
